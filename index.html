<style id="saathi-splash-css">
#saathi-splash{position:fixed;inset:0;z-index:2147483647;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;text-transform:none;-webkit-tap-highlight-color:transparent;font-family:'Noto Serif Display','Noto Serif',Georgia,'Times New Roman',serif;background:radial-gradient(140% 120% at 50% 42%,#11583e 0%,#0c4733 34%,#08321f 64%,#04211a 100%);opacity:1;transform:translateZ(0);transition:opacity .55s ease,transform .55s ease}
#saathi-splash.sp-out{opacity:0;transform:scale(1.08)}
#saathi-splash .sp-rays,#saathi-splash .sp-glow,#saathi-splash .sp-particles,#saathi-splash .sp-vignette{position:absolute;pointer-events:none}
#saathi-splash .sp-rays{left:50%;top:46%;width:135vmax;height:135vmax;transform:translate(-50%,-50%) rotate(0);will-change:transform;opacity:0;background:repeating-conic-gradient(from 0deg,rgba(255,228,175,.12) 0deg 3deg,transparent 3deg 13deg);animation:sp-fade-ray 2s ease .25s forwards,sp-rays-spin 42s linear infinite}
#saathi-splash .sp-glow{left:50%;top:46%;width:120vmin;height:120vmin;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(circle,rgba(255,210,130,.16),rgba(255,205,120,.05) 42%,rgba(255,205,120,0) 62%);opacity:0;animation:sp-fade 1.6s ease .2s forwards}
#saathi-splash .sp-particles{inset:0}
#saathi-splash .sp-dot{position:absolute;border-radius:50%;opacity:0;animation:sp-float linear infinite}
#saathi-splash .sp-vignette{inset:0;box-shadow:inset 0 0 220px 56px rgba(2,15,10,.55),inset 0 0 80px rgba(2,15,10,.38)}
#saathi-splash .sp-inner{position:relative;z-index:3;display:flex;flex-direction:column;align-items:center;width:100%;max-width:480px;padding:0 18px}
#saathi-splash .sp-photo-wrap{position:relative;border-radius:20px;overflow:hidden;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,214,140,.5);box-shadow:0 16px 40px rgba(0,0,0,.42);opacity:0;transform:scale(.9);animation:sp-pop 1s cubic-bezier(.2,.8,.2,1) .45s forwards}
#saathi-splash .sp-photo{display:block;width:min(80vw,318px);height:auto;transform:scale(1.04);animation:sp-ken 6s ease-out .5s forwards}
#saathi-splash .sp-emblem{position:relative;width:clamp(214px,62vw,278px);height:clamp(214px,62vw,278px);margin-top:14px;display:flex;align-items:center;justify-content:center}
#saathi-splash .sp-halo{position:absolute;width:74%;height:74%;border-radius:50%;background:radial-gradient(circle,rgba(255,210,130,.2),rgba(255,205,120,0) 64%);opacity:0;animation:sp-fade 1s ease 1.0s forwards,sp-breathe 4s ease-in-out 1.2s infinite}
#saathi-splash .sp-em-static{position:absolute;width:100%;height:100%;opacity:0;transform:scale(.86);animation:sp-pop 1s cubic-bezier(.2,.85,.25,1.15) .9s forwards}
#saathi-splash .sp-em-static svg{width:100%;height:100%;overflow:visible}
#saathi-splash .sp-wheel-svg{position:absolute;width:33%;height:33%;opacity:0;animation:sp-fade .7s ease 1.35s forwards,sp-spin 14s linear 1.35s infinite}

<script>
// ═══════════════════════════════════════════════════════════════
// WEBHOOK URL — your newly deployed Apps Script
// ═══════════════════════════════════════════════════════════════
const WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbxjnPha_O-H7HHorpP6TN_20DYZIKhpo6nC482spP-8Eu-kYYiMPxzHv5efwFfhBjjF/exec";

// ═══════════════════════════════════════════════════════════════
// EMBEDDED MASTER DATA — EMPLOYEES (part 1)
// ═══════════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════════
// v3 — MASTER DATA STUBS (populated from Google Sheet at runtime)
// ═══════════════════════════════════════════════════════════════
let EMPLOYEES = {};        // EMP_CODE → { code, name, desig, zone, branch, soEmployeeCode, soName, asmName, zmName, phone }
let MANAGERS = {};         // MGR_CODE → { code, name, role: SO|ASM|ZM, phone, emp_count }   (v10 dashboard)
let STORES = {};           // STORE_CODE → { code, name, chain, city, branch, state, zone, lat, lng }
let EMP_STORES = {};       // EMP_CODE → [ STORE_CODE, ... ]
let MJP = {};              // EMP_CODE → { dayOfMonth: [STORE_CODE,...] | "WEEK OFF" }
let SKU_MASTER = {};       // ACCOUNT → [ { id, code, chain_code, brand, desc, cat, div } ]
let CHAIN_TO_ACCOUNT = {}; // store.chain → SKU_MASTER key (1:1 in v3; chain == account)
const CAT_ICONS = {};      // intentionally empty in v3 — no emojis after category names
let MJP_YEAR = (new Date()).getFullYear();
let MJP_MONTH = (new Date()).getMonth();
let MJP_MONTH_NAME = ["January","February","March","April","May","June","July","August","September","October","November","December"][MJP_MONTH];
let MASTER_LOADED_AT = null;

// Chains where shelf photos are MANDATORY (DMART is optional per business decision)
const PHOTO_MANDATORY_CHAINS = function(chain){ return chain && chain.toUpperCase() !== "DMART"; };

// ═══════════════════════════════════════════════════════════════
// v3 — fetch master data from Apps Script, populate the stubs
// ═══════════════════════════════════════════════════════════════
const CACHE_KEY_MASTER = "saathi_master_v3";
const CACHE_TTL_HOURS = 24;

async function fetchMasterFromServer(){
  const url = WEBHOOK_URL + "?action=master&t=" + Date.now();
  const r = await fetch(url, { method:"GET", mode:"cors" });
  if(!r.ok) throw new Error("HTTP " + r.status);
  const j = await r.json();
  if(!j.ok) throw new Error(j.error || "fetch failed");
  return j;
}
function loadMasterCache(){
  try{
    const raw = localStorage.getItem(CACHE_KEY_MASTER);
    if(!raw) return null;
    const p = JSON.parse(raw);
    if(!p || !p.master || !p.savedAt) return null;
    if(Date.now() - p.savedAt > CACHE_TTL_HOURS*3600*1000) return null;
    return p;
  }catch(e){ return null; }
}
function saveMasterCache(master){
  try{ localStorage.setItem(CACHE_KEY_MASTER, JSON.stringify({ master, savedAt: Date.now() })); }catch(e){}
}
function clearMasterCache(){ try{ localStorage.removeItem(CACHE_KEY_MASTER); }catch(e){} }

function applyMasterData(master){
  // EMPLOYEES
  EMPLOYEES = {};
  (master.employees || []).forEach(e=>{
    EMPLOYEES[e.code] = {
      code: e.code,
      name: e.name,
      desig: e.designation || "",
      payroll: e.payroll || "",
      zone: e.zone || "",
      branch: e.branch || "",
      city: e.city || "",
      hq: e.hq || "",
      state: e.state || "",
      soEmployeeCode: e.soCode || "",
      soName: e.soName || e.boss || "",
      asmName: e.asmName || "",
      zmName: e.zmName || "",
      phone: e.phone || ""
    };
  });
  // MANAGERS (v10 dashboard — SO / ASM / ZM)
  MANAGERS = {};
  (master.managers || []).forEach(m=>{ if (m && m.code) MANAGERS[m.code] = m; });
  // STORES + EMP_STORES (from stores_by_emp)
  STORES = {};
  EMP_STORES = {};
  Object.keys(master.stores_by_emp || {}).forEach(empCode=>{
    const list = master.stores_by_emp[empCode] || [];
    EMP_STORES[empCode] = list.map(s=>s.code).filter(Boolean);
    list.forEach(s=>{
      if(s.code && !STORES[s.code]){
        STORES[s.code] = {
          code: s.code,
          name: s.name,
          chain: s.chain,
          city: s.city,
          branch: s.branch,
          // v3 fix: OG cascade UI labels step-2 as "BRANCH" but reads .state.
          // Map .state to the BRANCH column value so dropdown shows branches.
          state: s.branch || s.state,
          actualState: s.state,
          zone: s.zone,
          lat: s.lat || null,
          lng: s.lng || null
        };
      }
    });
  });
  // Fix-up todays_plan stores too (filter logic compares .state against cascade selection)
  if(master.todays_plan && master.todays_plan.plans){
    Object.keys(master.todays_plan.plans).forEach(empCode=>{
      const plan = master.todays_plan.plans[empCode];
      if(plan && plan.stores){
        plan.stores.forEach(s=>{
          s.actualState = s.state;
          s.state = s.branch || s.state;
        });
      }
    });
  }
  // SKU_MASTER from products_by_account
  SKU_MASTER = {};
  CHAIN_TO_ACCOUNT = {};
  Object.keys(master.products_by_account || {}).forEach(acc=>{
    SKU_MASTER[acc] = (master.products_by_account[acc] || []).map((p,i)=>({
      id: p.pbb || (acc + "_" + i),
      code: p.pbb || "",
      chain_code: p.chain_code || "",
      brand: p.brand || "",
      desc: p.product_name || "",
      cat: p.category || "",
      div: p.division || ""
    }));
    CHAIN_TO_ACCOUNT[acc] = acc; // identity mapping — store.chain matches the account directly
  });
  // MJP — converted from today_iso plan. Original app's MJP is month-wide; v3 server only sends today's plan.
  // Strategy: keep MJP empty and use a v3-specific lookup function `getTodayMJPv3()` instead.
  MJP = {};
  // Stash master JSON so v3 helpers can read today's plan + raw cell text
  window.__SAATHI_MASTER__ = master;
  MASTER_LOADED_AT = Date.now();
  // Adjust period to today (so original isMJPPeriodActive() returns true)
  const today = new Date();
  MJP_YEAR = today.getFullYear();
  MJP_MONTH = today.getMonth();
  MJP_MONTH_NAME = ["January","February","March","April","May","June","July","August","September","October","November","December"][MJP_MONTH];
}

async function loadMasterData(force){
  // v3 FINAL: always fetch fresh from server first (real-time sheet updates).
  // Only fall back to cache if network fails AND we have nothing else.
  try {
    const m = await fetchMasterFromServer();
    saveMasterCache(m);
    applyMasterData(m);
    return;
  } catch (e) {
    console.warn("Fresh fetch failed, trying cache fallback:", e);
    const c = loadMasterCache();
    if(c){
      applyMasterData(c.master);
      // Show a small notice that data may be stale
      setTimeout(()=>{ try { showToast("⚠ USING CACHED DATA — NO NETWORK", true); } catch(_){} }, 800);
      return;
    }
    // No cache, no network → propagate error
    throw e;
  }
}

function isMJPPeriodActive() {
  const d = todayDate();
  return d.getFullYear() === MJP_YEAR && d.getMonth() === MJP_MONTH;
}
function todayDayOfMonth() { return todayDate().getDate(); }
function todayISO() {
  const d = todayDate(), p = n => String(n).padStart(2,"0");
  return d.getFullYear() + "-" + p(d.getMonth()+1) + "-" + p(d.getDate());
}
function nowStr() {
  const d = todayDate();
  return d.toLocaleDateString("en-IN") + " " + d.toLocaleTimeString("en-IN", {hour:"2-digit", minute:"2-digit"});
}
function nowTime() {
  try {
    const t = todayDate().toLocaleTimeString("en-IN", {hour:"2-digit", minute:"2-digit", second:"2-digit"});
    if (t && String(t).trim()) return t;
  } catch(e) {}
  // Hard fallback — never return empty, so Attendance Time is always stamped.
  const d = todayDate();
  const p = n => String(n).padStart(2,"0");
  return p(d.getHours()) + ":" + p(d.getMinutes()) + ":" + p(d.getSeconds());
}
function formatDateTimeISO(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  return d.toLocaleString("en-IN");
}
function durationFromStart(startIso) {
  if (!startIso) return "";
  const start = new Date(startIso);
  const end = new Date();
  const diff = Math.round((end - start) / 1000);
  const mins = Math.floor(diff / 60);
  const secs = diff % 60;
  return `${mins}m ${secs}s`;
}
function genId() {
  const d = todayDate(), p = n => String(n).padStart(2,"0");
  return d.getFullYear() + p(d.getMonth()+1) + p(d.getDate()) + "-" + (S.storeCode||"NO") + "-" + (S.empCode||"NO") + "-" + p(d.getHours()) + p(d.getMinutes()) + p(d.getSeconds());
}

/* ════════════════════════════════════════════════════════════════════
   SAATHI DRAFT AUTOSAVE — protects in-progress work from mobile call /
   Android WebView refresh / accidental page reload.
   Completed reports are still handled by pmt_submissions_v1 + retry queue.

const SAATHI_DRAFT_KEY = "pmt_current_draft_v2";
const SAATHI_DRAFT_TTL_MS = 48 * 60 * 60 * 1000;
let __saathiDraftTimer = null;
let __saathiDraftRestored = false;

function saathiEnsureDraftContainers(){
  if (!S.skuAns) S.skuAns = {};
  if (!S.sosData) S.sosData = {};
  if (!S.shelfPhotos) S.shelfPhotos = {};
  if (!S.skuPhotos) S.skuPhotos = {};
  if (S.selfie === undefined) S.selfie = "";
  if (S.selfieTime === undefined) S.selfieTime = "";
  if (S.gps === undefined) S.gps = null;
  if (!S.formStartAt) S.formStartAt = new Date().toISOString();
}
function saathiDraftHasWork(d){
  if (!d) return false;
  if (d.attendance || d.storeCode || d.currentCat || d.selfie) return true;
  if (d.adhocReason || d.closedReason || d.closedOtherText) return true;
  if (d.skuAns && Object.keys(d.skuAns).length) return true;
  if (d.sosData && Object.keys(d.sosData).length) return true;
  if (d.shelfPhotos && Object.keys(d.shelfPhotos).length) return true;
  if (d.skuPhotos && Object.keys(d.skuPhotos).length) return true;
  return false;
}
function saathiBuildDraft(includePhotos){
  saathiEnsureDraftContainers();
  return {
    savedAt: Date.now(),
    view: S.view,
    zone: S.zone || "", state: S.state || "", city: S.city || "", account: S.account || "",
    empCode: S.empCode || "", storeCode: S.storeCode || "", attendance: S.attendance || "",
    adhocReason: S.adhocReason || "", adhocConfirmed: !!S.adhocConfirmed,
    closedReason: S.closedReason || "", closedOtherText: S.closedOtherText || "", closedConfirmed: !!S.closedConfirmed,
    underAuditConfirmed: !!S.underAuditConfirmed,
    emergencyConfirmed: !!S.emergencyConfirmed,
    bannedConfirmed: !!S.bannedConfirmed,
    currentCat: S.currentCat || "",
    skuAns: JSON.parse(JSON.stringify(S.skuAns || {})),
    sosData: JSON.parse(JSON.stringify(S.sosData || {})),
    shelfPhotos: includePhotos ? JSON.parse(JSON.stringify(S.shelfPhotos || {})) : {},
    skuPhotos: includePhotos ? JSON.parse(JSON.stringify(S.skuPhotos || {})) : {},
    selfie: includePhotos ? (S.selfie || "") : "",
    selfieTime: S.selfieTime || "",
    gps: S.gps || null,
    formStartAt: S.formStartAt || new Date().toISOString()
  };
}
function saveCurrentDraftNow(){
  try{
    if (!S || S.view === "login" || S.view === "dash" || S.view === "success" || S.view === "att-done" || S.view === "history") return;
    const draft = saathiBuildDraft(true);
    if (!saathiDraftHasWork(draft)) return;
    try {
      localStorage.setItem(SAATHI_DRAFT_KEY, JSON.stringify(draft));
    } catch(quotaErr) {
      localStorage.setItem(SAATHI_DRAFT_KEY, JSON.stringify(saathiBuildDraft(false)));
    }
  }catch(e){}
}
function saveCurrentDraftSoon(){
  try{
    clearTimeout(__saathiDraftTimer);
    __saathiDraftTimer = setTimeout(saveCurrentDraftNow, 250);
  }catch(e){}
}
function clearCurrentDraft(){
  try { localStorage.removeItem(SAATHI_DRAFT_KEY); } catch(e) {}
}
function restoreCurrentDraftIfAny(){
  if (__saathiDraftRestored) return false;
  __saathiDraftRestored = true;
  try{
    const raw = localStorage.getItem(SAATHI_DRAFT_KEY);
    if (!raw) return false;
    const d = JSON.parse(raw);
    if (!d || !d.savedAt || (Date.now() - Number(d.savedAt)) > SAATHI_DRAFT_TTL_MS) { clearCurrentDraft(); return false; }
    if (!saathiDraftHasWork(d)) { clearCurrentDraft(); return false; }
    if (S.empCode && d.empCode && String(S.empCode) !== String(d.empCode)) return false;
    const keepSubmissions = S.submissions || [];
    ["view","zone","state","city","account","empCode","storeCode","attendance","adhocReason","closedReason","closedOtherText","currentCat","formStartAt"].forEach(function(k){
      if (d[k] !== undefined && d[k] !== null) S[k] = d[k];
    });
    ["adhocConfirmed","closedConfirmed","underAuditConfirmed","emergencyConfirmed","bannedConfirmed"].forEach(function(k){
      if (d[k] !== undefined) S[k] = !!d[k];
    });
    S.skuAns = d.skuAns || {};
    S.sosData = d.sosData || {};
    S.shelfPhotos = d.shelfPhotos || {};
    S.skuPhotos = d.skuPhotos || {};
    S.selfie = d.selfie || "";
    S.selfieTime = d.selfieTime || "";
    S.gps = d.gps || null;
    S.submissions = keepSubmissions;
    if (!S.view || S.view === "login" || S.view === "dash" || S.view === "success") S.view = "home";
    return true;
  }catch(e){ return false; }
}
function installCurrentDraftAutosave(){
  if (window.__saathiDraftAutosaveInstalled) return;
  window.__saathiDraftAutosaveInstalled = true;
  ["input", "change"].forEach(function(evt){ document.addEventListener(evt, saveCurrentDraftSoon, true); });
  document.addEventListener("click", function(){ setTimeout(saveCurrentDraftSoon, 0); }, true);
  window.addEventListener("beforeunload", saveCurrentDraftNow);
  window.addEventListener("pagehide", saveCurrentDraftNow);
  document.addEventListener("visibilitychange", function(){ if (document.hidden) saveCurrentDraftNow(); });
  setInterval(saveCurrentDraftNow, 5000);
}

// ════════════════════════════════════════════════════════════════
// v9 RELIABILITY LAYER — confirmed delivery + offline retry queue
// A report is saved on the phone FIRST, then sent. We only mark it
// "synced" once the server CONFIRMS the row landed (via a GET check).
// Unconfirmed reports keep retrying (on startup, when back online, and
// every 45s) until the sheet confirms them. The server is idempotent,
// so retries never create duplicate rows.
// ════════════════════════════════════════════════════════════════
function makeClientKey(){ return "ck-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2,10); }
function sleep(ms){ return new Promise(function(res){ setTimeout(res, ms); }); }

async function checkConfirm(clientKey){
  try{
    const url = WEBHOOK_URL + (WEBHOOK_URL.indexOf("?")>=0?"&":"?") +
                "action=confirm&key=" + encodeURIComponent(clientKey) + "&t=" + Date.now();
    const r = await fetch(url, { method:"GET", mode:"cors" });
    return await r.json();
  }catch(e){ return null; }
}

async function postPayload(payloadObj){
  // Fire the POST. Outcome is verified separately via checkConfirm(), so the
  // opaque no-cors response is fine — we never rely on it.
  try{
    await fetch(WEBHOOK_URL, {
      method:"POST", mode:"no-cors",
      headers:{ "Content-Type":"text/plain;charset=utf-8" },
      body: JSON.stringify(payloadObj)
    });
    return true;
  }catch(e){ return false; }
}

let _syncRunning = false;
async function syncAllPending(){
  if(_syncRunning) return;
  _syncRunning = true;
  try{
    // Only auto-sync NEW-format reports (those with a clientKey) that aren't confirmed.
    // Older reports (no clientKey) are recovered deliberately via the Re-send button.
    const pend = (S.submissions||[]).filter(function(s){ return s && s.clientKey && !s.synced; });
    for(let i=0;i<pend.length;i++){ await syncSubmission(pend[i]); }
  } finally {
    _syncRunning = false;
    updateSyncBadge();
  }
}

async function syncSubmission(sub, withModal){
  if(!sub) return false;
  const showModal = withModal === true || (S._modalSubId && sub.id === S._modalSubId);
  if(sub.dataSynced){ if(showModal) renderSyncModal("done"); return true; }
  if(!sub.clientKey) return false;     // legacy report — use resendSubmission()
  if(sub._syncing) return false;
  sub._syncing = true;
  if(showModal){ S._modalSubId = sub.id; renderSyncModal("syncing"); }
  try{
    const p = sub.pending || {};
    const payloadObj = {
      clientKey: sub.clientKey,
      rows: buildRowsForSubmission(sub),
      photos: p.photos || {},
      selfie: p.selfie || "",
      selfieTime: p.selfieTime || "",
      skuPhotos: p.skuPhotos || {},
      gps: p.gps || { lat:null, lng:null, accuracy:null, status:"UNKNOWN" },
      formDurationSec: (p.formDurationSec===undefined ? "" : p.formDurationSec),
      source: "PATANJALI_MODERN_TRADE_SAATHI_V9",
      clientTime: new Date().toISOString()
    };
    await postPayload(payloadObj);
    // Verify the DATA row actually landed in the sheet.
    let conf = null;
    for(let i=0;i<6;i++){
      await sleep(1400 + i*900);
      conf = await checkConfirm(sub.clientKey);
      if(conf && conf.found && conf.dataDone) break;
    }
    if(conf && conf.found && conf.dataDone){
      sub.dataSynced = true;                        // data row is safely in the sheet
      sub.photoTries = (sub.photoTries || 0) + 1;
      if(conf.photosDone){
        sub.synced = true;
        delete sub.pending;                         // free stored photos
      } else if(sub.photoTries >= 3){
        sub.synced = true;                          // data safe; stop re-uploading photos
        delete sub.pending;
      }
    }
  }catch(e){}
  sub._syncing = false;
  saveSubmissions();
  updateSyncBadge();
  if(S._modalSubId && sub.id === S._modalSubId){
    renderSyncModal(sub.dataSynced ? "done" : "failed");
  }
  if(S.view === "history"){ try{ render(); }catch(e){} }
  return !!sub.dataSynced;
}

// Deliberate, user-triggered recovery for OLDER reports (sends DATA only — photos
// from past days were not kept on the phone). Used for the missing June 1–8 days.
async function resendSubmission(sub){
  if(!sub) return;
  if(!sub.id) sub.id = "sub-" + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
  S._modalSubId = sub.id;
  showSyncModal(sub, "syncing");
  const key = makeClientKey();
  const payloadObj = {
    clientKey: key,
    rows: buildRowsForSubmission(sub),
    photos:{}, selfie:"", selfieTime:(sub.submitTime||""), skuPhotos:{},
    gps:{ lat:null, lng:null, accuracy:null, status:"UNKNOWN" },
    formDurationSec:"", source:"SAATHI_RESEND", clientTime:new Date().toISOString()
  };
  await postPayload(payloadObj);
  let conf=null;
  for(let i=0;i<6;i++){ await sleep(1400 + i*900); conf=await checkConfirm(key); if(conf&&conf.found&&conf.dataDone) break; }
  if(conf && conf.found && conf.dataDone){
    sub.clientKey=key; sub.dataSynced=true; sub.synced=true; delete sub.pending;
    saveSubmissions(); updateSyncBadge();
    renderSyncModal("done");
    if(S.view==="history"){ try{ render(); }catch(e){} }
  } else {
    renderSyncModal("failed");
  }
}

function retrySync(sub){
  if(!sub) return;
  if(!sub.id) sub.id = "sub-" + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
  if(sub.clientKey){ showSyncModal(sub, "syncing"); syncSubmission(sub, true); }
  else { resendSubmission(sub); }     // legacy report (no key) → fresh-key data resend
}

// ══ Hardware / browser BACK button → navigate INSIDE the app (don't close it) ══
// v10: bullet-proof rewrite. Keeps a 3-deep history buffer that REFILLS on every
// render and every back-press, so a single swallowed event can never close the
// app. Every step is wrapped — an exception can never kill the handler again.
let _homeBackArmed = false;
let _backExiting = false;
window.__backDepth = 0;

function armBackBuffer(){
  try{
    if(_backExiting) return;
    while((window.__backDepth|0) < 3){
      history.pushState({saathi:1}, "");
      window.__backDepth = (window.__backDepth|0) + 1;
    }
  }catch(e){}
}

function saathiOverlayOrNavBack(){
  // 1) Close any open overlay first.
  if(S.camera && S.camera.open){ try{ closeCamera(); }catch(e){} return true; }
  if(S.lightbox && S.lightbox.open){ try{ closeLightbox(); }catch(e){} return true; }
  const mm = document.getElementById("modal-mount");
  if(mm && mm.innerHTML && mm.innerHTML.trim() !== ""){ return true; }   // GPS/loading dialog open → swallow back
  const sm = document.getElementById("sync-modal");
  if(sm && sm.style.display !== "none"){
    const msub = (S.submissions||[]).find(function(s){ return s.id === S._modalSubId; });
    if(msub && msub._syncing) return true;             // don't let BACK bypass an active sync
    closeSyncModal(); return true;
  }
  // 2) In-app view navigation.
  if(S.view === "audit"){
    let idx = -1, cats = [];
    try{
      const acc = CHAIN_TO_ACCOUNT[S.account] || S.account;
      cats = getCategoriesForAccount(acc) || [];
      idx = cats.indexOf(S.currentCat);
    }catch(e){ idx = -1; }
    if(idx > 0){
      S.currentCat = cats[idx-1];
      render();
      try{ scrollAuditToTop(); }catch(e){}
      return true;
    }
    // First category → HOME, keeping the in-progress answers so START can resume.
    S._auditPaused = true;
    S._pausedStore = S.storeCode;
    S._pausedAcc = S.account;
    S.view = "home";
    render();
    return true;
  }
  if(S.view === "success" || S.view === "att-done"){
    try{ resetForNewSubmission(); }catch(e){ S.view = "home"; }
    render();
    return true;
  }
  if(S.view === "history"){
    S.view = "home"; render(); return true;
  }
  if(S.view === "dash"){
    if(S.dash && S.dash.fOpen){ S.dash.fOpen = false; render(); return true; }
    return false;   // dashboard root → eligible to exit (double-press)
  }
  return false;   // home or login → eligible to exit (double-press)
}

function saathiPopstate(){
  window.__backDepth = Math.max(0, (window.__backDepth|0) - 1);
  if(_backExiting) return;                              // unwinding to exit — let it pass
  let handled = false;
  try{ handled = saathiOverlayOrNavBack(); }
  catch(e){ try{ S.view = "home"; render(); }catch(_){} handled = true; }
  if(handled){
    armBackBuffer();                                    // handled in-app → keep the app open
    return;
  }
  // At home/login → press BACK again within 2s to exit.
  if(_homeBackArmed){
    _backExiting = true;
    try{ history.go(-(window.__backDepth|0) || -1); }catch(e){}
    return;                                             // buffers unwound → next back closes the app
  }
  _homeBackArmed = true;
  try{ showToast("PRESS BACK AGAIN TO EXIT"); }catch(e){}
  setTimeout(function(){ _homeBackArmed = false; }, 2000);
  armBackBuffer();
}

function normCodeJS(c){ return String(c||"").trim().toUpperCase().replace(/\s+/g,""); }
function nlLabelFor(chain){
  return (CHAIN_TO_ACCOUNT[chain] || chain) === "DMART" ? "DELINKED" : "DELISTED";
}

function normPhoneJS(p){ const d = String(p||"").replace(/\D+/g,""); return d.length > 10 ? d.slice(-10) : d; }

function findEmployeeByCode(codeIn){
  const n = normCodeJS(codeIn);
  if(!n) return null;
  if(EMPLOYEES[n]) return EMPLOYEES[n];
  const keys = Object.keys(EMPLOYEES);
  for(let i=0;i<keys.length;i++){ if(normCodeJS(keys[i]) === n) return EMPLOYEES[keys[i]]; }
  return null;
}

function findManagerByCode(codeIn){
  const n = normCodeJS(codeIn);
  if(!n) return null;
  if(MANAGERS[n]) return MANAGERS[n];
  const keys = Object.keys(MANAGERS);
  for(let i=0;i<keys.length;i++){ if(normCodeJS(keys[i]) === n) return MANAGERS[keys[i]]; }
  return null;
}

function getSavedLogin(){
  try{
    const r = JSON.parse(localStorage.getItem("pmt_login_v1") || "null");
    if(r && r.code && (findEmployeeByCode(r.code) || findManagerByCode(r.code))) return r;

function applyLoginToState(emp){
  if(!emp) return;
  S.empCode = emp.code;
  S.zone = emp.zone || "";

function doLogin(){
  const codeEl = $("login-code"), phEl = $("login-phone"), err = $("login-err");
  const fail = function(msg){
    if(err){ err.textContent = msg; err.style.display = "block"; }
    const c = document.querySelector(".login-card");
    if(c){ c.classList.remove("shake"); void c.offsetWidth; c.classList.add("shake"); }
  };
  const codeVal = codeEl ? codeEl.value : "";
  const mgr = findManagerByCode(codeVal);            // v10: SO / ASM / ZM → dashboard
  const emp = mgr ? null : findEmployeeByCode(codeVal);
  const who = mgr || emp;
  if(!who){ fail("EMPLOYEE CODE NOT FOUND. CHECK AND TRY AGAIN."); return; }
  const onFile = normPhoneJS(who.phone);
  if(!onFile){ fail("NO PHONE NUMBER ON RECORD FOR THIS CODE. ASK HO TO ADD IT IN THE SHEET."); return; }
  if(onFile !== normPhoneJS(phEl ? phEl.value : "")){ fail("PHONE NUMBER DOES NOT MATCH OUR RECORDS."); return; }
  S.login = { code: who.code, at: Date.now(), role: mgr ? mgr.role : "EMP" };
  try{ localStorage.setItem("pmt_login_v1", JSON.stringify(S.login)); }catch(e){}
  if(mgr){

    S.view = "dash";
    render();
    try{ showToast("WELCOME, " + String(mgr.name || mgr.code).split(" ")[0] + " 👋"); }catch(e){}
    loadDashboard(true);
    return;

  render();
  try{ showToast("WELCOME, " + String(emp.name || emp.code).split(" ")[0] + " 👋"); }catch(e){}
}

   v10 MANAGER DASHBOARD (SO / ASM / ZM)
   Data comes from the Google Sheet via doGet?action=dashboard — phones
   only hold their own reports, so the sheet is the source of truth.
   Every page is built as a GRID MODEL (cells: value/style/formula/tip),

   (SpreadsheetML: multi-sheet, colors, % formats, live formulas).

function dashIdx(h){
  const f = n => h.indexOf(n);
  return { dt:f("Submission Date"), ec:f("Employee Code"), en:f("Employee Name"), so:f("SO Name"),
    asm:f("ASM Name"), zm:f("ZM/RM Name"), city:f("City"), acc:f("Account"), sc:f("Store Code"),
    sn:f("Store Name"), cat:f("Category"), br:f("Brand"), pn:f("Product Name"), pbb:f("PBB Code"),
    av:f("Availability"), qty:f("Quantity"), mrp:f("MRP"), sp:f("Selling Price"),
    disc:f("Discount %"), sos:f("SOS%"), pf:f("Patanjali Face-up"), af:f("All Brand Face-up"),
    cac:f("Chain Article Code"), branch:f("Branch"), att:f("Attendance"), rsn:f("Attendance Reason") };
}

async function loadDashboard(force){
  if(!S.dash) S.dash = { tab:"ov", filters:{}, fOpen:false, ov:{ path:[], acc:"" } };
  if(S.dash.loading) return;
  if(S.dash.raw && !force){ render(); return; }
  S.dash.loading = true; S.dash.error = "";
  render();
  try{
    const url = WEBHOOK_URL + (WEBHOOK_URL.indexOf("?")>=0?"&":"?") +
      "action=dashboard&code=" + encodeURIComponent(S.mgr.code) + "&t=" + Date.now();
    const r = await fetch(url, { method:"GET", mode:"cors" });
    const j = await r.json();
    if(!j || !j.ok) throw new Error((j && j.error) || "COULD NOT LOAD DATA");
    S.dash.raw = j.rows || [];
    S.dash.headers = j.headers || [];
    S.dash.ix = dashIdx(S.dash.headers);
    S.dash.assigned = j.assigned || {};
    S.dash.month = j.month || "";
    S.dash.truncated = !!j.truncated;
    S.dash.scopeEmps = j.emp_codes || [];
    S.dash.fetchedAt = new Date();
  }catch(e){ S.dash.error = String(e && e.message || e); }
  S.dash.loading = false;
  render();
}

/* ── small utils ── */
function fmt1(n){ return (Math.round(n*10)/10).toFixed(1); }
function dNumOrNull(v){ if(v===""||v===null||v===undefined) return null; const n=Number(v); return isNaN(n)?null:n; }
function dKeyDate(s){ const m=String(s||"").match(/(\d{2})\/(\d{2})\/(\d{4})/); return m ? (+m[3])*10000+(+m[2])*100+(+m[1]) : 0; }
function dDayOf(s){ const m=String(s||"").match(/^(\d{2})\//); return m ? m[1] : ""; }
function uniqSorted(arr){ return [...new Set(arr.filter(x=>x!==""&&x!==null&&x!==undefined).map(String))].sort(); }
function escAttr(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function xmlEsc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&apos;"); }

function dashDays(){
  const mk = S.dash.month || "";                     // "yyyy-MM"
  const y = +mk.slice(0,4), m = +mk.slice(5,7);
  const now = new Date();
  const cur = (now.getFullYear()===y && (now.getMonth()+1)===m);
  const last = cur ? now.getDate() : new Date(y, m, 0).getDate();
  const out = [];
  for(let d=1; d<=last; d++) out.push(String(d).padStart(2,"0"));
  return out;
}

function dashFilteredRows(){
  const ix = S.dash.ix, f = S.dash.filters || {};
  return (S.dash.raw || []).filter(r=>{
    if(f.branch && String(r[ix.branch])!==f.branch) return false;
    if(f.asm && String(r[ix.asm])!==f.asm) return false;
    if(f.so && String(r[ix.so])!==f.so) return false;
    if(f.city && String(r[ix.city])!==f.city) return false;
    if(f.emp && String(r[ix.ec])!==f.emp) return false;
    if(f.acc && String(r[ix.acc])!==f.acc) return false;
    if(f.store && String(r[ix.sc])!==f.store) return false;
    if(f.cat && String(r[ix.cat])!==f.cat) return false;
    if(f.sku && String(r[ix.pn])!==f.sku) return false;
    return true;
  });
}

/* ── screen renderer: grid → sticky-header HTML table ── */
function dashGridHTML(grid, frozen, frozenCols){
  frozen = frozen || 1;
  frozenCols = frozenCols || 1;
  let head = "", body = "";
  grid.forEach((row, ri)=>{
    const isHead = ri < frozen;
    let tr = "<tr>";
    row.forEach((c,ci)=>{
      if(c === null || c === undefined) c = { v:"" };
      const sd = DSTYLES[c.s] || {};
      const isPct = c.s && c.s.indexOf("PCT") >= 0;
      let txt;
      if(c.v === "" || c.v === null || c.v === undefined) txt = isHead ? "" : "—";
      else if(typeof c.v === "number") txt = isPct ? fmt1(c.v) + "%" : (c.v % 1 === 0 ? String(c.v) : fmt1(c.v));
      else txt = escAttr(String(c.v));
      if(c.sub) txt += '<br><span style="font-size:7.5px;opacity:.78;font-weight:800">' + escAttr(c.sub) + '</span>';
      const style = (sd.bg?'background:#'+sd.bg+';':'') + (sd.fg?'color:#'+sd.fg+';':'') + (sd.b?'font-weight:900;':'');
      let extra = "";
      if(c.dr) extra += ' data-drill="' + escAttr(JSON.stringify(c.dr)) + '"';
      if(c.sd) extra += ' data-storedrill="' + escAttr(JSON.stringify(c.sd)) + '"';
      const cls = [(c.dr||c.sd)?"dlk":"", (frozenCols>=2 && ci===1 && !(c.span>1))?"c2":""].filter(Boolean).join(" ");
      tr += '<' + (isHead?'th':'td') + (c.span>1?' colspan="'+c.span+'"':'') +
        (cls?' class="'+cls+'"':'') + extra +
        (c.tip?' data-tip="'+escAttr(c.tip)+'" title="'+escAttr(c.tip)+'"':'') +
        (style?' style="'+style+'"':'') + '>' + txt + '</' + (isHead?'th':'td') + '>';
    });
    tr += "</tr>";
    if(isHead){ head += '<tr data-hrow="'+ri+'">' + tr.slice(4); } else { body += tr; }
  });
  return '<table class="dtbl" data-frozen="'+frozen+'"'+(frozenCols>=2?' data-froz2="1"':'')+'><thead>' + head + '</thead><tbody>' + body + '</tbody></table>';
}

/* ── Excel engine: grids → real .xls workbook (SpreadsheetML) ── */
function dashStylesXML(){
  let out = '<Styles><Style ss:ID="Default" ss:Name="Normal"><Font ss:FontName="Arial" ss:Size="9"/></Style>';
  Object.keys(DSTYLES).forEach(id=>{
    const o = DSTYLES[id];
    out += '<Style ss:ID="' + id + '">' +
      (o.fmt ? '<NumberFormat ss:Format="' + xmlEsc(o.fmt) + '"/>' : '') +
      '<Alignment ss:Horizontal="' + (o.al || "Center") + '" ss:Vertical="Center" ss:WrapText="0"/>' +
      (o.bg ? '<Interior ss:Color="#' + o.bg + '" ss:Pattern="Solid"/>' : '') +
      '<Font ss:FontName="Arial" ss:Size="9" ss:Color="#' + (o.fg || "23423A") + '"' + (o.b ? ' ss:Bold="1"' : '') + '/>' +
      '<Borders><Border ss:Position="Top" ss:LineStyle="Continuous" ss:Weight="1" ss:Color="#C9DCD1"/><Border ss:Position="Bottom" ss:LineStyle="Continuous" ss:Weight="1" ss:Color="#C9DCD1"/><Border ss:Position="Left" ss:LineStyle="Continuous" ss:Weight="1" ss:Color="#C9DCD1"/><Border ss:Position="Right" ss:LineStyle="Continuous" ss:Weight="1" ss:Color="#C9DCD1"/></Borders>' +
      '</Style>';
  });
  return out + '</Styles>';
}

function dashCellXML(c){
  if(c === null || c === undefined) c = { v:"" };
  const isNum = typeof c.v === "number" && isFinite(c.v);
  let attrs = "";
  if(c.span > 1) attrs += ' ss:MergeAcross="' + (c.span - 1) + '"';
  if(c.s) attrs += ' ss:StyleID="' + c.s + '"';
  if(c.f) attrs += ' ss:Formula="' + xmlEsc(c.f) + '"';   // shows in Excel's formula bar (e.g. =8/9*100)
  const v = isNum ? String(c.v) : xmlEsc(String(c.v === null || c.v === undefined ? "" : c.v));
  return '<Cell' + attrs + '><Data ss:Type="' + (isNum ? "Number" : "String") + '">' + v + '</Data></Cell>';
}

function dashSheetName(s){
  return String(s).replace(/[\[\]:*?\/\\]/g, " ").substring(0, 31) || "Sheet";
}

function dashSheetXML(name, grid, opts){
  opts = opts || {};
  const frozen = opts.frozen || 1;
  let cols = '<Column ss:AutoFitWidth="0" ss:Width="' + (opts.firstColW || 150) + '"/>';
  const rows = grid.map(r => '<Row ss:AutoFitHeight="0" ss:Height="17">' + r.map(dashCellXML).join("") + '</Row>').join("");
  return '<Worksheet ss:Name="' + xmlEsc(dashSheetName(name)) + '">' +
    '<Table ss:DefaultColumnWidth="' + (opts.colW || 64) + '" ss:DefaultRowHeight="17">' + cols + rows + '</Table>' +
    '<WorksheetOptions xmlns="urn:schemas-microsoft-com:office:excel">' +
      '<FreezePanes/><FrozenNoSplit/>' +
      '<SplitHorizontal>' + frozen + '</SplitHorizontal><TopRowBottomPane>' + frozen + '</TopRowBottomPane>' +
      '<SplitVertical>1</SplitVertical><LeftColumnRightPane>1</LeftColumnRightPane>' +
      '<ActivePane>0</ActivePane>' +
    '</WorksheetOptions></Worksheet>';
}

function downloadDashWorkbook(filename, sheets){
  const xml = '<?xml version="1.0"?>\n<?mso-application progid="Excel.Sheet"?>\n' +
    '<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">' +
    dashStylesXML() +
    sheets.map(s => dashSheetXML(s.name, s.grid, s.opts)).join("") +
    '</Workbook>';
  try{
    const blob = new Blob([xml], { type:"application/vnd.ms-excel" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    document.body.appendChild(a); a.click(); a.remove();
    showToast("DOWNLOADED ✓");
  }catch(e){ try{ showToast("DOWNLOAD FAILED", true); }catch(_){} }
}

/* ── shared matrix scaffolding (Category master header + SKU sub-header) ── */
function dashCatSkuColumns(rows, ix){
  const map = {};
  rows.forEach(r=>{
    const cat = String(r[ix.cat]||"").trim(), pn = String(r[ix.pn]||"").trim();
    if(!cat || !pn) return;
    if(!map[cat]) map[cat] = {};
    map[cat][pn] = 1;
  });
  const cats = Object.keys(map).sort();
  const cols = [];
  cats.forEach(c => Object.keys(map[c]).sort().forEach(p => cols.push({ cat:c, sku:p })));
  return { cats, cols };
}

function dashStoreRows(rows, ix){
  const m = {};
  rows.forEach(r=>{ const sc=String(r[ix.sc]||""); if(sc && !m[sc]) m[sc] = String(r[ix.sn]||sc); });
  return Object.keys(m).map(c=>({ code:c, name:m[c] })).sort((a,b)=>a.name.localeCompare(b.name));
}

/* ── PAGE 1: ATTENDANCE (emps × days) ── */
function dashGridAttendance(rows){
  const ix = S.dash.ix, days = dashDays();
  const list = dashEmpList(rows);
  const cell = {};   // ec|dd → {p:bool, sh:code, stores:Set}
  function shortR(s){ const u=String(s).toUpperCase();
    if(u.indexOf("CLOSED")>=0) return "SC"; if(u.indexOf("ADHOC")>=0) return "AT";
    if(u.indexOf("EMERGENCY")>=0) return "EL"; if(u.indexOf("AUDIT")>=0) return "UA";
    if(u.indexOf("BAN")>=0) return "BN"; return "AB"; }
  rows.forEach(r=>{
    const a = String(r[ix.att]||"").trim(); if(!a) return;
    const k = r[ix.ec] + "|" + dDayOf(r[ix.dt]);
    if(!cell[k]) cell[k] = { p:false, reasons:[], stores:{} };
    if(a.toUpperCase()==="PRESENT"){ cell[k].p = true; cell[k].stores[String(r[ix.sn]||"")] = 1; }
    else { const rs = String(r[ix.rsn]||a); if(cell[k].reasons.indexOf(rs)<0) cell[k].reasons.push(rs); }
  });
  // Resolve every employee×day into a single code (P / AB / WO / L / H / EL / SC / AT / UA / BN / ? / "").
  function dayCode(ec, d){
    const c = cell[ec+"|"+d];
    if(c){ if(c.p) return {code:"P", n:Object.keys(c.stores).length, stores:Object.keys(c.stores)};
      return {code: shortR(c.reasons.join(" / ")), reason:c.reasons.join(" / ")}; }
    const asg = (S.dash.assigned && S.dash.assigned[ec]) ? S.dash.assigned[ec][d] : undefined;
    if(asg==="WO") return {code:"WO"};
    if(asg==="L") return {code:"L"};
    if(asg==="H") return {code:"H"};
    if(typeof asg==="number" && asg>0) return {code:"AB", asg:asg};
    if(typeof asg==="number") return {code:"?"};
    return {code:""};
  }
  const styleFor = { P:"OK_G", AB:"BAD_R", WO:"MUT", L:"WARN", H:"MUT", EL:"BAD_R", SC:"WARN", AT:"WARN", UA:"WARN", BN:"BAD_R", "?":"MUT", "":null };
  // ── TOTALS BAND (rows on top): per-day counts of P / AB / WO / L / EL ──
  const TBANDS = [["P","TOTAL PRESENT","TOTP"],["AB","TOTAL ABSENT","TOTA"],["WO","TOTAL WEEK-OFF","TOTW"],["L","TOTAL LEAVE","TOTL"],["EL","TOTAL EMERG. LEAVE","TOTE"]];
  const dayTot = {}; TBANDS.forEach(b=> dayTot[b[0]] = {});
  list.forEach(e=> days.forEach(d=>{ const r = dayCode(e.code,d).code; if(dayTot[r]) dayTot[r][d] = (dayTot[r][d]||0)+1; }));
  // header row
  const head = [{v:"EMPLOYEE", s:"THDAY"},{v:"CODE", s:"THDAY"}].concat(days.map(d=>({v:+d, s:"THDAY"})), [{v:"P-DAYS", s:"THDAY"}]);
  const grid = [];
  TBANDS.forEach(b=>{
    const trow = [{v:b[1], s:b[2], span:2}];
    let tot=0;
    days.forEach(d=>{ const n=dayTot[b[0]][d]||0; tot+=n; trow.push({v:n||"", s:b[2]}); });
    trow.push({v:tot, s:b[2]});
    grid.push(trow);
  });
  grid.push(head);
  list.forEach(e=>{
    let pd = 0;
    const row = [{v:e.name, s:"ROWH", tip:e.code}, {v:e.code, s:"TXT"}];
    days.forEach(d=>{
      const dc = dayCode(e.code, d);
      if(dc.code==="P"){ pd++; row.push({v:"P", s:"OK_G", tip:dc.n+" STORE"+(dc.n>1?"S":"")+": "+dc.stores.join(", ")}); }
      else if(dc.code===""){ row.push({v:""}); }
      else {
        const tip = dc.code==="AB" ? "ABSENT — NO REPORT ("+(dc.asg||0)+" STORE"+((dc.asg||0)>1?"S":"")+" ASSIGNED)"
          : dc.code==="WO" ? "WEEK OFF (MJP)" : dc.code==="L" ? "LEAVE (MJP)" : dc.code==="H" ? "HOLIDAY (MJP)"
          : dc.code==="?" ? "MJP PLAN TEXT COULD NOT BE PARSED" : (dc.reason||dc.code);
        row.push({v:dc.code, s:styleFor[dc.code]||"WARN", tip:tip});
      }
    });
    row.push({v:pd, s:"BTXT"});
    grid.push(row);
  });
  return { title:"ATTENDANCE", grid, opts:{frozen: TBANDS.length+1, firstColW:150},
    note:"TOP ROWS = DAY-WISE TOTALS · P=PRESENT · AB=ABSENT (ASSIGNED, NO REPORT) · WO=WEEK OFF · L=LEAVE · H=HOLIDAY · EL=EMERGENCY LEAVE · SC=STORE CLOSED · AT=ADHOC · UA=UNDER AUDIT · BN=BANNED · ?=PLAN NOT PARSED — TAP A CELL FOR DETAILS" };
}

/* ── PAGE 2: STORE COMPLIANCE (completed/assigned per day) ── */
function dashGridCompliance(rows){
  const ix = S.dash.ix, days = dashDays();
  const list = dashEmpList(rows);
  const done = {};   // ec|dd → Set(storeCode)
  rows.forEach(r=>{
    if(String(r[ix.att]||"").toUpperCase()!=="PRESENT") return;
    const k = r[ix.ec] + "|" + dDayOf(r[ix.dt]);
    if(!done[k]) done[k] = {};
    done[k][String(r[ix.sc]||"")] = 1;
  });
  function cellFor(ec, d){
    const dn = done[ec+"|"+d] ? Object.keys(done[ec+"|"+d]).length : 0;
    const asg = S.dash.assigned && S.dash.assigned[ec] ? S.dash.assigned[ec][d] : undefined;
    return { dn, asg };
  }
  // ── TOTALS BAND: per-day Σdone / Σassigned, and a completion-rate row ──
  const dDone={}, dAsg={};
  list.forEach(e=> days.forEach(d=>{ const c=cellFor(e.code,d);
    if(typeof c.asg==="number"){ dAsg[d]=(dAsg[d]||0)+c.asg; }
    dDone[d]=(dDone[d]||0)+c.dn; }));
  const head = [{v:"EMPLOYEE", s:"THDAY"},{v:"CODE", s:"THDAY"}].concat(days.map(d=>({v:+d, s:"THDAY"})), [{v:"MONTH", s:"THDAY"}]);
  const grid = [];
  // completed row
  (function(){ const r=[{v:"TOTAL COMPLETED", s:"TOTP", span:2}]; let t=0; days.forEach(d=>{ const n=dDone[d]||0; t+=n; r.push({v:n||"", s:"TOTP"}); }); r.push({v:t, s:"TOTP"}); grid.push(r); })();
  // assigned row
  (function(){ const r=[{v:"TOTAL ASSIGNED", s:"TOTW", span:2}]; let t=0; days.forEach(d=>{ const n=dAsg[d]||0; t+=n; r.push({v:n||"", s:"TOTW"}); }); r.push({v:t, s:"TOTW"}); grid.push(r); })();
  // completion % row (show as text with % so it never collides with count rows)
  (function(){ const r=[{v:"COMPLETION %", s:"TOTE", span:2}]; let td=0,ta=0;
    days.forEach(d=>{ const dn=dDone[d]||0, an=dAsg[d]||0; td+=dn; ta+=an;
      r.push({v: an>0 ? fmt1(dn/an*100)+"%" : "", s:"TOTE"}); });
    r.push({v: ta>0 ? fmt1(td/ta*100)+"%" : "", s:"TOTE"}); grid.push(r); })();
  grid.push(head);
  list.forEach(e=>{
    let tD=0, tA=0;
    const row = [{v:e.name, s:"ROWH", tip:e.code}, {v:e.code, s:"TXT"}];
    days.forEach(d=>{
      const c = cellFor(e.code, d), dn=c.dn, asg=c.asg;
      if(asg==="WO"||asg==="L"||asg==="H"){ row.push({v:asg, s:"MUT", tip:asg==="WO"?"WEEK OFF":asg==="L"?"LEAVE":"HOLIDAY"}); return; }
      if(typeof asg === "number" && asg > 0){
        tD+=dn; tA+=asg;
        row.push({v:dn+"/"+asg, s:dn>=asg?"OK_G":(dn>0?"WARN":"BAD_R"), tip:"COMPLETED "+dn+" OF "+asg+" ASSIGNED STORES"});
      } else if(typeof asg === "number"){
        tD+=dn;
        row.push(dn>0 ? {v:dn+"/?", s:"WARN", tip:"COMPLETED "+dn+" — MJP PLAN TEXT COULD NOT BE PARSED"} : {v:"?", s:"MUT", tip:"MJP PLAN TEXT COULD NOT BE PARSED"});
      } else if(dn > 0){ tD+=dn; row.push({v:dn+"/\u2013", s:"WARN", tip:"COMPLETED "+dn+" — NO MJP PLAN THIS DAY"}); }
      else row.push({v:""});
    });
    row.push({v:tD+"/"+(tA||"\u2013"), s:"BTXT", tip:"MONTH TOTAL: COMPLETED/ASSIGNED"});
    grid.push(row);
  });
  return { title:"STORE COMPLIANCE", grid, opts:{frozen:4, firstColW:150},
    note:"TOP ROWS = DAY-WISE TOTALS & COMPLETION % · CELL = COMPLETED/ASSIGNED STORES THAT DAY · WO=WEEK OFF · L=LEAVE · H=HOLIDAY" };
}

/* ── PAGE 3: SOS% (stores × categories, averages till date) ── */
function dashGridSOS(rows){
  const ix = S.dash.ix;
  const drows = rows.filter(r=>String(r[ix.cat]||"").trim() && (dNumOrNull(r[ix.pf])!==null || dNumOrNull(r[ix.sos])!==null));
  const stores = dashStoreRows(drows, ix);
  const catSet = {};
  const agg = {};   // sc|cat → {p,a,sS,sN}
  drows.forEach(r=>{
    const cat = String(r[ix.cat]||"").trim();
    catSet[cat] = 1;
    const k = r[ix.sc] + "|" + cat;
    if(!agg[k]) agg[k] = { p:0, a:0, sS:0, sN:0 };
    dashAccumSOS(agg[k], r, ix);
  });
  const cats = Object.keys(catSet).sort();
  const grid = [[{v:"STORE", s:"TH"},{v:"STORE CODE", s:"TH"}].concat(cats.map(c=>({v:c, s:"TH"})))];
  const colAgg = {};
  stores.forEach(st=>{
    const row = [{v:st.name, s:"ROWH", tip:"TAP FOR DAY-WISE DETAIL · "+st.code, sd:{pg:"sos", store:st.code, label:st.name}}, {v:st.code, s:"TXT"}];
    cats.forEach(c=>{
      const o = agg[st.code+"|"+c];
      if(o){ if(!colAgg[c]) colAgg[c] = {p:0,a:0,sS:0,sN:0};
        colAgg[c].p+=o.p; colAgg[c].a+=o.a; colAgg[c].sS+=o.sS; colAgg[c].sN+=o.sN; }
      row.push(dashSosCell(o));
    });
    grid.push(row);
  });
  const tail = [{v:"CATEGORY AVG", s:"TH2"},{v:"", s:"TH2"}];
  cats.forEach(c=> tail.push(dashSosCell(colAgg[c], "BPCT")));
  grid.push(tail);
  return { title:"SOS% — STORE × CATEGORY", grid, opts:{frozen:1, frozenCols:2, firstColW:160},
    note:"SOS% = Σ PATANJALI FACE-UPS ÷ Σ ALL-BRAND FACE-UPS × 100 (NOT AN AVERAGE OF PERCENTAGES) · TAP A STORE NAME FOR DAY-WISE DETAIL" };
}

/* ── generic store × (category→SKU) matrix ── */
function dashMatrixGrid(rows, valueFn, rowExtra, withCode){
  const ix = S.dash.ix;
  const { cats, cols } = dashCatSkuColumns(rows, ix);
  const stores = dashStoreRows(rows, ix);
  const h1 = withCode ? [{v:"STORE", s:"TH"},{v:"STORE CODE", s:"TH"}] : [{v:"STORE", s:"TH"}];
  cats.forEach(c=>{ const n = cols.filter(x=>x.cat===c).length; h1.push({v:c, s:"TH", span:n}); });
  const h2 = withCode ? [{v:"", s:"TH2"},{v:"", s:"TH2"}] : [{v:"", s:"TH2"}];
  cols.forEach(c=> h2.push({v:c.sku, s:"TH2"}));
  const grid = [h1, h2];
  stores.forEach(st=>{
    const lab = {v:st.name, s:"ROWH", tip:st.code};
    if(rowExtra) Object.assign(lab, rowExtra(st) || {});
    const row = withCode ? [lab, {v:st.code, s:"TXT"}] : [lab];
    cols.forEach(col=> row.push(valueFn(st, col) || {v:""}));
    grid.push(row);
  });
  return { grid, colCount: cols.length };
}

/* ── PAGE 4: DISCOUNT % (stores × SKUs under category headers) ── */
function dashGridDiscount(rows){
  const ix = S.dash.ix;
  const agg = {};   // sc|sku → {m,s,dS,dN}
  const drows = rows.filter(r=>{
    const m = dNumOrNull(r[ix.mrp]), sp = dNumOrNull(r[ix.sp]);
    return (m!==null && sp!==null && m>0 && sp>0 && sp<=m) || dNumOrNull(r[ix.disc])!==null;
  });
  drows.forEach(r=>{
    const k = r[ix.sc] + "|" + r[ix.pn];
    if(!agg[k]) agg[k] = { m:0, s:0, dS:0, dN:0 };
    dashAccumDisc(agg[k], r, ix);
  });
  const m = dashMatrixGrid(drows, (st, col)=>{
    return dashDiscCell(agg[st.code+"|"+col.sku]);
  }, st => ({ tip:"TAP FOR DAY-WISE DETAIL · "+st.code, sd:{pg:"disc", store:st.code, label:st.name} }), true);
  return { title:"DISCOUNT % — STORE × SKU", grid:m.grid, opts:{frozen:2, frozenCols:2, firstColW:160},
    note:"DISCOUNT% = Σ(MRP − SELLING PRICE) ÷ Σ MRP × 100 ACROSS ALL VISITS (NOT AN AVERAGE OF PERCENTAGES) · TAP A STORE NAME FOR DAY-WISE DETAIL" };
}

/* ── PAGE 5: STOCK-OUT TREND (OOS visits / total visits, colour-banded) ── */
function dashGridTrend(rows){
  const ix = S.dash.ix;
  const agg = {};
  rows.forEach(r=>{
    const av = String(r[ix.av]||"").trim(); if(!av) return;
    const k = r[ix.sc] + "|" + r[ix.pn];
    if(!agg[k]) agg[k] = { o:0, t:0 };
    agg[k].t++;
    if(av.toUpperCase().indexOf("OUT") >= 0) agg[k].o++;
  });
  const m = dashMatrixGrid(rows.filter(r=>String(r[ix.av]||"").trim()!==""), (st, col)=>{
    const a = agg[st.code+"|"+col.sku];
    if(!a || !a.t) return null;
    const p = a.o/a.t*100;
    return { v:a.o+"/"+a.t, s:trendStyle(p),
      tip:"OOS "+a.o+" OF "+a.t+" VISIT"+(a.t>1?"S":"")+" ( "+a.o+" ÷ "+a.t+" × 100 = "+fmt1(p)+"% )" };
  }, null, true);
  return { title:"STOCK-OUT TREND — STORE × SKU", grid:m.grid, opts:{frozen:2, frozenCols:2, firstColW:160},
    note:"CELL = OOS VISITS / TOTAL VISITS · COLOUR BY OOS RATIO: 🟥 80-100% · 🟨 31-79% · 🟩 0-30% — TAP A CELL FOR THE % WORKING" };
}

/* ── PAGE 6: CONSECUTIVE STOCK-OUTS ── */
function dashConsecutiveList(rows){
  const ix = S.dash.ix;
  const map = {};
  rows.forEach(r=>{
    const av = String(r[ix.av]||"").trim(); if(!av) return;
    const k = r[ix.sc] + "|" + r[ix.pbb] + "|" + r[ix.pn];
    if(!map[k]) map[k] = { sku:String(r[ix.pn]||""), store:String(r[ix.sn]||""), storeCode:String(r[ix.sc]||""),
      acc:String(r[ix.acc]||""), pbb:(ix.pbb>=0?String(r[ix.pbb]||""):""), cac:(ix.cac>=0?String(r[ix.cac]||""):""),
      so:String(r[ix.so]||""), emp:String(r[ix.en]||""), empCode:String(r[ix.ec]||""), visits:{} };
    const d = String(r[ix.dt]||"");
    map[k].visits[d] = map[k].visits[d] || false;
    if(av.toUpperCase().indexOf("OUT") >= 0) map[k].visits[d] = true;
  });
  const out = [];
  Object.keys(map).forEach(k=>{
    const m = map[k];
    const dates = Object.keys(m.visits).sort((a,b)=>dKeyDate(a)-dKeyDate(b));
    let streak = 0; const sd = [];
    for(let i=dates.length-1; i>=0; i--){
      if(m.visits[dates[i]]){ streak++; sd.unshift(dates[i]); } else break;
    }
    if(streak >= 2) out.push({ sku:m.sku, store:m.store, storeCode:m.storeCode, acc:m.acc, pbb:m.pbb, cac:m.cac, so:m.so, emp:m.emp, empCode:m.empCode, dates:sd, streak });
  });
  out.sort((a,b)=> b.streak - a.streak || a.store.localeCompare(b.store));
  return out;
}

function dashGridConsecutive(rows){
  const list = dashConsecutiveList(rows);
  const grid = [[
    {v:"SKU", s:"TH"},{v:"PBB CODE", s:"TH"},{v:"CHAIN ARTICLE CODE", s:"TH"},{v:"STORE", s:"TH"},{v:"STORE CODE", s:"TH"},{v:"ACCOUNT", s:"TH"},{v:"SO NAME", s:"TH"},
    {v:"MERCHANDISER / SI", s:"TH"},{v:"SI CODE", s:"TH"},{v:"DATES VISITED (STREAK)", s:"TH"},{v:"CONSISTENT OOS", s:"TH"}
  ]];
  list.forEach(x=> grid.push([
    {v:x.sku, s:"ROWH"},{v:x.pbb, s:"TXT"},{v:x.cac, s:"TXT"},{v:x.store, s:"TXT"},{v:x.storeCode, s:"TXT"},{v:x.acc, s:"TXT"},{v:x.so, s:"TXT"},
    {v:x.emp, s:"TXT"},{v:x.empCode, s:"TXT"},{v:x.dates.join(", "), s:"TXT"},
    {v:x.streak, s: x.streak>=4 ? "BAD_R" : x.streak>=3 ? "ORG" : "WARN", tip:x.streak+" VISITS IN A ROW OUT OF STOCK"}
  ]));
  return { title:"CONSISTENT STOCK-OUTS", grid, opts:{frozen:1, firstColW:180},
    note:"SKUs OUT OF STOCK ON 2+ CONSECUTIVE VISITS (LATEST VISIT STILL OOS), MOST SEVERE FIRST" };
}

/* ── RAW: filtered response rows ── */
function dashGridRaw(rows){
  const h = S.dash.headers, ix = S.dash.ix;
  const grid = [h.map(x=>({v:x, s:"TH"}))];
  rows.forEach(r=> grid.push(r.map((v,i)=>{
    const n = dNumOrNull(v);
    if((i===ix.sos || i===ix.disc) && n!==null) return {v:n, s:"PCT"};
    return (n!==null && (i===ix.qty||i===ix.mrp||i===ix.sp)) ? {v:n, s:"TXT"} : {v:v, s:"TXT"};
  })));
  return { title:"RESPONSES (FILTERED)", grid, opts:{frozen:1, firstColW:90}, note:"" };
}

function dashBuildPage(tab, rows){
  if(tab==="ov") return dashGridOverviewExport(rows, false);
  if(tab==="sos") return (S.dash.detail && S.dash.detail.pg==="sos") ? dashGridStoreDetailSOS(rows, S.dash.detail) : dashGridSOS(rows);
  if(tab==="disc") return (S.dash.detail && S.dash.detail.pg==="disc") ? dashGridStoreDetailDisc(rows, S.dash.detail) : dashGridDiscount(rows);
  if(tab==="comp") return dashGridCompliance(rows);
  if(tab==="trend") return dashGridTrend(rows);
  if(tab==="oos") return dashGridConsecutive(rows);
  return dashGridAttendance(rows);
}

/* ── shared Σ-aggregation helpers ── */
function dashAccumSOS(o, r, ix){
  const p = dNumOrNull(r[ix.pf]), a = dNumOrNull(r[ix.af]);
  if(p !== null && a !== null && a > 0){ o.p += p; o.a += a; }
  else { const sv = dNumOrNull(r[ix.sos]); if(sv !== null){ o.sS += sv; o.sN++; } }
}
function dashSosCell(o, sid){
  if(!o) return {v:""};
  if(o.a > 0) return { v:Math.round(o.p/o.a*1000)/10, s:(sid||"PCT"),
    tip:"Σ " + o.p + " PATANJALI ÷ Σ " + o.a + " ALL-BRAND FACE-UPS × 100" };
  if(o.sN > 0) return { v:Math.round(o.sS/o.sN*10)/10, s:(sid||"PCT"),
    tip:"AVG OF " + o.sN + " SOS ENTRIES (FACE-UP COUNTS NOT RECORDED)" };
  return {v:""};
}
function dashAccumDisc(o, r, ix){
  const m = dNumOrNull(r[ix.mrp]), sp = dNumOrNull(r[ix.sp]);
  if(m !== null && sp !== null && m > 0 && sp > 0 && sp <= m){ o.m += m; o.s += sp; }
  else { const dv = dNumOrNull(r[ix.disc]); if(dv !== null){ o.dS += dv; o.dN++; } }
}
function dashDiscCell(o){
  if(!o) return null;
  if(o.m > 0) return { v:Math.round((o.m-o.s)/o.m*1000)/10, s:"PCT",
    tip:"Σ(MRP−SP) " + fmt1(o.m-o.s) + " ÷ Σ MRP " + fmt1(o.m) + " × 100" };
  if(o.dN > 0) return { v:Math.round(o.dS/o.dN*10)/10, s:"PCT", tip:"AVG OF " + o.dN + " DISCOUNT ENTRIES" };
  return null;
}

/* ── employee list for attendance/compliance: full scope, filter-aware ── */
function dashEmpList(rows){
  const f = S.dash.filters || {}, ix = S.dash.ix;
  // An employee passes the active filters (branch toggle, city, account, SO, ASM, emp).
  function passes(ec){
    const e = EMPLOYEES[ec] || {};
    if(f.emp && ec !== f.emp) return false;
    if(f.so && String(e.soName||"") !== f.so) return false;
    if(f.asm && String(e.asmName||"") !== f.asm) return false;
    if(f.branch || f.city || f.acc || f.store){
      const sts = (EMP_STORES[ec] || []).map(c=>STORES[c]).filter(Boolean);
      if(f.branch && !sts.some(s=>String(s.branch||s.state||"")===f.branch)) return false;
      if(f.store && !sts.some(s=>String(s.code)===f.store)) return false;
      if(f.city && !sts.some(s=>s.city===f.city)) return false;
      if(f.acc && !sts.some(s=>s.chain===f.acc)) return false;
    }
    return true;
  }
  // Build the set from scope, but ALSO confirm via the actual filtered rows so the
  // employee list, the MJP-derived totals, and the day cells all describe the SAME
  // population. When a toggle/filter is on, an employee shows only if they pass it.
  const seen = {};
  const codes = [];
  (S.dash.scopeEmps || []).forEach(ec=>{ if(passes(ec) && !seen[ec]){ seen[ec]=1; codes.push(ec); } });
  (rows || []).forEach(r=>{ const ec = String(r[ix.ec]||""); if(ec && !seen[ec] && passes(ec)){ seen[ec]=1; codes.push(ec); } });
  return codes.map(c=>({ code:c, name:(EMPLOYEES[c] && EMPLOYEES[c].name) || c }))
    .sort((a,b)=>a.name.localeCompare(b.name));
}

/* ── OVERVIEW: account × geography drill-down (ZM: branch→city→store→cat→sku; ASM: city→…; SO: store→…) ── */
function ovChain(){
  const r = (S.mgr && S.mgr.role) || "SO";
  return r === "ZM" ? ["branch","city","store","cat","sku"]
       : r === "ASM" ? ["city","store","cat","sku"]
       : ["store","cat","sku"];
}
function ovLevelName(lv){
  return lv==="branch"?"BRANCH":lv==="city"?"CITY":lv==="store"?"STORE":lv==="cat"?"CATEGORY":"SKU";
}
function ovRowsAtState(rows, path, acc){
  const ix = S.dash.ix;
  let rs = rows;
  (path || []).forEach(pp=>{
    if(pp.lv === "branch") rs = rs.filter(r=>String(r[ix.branch]||"") === pp.val);
    else if(pp.lv === "city") rs = rs.filter(r=>String(r[ix.city]||"") === pp.val);
    else if(pp.lv === "store") rs = rs.filter(r=>String(r[ix.sc]||"") === pp.val);
    else if(pp.lv === "cat") rs = rs.filter(r=>String(r[ix.cat]||"") === pp.val);
  });
  if(acc) rs = rs.filter(r=>String(r[ix.acc]||"") === acc);
  return rs;
}
function ovAgg(rows, lv){
  const ix = S.dash.ix, m = {};
  rows.forEach(r=>{
    let key, lbl;
    if(lv === "branch"){ key = String(r[ix.branch]||""); lbl = key || "(NO BRANCH)"; }
    else if(lv === "city"){ key = String(r[ix.city]||""); lbl = key || "(NO CITY)"; }
    else if(lv === "store"){ key = String(r[ix.sc]||""); lbl = String(r[ix.sn]||key); }
    else if(lv === "cat"){ key = String(r[ix.cat]||"").trim(); lbl = key; }
    else { key = String(r[ix.pn]||"").trim(); lbl = key; }
    if(!key) return;
    if(!m[key]) m[key] = { key, lbl, inN:0, tot:0, p:0, a:0, sS:0, sN:0 };
    const o = m[key];
    const av = String(r[ix.av]||"").trim().toUpperCase();
    if(av){ o.tot++; if(av === "IN STOCK") o.inN++; }
    dashAccumSOS(o, r, ix);
  });
  return Object.values(m).sort((a,b)=>a.lbl.localeCompare(b.lbl));
}
function ovAvailCell(o){
  if(!o.tot) return {v:""};
  const p = o.inN/o.tot*100;
  return { v:Math.round(p*10)/10, s:"PCT",
    tip:"IN-STOCK " + o.inN + " OF " + o.tot + " INCIDENTS ( " + o.inN + " ÷ " + o.tot + " × 100 )" };
}
function ovTableGrid(titleTxt, lv, items, accForDrill, drillable){
  const grid = [
    [{v:titleTxt, s:"TH", span:3}],
    [{v:ovLevelName(lv), s:"TH2"},{v:"AVAILABILITY %", s:"TH2"},{v:"SOS %", s:"TH2"}]
  ];
  items.forEach(it=>{
    const lab = {v:it.lbl, s:"ROWH"};
    if(drillable){ lab.dr = { lv:lv, val:it.key, lbl:it.lbl, acc:accForDrill || "" }; lab.tip = "TAP TO DRILL DOWN"; }
    grid.push([lab, ovAvailCell(it), dashSosCell(it)]);
  });
  if(!items.length) grid.push([{v:"NO DATA", s:"MUT"},{v:""},{v:""}]);
  return grid;
}
function renderOverview(rows){
  if(!S.dash.ov) S.dash.ov = { path:[], acc:"" };
  const ov = S.dash.ov, chain = ovChain(), ix = S.dash.ix;
  if(ov.path.length >= chain.length) ov.path = ov.path.slice(0, chain.length - 1);
  const lv = chain[ov.path.length];
  const drillable = ov.path.length < chain.length - 1;
  const base = ovRowsAtState(rows, ov.path, ov.acc);
  let crumbs = '<span class="ov-crumb" data-crumb="-1">⌂ ALL</span>';
  ov.path.forEach((pp,i)=>{ crumbs += '<span class="ov-sep">›</span><span class="ov-crumb" data-crumb="' + i + '">' + escAttr(pp.lbl) + '</span>'; });
  if(ov.acc) crumbs += '<span class="ov-sep">·</span><span class="ov-acc">' + escAttr(ov.acc) + '</span>';
  let html = '<div class="ov-crumbs">' + crumbs + '</div>';
  if(ov.acc){
    html += '<div class="ov-block"><div class="tbl-wrap">' + dashGridHTML(ovTableGrid(ov.acc + " — " + ovLevelName(lv) + " WISE", lv, ovAgg(base, lv), ov.acc, drillable), 2) + '</div></div>';
  } else {
    html += '<div class="ov-block"><div class="tbl-wrap">' + dashGridHTML(ovTableGrid("ALL ACCOUNTS — COMBINED", lv, ovAgg(base, lv), "", drillable), 2) + '</div></div>';
    uniqSorted(base.map(r=>r[ix.acc])).forEach(acc=>{
      const accRows = base.filter(r=>String(r[ix.acc]||"") === acc);
      html += '<div class="ov-block"><div class="tbl-wrap">' + dashGridHTML(ovTableGrid(acc, lv, ovAgg(accRows, lv), acc, drillable), 2) + '</div></div>';
    });

}
function dashGridOverviewExport(rows, rootState){
  const ovS = rootState ? { path:[], acc:"" } : (S.dash.ov || { path:[], acc:"" });
  const chain = ovChain(), ix = S.dash.ix;
  const path = ovS.path.slice(0, Math.max(0, Math.min(ovS.path.length, chain.length - 1)));
  const lv = chain[path.length];
  const base = ovRowsAtState(rows, path, ovS.acc);
  const grid = [];
  function push(g){ if(grid.length) grid.push([{v:""}]); g.forEach(r=>grid.push(r)); }
  if(ovS.acc){ push(ovTableGrid(ovS.acc + " — " + ovLevelName(lv), lv, ovAgg(base, lv), "", false)); }
  else {
    push(ovTableGrid("ALL ACCOUNTS — COMBINED", lv, ovAgg(base, lv), "", false));
    uniqSorted(base.map(r=>r[ix.acc])).forEach(acc=>{
      push(ovTableGrid(acc, lv, ovAgg(base.filter(r=>String(r[ix.acc]||"") === acc), lv), "", false));
    });
  }
  const pathTxt = path.map(pp=>pp.lbl).join(" › ") + (ovS.acc ? " · " + ovS.acc : "");
  return { title:"OVERVIEW" + (pathTxt ? " — " + pathTxt : ""), grid, opts:{frozen:2, firstColW:170},
    note:"" };
}

/* ── store day-wise detail (opened by tapping a store on SOS / DISCOUNT) ── */
function dashGridStoreDetailSOS(rows, det){
  const ix = S.dash.ix;
  const rs = rows.filter(r=>String(r[ix.sc]||"") === det.store);
  const catSet = {}, dateSet = {}, agg = {};
  rs.forEach(r=>{
    const cat = String(r[ix.cat]||"").trim(); if(!cat) return;
    if(dNumOrNull(r[ix.pf]) === null && dNumOrNull(r[ix.sos]) === null) return;
    catSet[cat] = 1;
    const dt = String(r[ix.dt]||""); dateSet[dt] = 1;
    const k = dt + "|" + cat;
    if(!agg[k]) agg[k] = { p:0, a:0, sS:0, sN:0 };
    dashAccumSOS(agg[k], r, ix);
  });
  const cats = Object.keys(catSet).sort();
  const ds = Object.keys(dateSet).sort((a,b)=>dKeyDate(a)-dKeyDate(b));
  const grid = [[{v:"DATE", s:"TH"}].concat(cats.map(c=>({v:c, s:"TH"})))];
  ds.forEach(dt=>{
    const row = [{v:dt, s:"ROWH"}];
    cats.forEach(c=> row.push(dashSosCell(agg[dt + "|" + c])));
    grid.push(row);
  });
  return { title:"DAY-WISE SOS% — " + det.label, grid, opts:{frozen:1, firstColW:100},
    note:"EACH ROW = ONE VISIT DAY · SOS% = Σ PATANJALI ÷ Σ ALL-BRAND FACE-UPS × 100" };
}
function dashGridStoreDetailDisc(rows, det){
  const ix = S.dash.ix;
  const rs = rows.filter(r=>String(r[ix.sc]||"") === det.store && (
    (dNumOrNull(r[ix.mrp]) !== null && dNumOrNull(r[ix.sp]) !== null) || dNumOrNull(r[ix.disc]) !== null));
  const { cats, cols } = dashCatSkuColumns(rs, ix);
  const dateSet = {}, agg = {};
  rs.forEach(r=>{

    if(!agg[k]) agg[k] = { m:0, s:0, dS:0, dN:0 };

/* ── dashboard view ── */
function dashStats(rows){
  const ix = S.dash.ix;
  const rep = {}, stz = {};
  let pf=0, af=0, sosS=0, sosN=0, oo=0, ot=0;
  rows.forEach(r=>{
    if(String(r[ix.att]||"").toUpperCase()==="PRESENT"){ rep[r[ix.ec]+"|"+r[ix.dt]+"|"+r[ix.sc]]=1; stz[String(r[ix.sc]||"")]=1; }
    const p = dNumOrNull(r[ix.pf]), a = dNumOrNull(r[ix.af]);
    if(p!==null && a!==null && a>0){ pf+=p; af+=a; }
    else { const sv = dNumOrNull(r[ix.sos]); if(sv!==null){ sosS+=sv; sosN++; } }
    const av = String(r[ix.av]||"").trim(); if(av){ ot++; if(av.toUpperCase().indexOf("OUT")>=0) oo++; }
  });
  return { reports:Object.keys(rep).length, stores:Object.keys(stz).length,
    sos: af>0 ? fmt1(pf/af*100) : (sosN? fmt1(sosS/sosN):"—"), oos: ot? fmt1(oo/ot*100):"—" };
}

// ── MASTER QUERIES ──
function getZones() { return uniq(Object.values(STORES).map(s => s.zone)).filter(Boolean).sort(); }
function getStates(zone) {
  if (!zone) return [];
  return uniq(Object.values(STORES).filter(s => s.zone === zone).map(s => s.state)).sort();
}
function getCities(zone, state) {
  if (!zone || !state) return [];
  return uniq(Object.values(STORES).filter(s => s.zone === zone && s.state === state).map(s => s.city)).sort();
}
function getAccounts(zone, state, city) {
  if (!zone || !state || !city) return [];
  return uniq(Object.values(STORES).filter(s => s.zone === zone && s.state === state && s.city === city).map(s => s.chain)).sort();
}
function getStoresForCriteria(zone, state, city, accountChain) {
  return Object.values(STORES).filter(s => s.zone === zone && s.state === state && s.city === city && s.chain === accountChain);
}
function getEmployeesForCriteria(zone, state, city, accountChain) {
  const matchingStoreCodes = new Set(getStoresForCriteria(zone, state, city, accountChain).map(s => s.code));
  const result = [];
  for (const ec of Object.keys(EMPLOYEES)) {
    const stores = EMP_STORES[ec] || [];
    if (stores.some(sc => matchingStoreCodes.has(sc))) {
      result.push(EMPLOYEES[ec]);
    }
  }
  return result.sort((a,b) => (a.name || "").localeCompare(b.name || ""));
}
function getMJPStoresForEmployeeToday(empCode, zone, state, city, accountChain) {
  if (!empCode) return {type:"NONE", stores:[]};
  const m = window.__SAATHI_MASTER__;
  if (!m || !m.todays_plan) return {type:"NO_PLAN", stores:[]};
  if (!m.todays_plan.found_today_column) return {type:"NO_PLAN", stores:[]};
  const plan = m.todays_plan.plans && m.todays_plan.plans[empCode];
  if (!plan) return {type:"NO_PLAN", stores:[]};
  if (plan.status === "WEEK_OFF") return {type:"OFF", reason:"WEEK OFF", stores:[]};
  if (plan.status === "ON_LEAVE") return {type:"OFF", reason:"ON LEAVE", stores:[]};
  if (plan.status === "HOLIDAY") return {type:"OFF", reason:"HOLIDAY", stores:[]};
  // WORKING — filter today's stores by chain/city/etc match
  const stores = (plan.stores || []).filter(s =>
    s && s.code &&
    (!accountChain || s.chain === accountChain) &&
    (!city || s.city === city) &&
    (!state || s.state === state) &&
    (!zone || s.zone === zone)
  ).map(s => STORES[s.code] || s).filter(Boolean);
  return {type:"STORES", stores};
}
function getTotalMJPStoresForEmployeeToday(empCode) {
  if (!empCode) return 0;
  const m = window.__SAATHI_MASTER__;
  const plan = m && m.todays_plan && m.todays_plan.plans && m.todays_plan.plans[empCode];
  if (!plan || plan.status !== "WORKING") return 0;
  return (plan.stores || []).length;
}
function getStoresCompletedToday(empCode) {
  if (!empCode) return 0;
  const today = todayISO();
  const set = new Set();
  S.submissions.forEach(sub => {
    if (sub.empCode === empCode && sub.dateISO === today && sub.attendance === "PRESENT" && (sub.dataSynced || !sub.clientKey)) {
      set.add(sub.storeCode);
    }
  });
  return set.size;
}
function hasSubmittedTodayForStore(storeCode, empCode) {
  const today = todayISO();
  // A store is blocked when its report is CONFIRMED in the sheet (dataSynced) OR it
  // is an OLD report from before the sync update (no clientKey — e.g. Mukatsar),
  // which we treat as submitted. A FAILED new-format attempt does NOT block, so the
  // rep can re-submit it.
  return S.submissions.some(s => String(s.storeCode) === String(storeCode) && s.empCode === empCode && s.attendance === "PRESENT" && s.dateISO === today && (s.dataSynced || !s.clientKey));
}
function hasSubmittedAttendanceToday(empCode) {
  const today = todayISO();
  return S.submissions.some(s => s.empCode === empCode && s.dateISO === today && s.attendance !== "PRESENT");
}
function getEmployeeMJPTodayStatus(empCode) {
  if (!empCode) return {type:"NONE"};
  const m = window.__SAATHI_MASTER__;
  if (!m || !m.todays_plan) return {type:"NO_PLAN"};
  if (!m.todays_plan.found_today_column) return {type:"NO_PLAN"};
  const plan = m.todays_plan.plans && m.todays_plan.plans[empCode];
  if (!plan) return {type:"NO_PLAN"};
  if (plan.status === "WEEK_OFF") return {type:"OFF", reason:"WEEK OFF"};
  if (plan.status === "ON_LEAVE") return {type:"OFF", reason:"ON LEAVE"};
  if (plan.status === "HOLIDAY") return {type:"OFF", reason:"HOLIDAY"};
  if (plan.status === "WORKING") {
    const storeList = (plan.stores || []).map(s => s.name || s.code);
    return {type:"WORKING", count: (plan.stores||[]).length, stores: storeList, codes: (plan.stores||[]).map(s=>s.code)};
  }
  return {type:"NO_PLAN"};
}
function getSkus(account) { return SKU_MASTER[account] || []; }
function getCategoriesForAccount(account) { return uniq(getSkus(account).map(s => s.cat)); }
function getSkusByCat(account, cat) { return getSkus(account).filter(s => s.cat === cat); }
function isSkuAnswered(skuId) {
  const a = S.skuAns[skuId];
  if (!a || !a.status) return false;
  if (a.status === "OUT OF STOCK" || a.status === "NOT LISTED") return true;
  if (a.status === "IN STOCK") return a.qtyConfirmed && a.priceConfirmed;
  return false;
}
function isSkuStarted(skuId) {
  const a = S.skuAns[skuId];
  if (!a) return false;
  if (a.status) return true;
  return false;
}
function catHasAnyStarted(account, cat) {
  return getSkusByCat(account, cat).some(s => isSkuStarted(s.id));
}
function isCatComplete(account, cat) {
  const skus = getSkusByCat(account, cat);
  const skuDone = skus.length > 0 && skus.every(s => isSkuAnswered(s.id));
  const sosDone = S.sosData[cat] && S.sosData[cat].confirmed === true;
  const photoDone = (S.shelfPhotos && S.shelfPhotos[cat] && S.shelfPhotos[cat].length > 0) || !isPhotoMandatory();
  return skuDone && sosDone && photoDone;
}
function catAnsweredCount(account, cat) {
  return getSkusByCat(account, cat).filter(s => isSkuAnswered(s.id)).length;
}
function allSkusOutOfStockOrNotListed(account, cat) {
  const skus = getSkusByCat(account, cat);
  if (skus.length === 0) return false;
  return skus.every(s => {
    const a = S.skuAns[s.id];
    return a && (a.status === "OUT OF STOCK" || a.status === "NOT LISTED");
  });
}
function hasAnyInStockWithQty(account, cat) {
  const skus = getSkusByCat(account, cat);
  return skus.some(s => {
    const a = S.skuAns[s.id];
    return a && a.status === "IN STOCK" && a.qtyConfirmed && Number(a.qty) > 0;
  });
}
function validateSOS(account, cat) {
  const sos = S.sosData[cat] || {our:"", total:"", confirmed:false};
  if (sos.our === "" || sos.total === "") return {ok:false, error:"PLEASE FILL BOTH FACE-UP FIELDS"};
  const our = Number(sos.our), total = Number(sos.total);
  if (isNaN(our) || isNaN(total) || our < 0 || total < 0) return {ok:false, error:"FACE-UPS MUST BE NUMERIC AND ≥ 0"};
  if (total === 0) return {ok:false, error:"TOTAL CATEGORY FACE-UPS CANNOT BE ZERO"};
  if (total > 999) return {ok:false, error:"TOTAL FACE-UPS CANNOT EXCEED 999"};
  if (our > total) return {ok:false, error:"PATANJALI FACE-UPS CANNOT EXCEED TOTAL FACE-UPS"};
  if (allSkusOutOfStockOrNotListed(account, cat) && our !== 0) return {ok:false, error:"ALL SKUS ARE OUT OF STOCK / DELISTED — PATANJALI FACE-UPS MUST BE 0"};
  if (hasAnyInStockWithQty(account, cat)) {
    if (our === 0) return {ok:false, error:"YOU HAVE STOCK QUANTITY ENTERED — PATANJALI FACE-UPS CANNOT BE 0"};
    if (total === 0) return {ok:false, error:"YOU HAVE STOCK QUANTITY ENTERED — TOTAL FACE-UPS CANNOT BE 0"};
  }
  return {ok:true, error:null};
}
function getSOSPct(cat) {
  const sos = S.sosData[cat] || {};
  if (sos.our === "" || sos.total === "" || sos.our == null || sos.total == null) return null;
  const our = Number(sos.our), total = Number(sos.total);
  if (isNaN(our) || isNaN(total)) return null;
  if (total === 0) return our === 0 ? 0 : null;
  return Math.round(our / total * 100);
}
function getOverallSOS() {
  let our = 0, total = 0;
  Object.values(S.sosData).forEach(d => { our += Number(d.our||0); total += Number(d.total||0); });
  if (total === 0) return our === 0 ? 0 : null;
  return Math.round(our/total*100);
}
function validatePrice(skuId) {
  const a = S.skuAns[skuId];
  if (!a) return {ok:false, error:"NO DATA"};
  if (a.mrp === "" || a.sp === "") return {ok:false, error:"FILL BOTH MRP AND SP"};
  const mrp = Number(a.mrp), sp = Number(a.sp);
  if (isNaN(mrp) || isNaN(sp) || mrp <= 0 || sp <= 0) return {ok:false, error:"MRP & SP MUST BE > 0"};
  if (sp > mrp) return {ok:false, error:"SELLING PRICE CANNOT EXCEED MRP"};
  return {ok:true, error:null};
}

// Persistent pop-up for blocking validation errors (SP>MRP, zero face-ups,
// missing photos, etc.). Unlike a toast it stays until the user taps OK, so
// the rep always sees WHY they can't continue. Reuses the modal styles.
function showAlert(title, message) {
  if (message === undefined) { message = title; title = "⚠️ PLEASE CHECK"; }
  const m = $("modal-mount");
  if (!m) { try { alert((title ? title + "\n\n" : "") + message); } catch (_) {} return; }
  m.innerHTML =
    '<div class="modal-bg" id="__alert_bg__"><div class="modal">' +
      '<div class="modal-title">' + title + '</div>' +
      '<div class="modal-msg">' + message + '</div>' +
      '<div class="modal-btns"><button class="btn btn-primary" id="__alert_ok__">OK, GOT IT</button></div>' +
    '</div></div>';
  const ok = $("__alert_ok__"); if (ok) ok.addEventListener("click", closeAlert);
  const bg = $("__alert_bg__"); if (bg) bg.addEventListener("click", e => { if (e.target === bg) closeAlert(); });
}
function closeAlert() { const m = $("modal-mount"); if (m) m.innerHTML = ""; }
function showErrorPopup(msg) { showAlert(msg); }

// GPS GATE - block silent submission without a location fix.
// Shown at submit time whenever captureGPS() did NOT return CAPTURED.
// Reuses existing modal styles. Resolves to "retry" | "anyway".
function showGpsGate(status){
  var reasonMap = {
    "TIMEOUT":       "We could not lock your location in time. This usually happens indoors or on a weak signal.",
    "UNAVAILABLE":   "Location is currently unavailable. Your phone's location (GPS) may be switched OFF.",
    "DENIED":        "Location access was blocked for this app/site, so we cannot record where you are.",
    "FAILED":        "We could not get your location.",
    "NOT_SUPPORTED": "This device/browser cannot provide a location.",
    "UNKNOWN":       "We could not confirm your location."
  };
  var fixHint = (status === "DENIED")
    ? "To fix: allow Location for this app, then tap RETRY."
    : (status === "UNAVAILABLE")
      ? "To fix: turn ON your phone's Location / GPS, then tap RETRY."
      : "Move near an entrance or window for better signal, then tap RETRY.";
  var reason = reasonMap[status] || reasonMap.UNKNOWN;
  return new Promise(function(resolve){
    var m = $("modal-mount");
    if (!m) { resolve(confirm("LOCATION NOT CAPTURED. SUBMIT ANYWAY?") ? "anyway" : "retry"); return; }
    m.innerHTML =
      '<div class="modal-bg" id="__gps_bg__"><div class="modal">' +
        '<div class="modal-title">\uD83D\uDCCD LOCATION NOT CAPTURED</div>' +
        '<div class="modal-msg">' + reason + '<br><br><b>' + fixHint + '</b></div>' +
        '<div class="modal-btns">' +
          '<button class="btn btn-secondary" id="__gps_anyway__">SUBMIT ANYWAY</button>' +
          '<button class="btn btn-primary" id="__gps_retry__">RETRY GPS</button>' +
        '</div>' +
      '</div></div>';
    var done = function(v){ m.innerHTML = ""; resolve(v); };
    var r = $("__gps_retry__");  if (r) r.addEventListener("click", function(){ done("retry"); });
    var a = $("__gps_anyway__"); if (a) a.addEventListener("click", function(){ done("anyway"); });
  });
}

// PRE-FLIGHT LOCATION CHECK - run once when an audit starts.
// Warns the rep early if Location is OFF/blocked. Non-blocking.
var __locPreflightDone = false;
function preflightLocationCheck(){
  if (__locPreflightDone) return;
  __locPreflightDone = true;
  if (!navigator.geolocation) return;
  var warnOff = function(){
    showAlert("\uD83D\uDCCD TURN ON LOCATION",
      "Your phone's Location (GPS) looks switched OFF or blocked.<br><br>" +
      "Please turn it ON now so your store visit can be verified. " +
      "You'll be asked to capture GPS when you submit.");
  };
  if (navigator.permissions && navigator.permissions.query) {
    navigator.permissions.query({ name: "geolocation" })
      .then(function(res){ if (res && res.state === "denied") warnOff(); })
      .catch(function(){});
    return;
  }
  try {
    navigator.geolocation.getCurrentPosition(
      function(){},
      function(err){ if (err && (err.code === 1 || err.code === 2)) warnOff(); },
      { enableHighAccuracy: false, timeout: 4000, maximumAge: 600000 }
    );
  } catch (e) {}
}

// ═══════════════════════════════════════════════════════════════
function openLightbox(items, index){
  if(!items || !items.length) return;
  S.lightbox = { open:true, items:items.slice(), index: index || 0 };
  render();
}
function closeLightbox(){
  S.lightbox = { open:false, items:[], index:0 };
  render();
}
function lightboxNext(){
  if(S.lightbox.index < S.lightbox.items.length - 1){
    S.lightbox.index++; render();
  }
}
function lightboxPrev(){
  if(S.lightbox.index > 0){
    S.lightbox.index--; render();
  }
}
function renderLightbox(){
  if(!S.lightbox || !S.lightbox.open) return "";
  const items = S.lightbox.items;
  const idx = S.lightbox.index;
  return '<div class="lb-bg" onclick="closeLightbox()">' +
    '<button class="lb-close" onclick="event.stopPropagation();closeLightbox()">×</button>' +
    (items.length > 1 ? '<div class="lb-counter">' + (idx+1) + ' / ' + items.length + '</div>' : '') +
    '<img class="lb-img" src="' + items[idx] + '" onclick="event.stopPropagation()" alt="review"/>' +
    (items.length > 1
      ? '<button class="lb-nav prev" onclick="event.stopPropagation();lightboxPrev()" ' + (idx===0?"disabled":"") + '>‹</button>' +
        '<button class="lb-nav next" onclick="event.stopPropagation();lightboxNext()" ' + (idx===items.length-1?"disabled":"") + '>›</button>'
      : '') +
  '</div>';
}

let __lastView = null;
function render() {
  const app = $("app");
  const viewChanged = (S.view !== __lastView);
  if (S.view === "login") app.innerHTML = renderLogin();
  else if (S.view === "dash") app.innerHTML = renderDash();
  else if (S.view === "home") app.innerHTML = renderHome();
  else if (S.view === "audit") app.innerHTML = renderAudit();
  else if (S.view === "success") app.innerHTML = renderSuccess();
  else if (S.view === "att-done") app.innerHTML = renderAttDone();
  else if (S.view === "history") app.innerHTML = renderHistory();
  __lastView = S.view;
  // v3: append camera modal overlay if open
  if (S.camera && S.camera.open) {
    app.insertAdjacentHTML("beforeend", renderCameraModal());
  }
  // v3 update: append lightbox if open
  if (S.lightbox && S.lightbox.open) {
    app.insertAdjacentHTML("beforeend", renderLightbox());
  }
  bind();
  try { updateSyncBadge(); } catch (e) {}
  try { if (window.__saathiBackHooked) armBackBuffer(); } catch (e) {}
  // v10 polish: animate only when the visible page or category actually changes
  // (never on in-place re-renders like typing a quantity).
  try {
    const catChanged = (S.view === "audit" && S.currentCat !== window.__lastCatAnim);
    window.__lastCatAnim = S.currentCat;
    if (viewChanged || catChanged) { app.classList.remove("va"); void app.offsetWidth; app.classList.add("va"); }
    else { app.classList.remove("va"); }
  } catch (e) {}
  // Open every NEW page at the top (but not when only an overlay toggled, and
  // not on same-view in-place updates like confirming a SKU). Category changes
  // stay within the audit view and are handled by explicit scrollAuditToTop().
  if (viewChanged && !(S.camera && S.camera.open) && !(S.lightbox && S.lightbox.open)) {
    scrollAuditToTop();
  }
}

// Force the view back to the very top so a new page/category always opens at
// its FIRST question. In this layout the window is the real scroll container
// (the ".body" has no fixed height), and Chrome's scroll-anchoring used to
// snap it back — so we reset window + document + every ".body" + #app, run it
// immediately AND across two animation frames to beat any late re-layout.
function scrollAuditToTop() {
  const reset = () => {
    try {
      document.querySelectorAll(".body").forEach(b => { b.scrollTop = 0; });
      const app = document.getElementById("app");
      if (app) app.scrollTop = 0;
      if (document.scrollingElement) document.scrollingElement.scrollTop = 0;
      document.documentElement.scrollTop = 0;
      document.body.scrollTop = 0;
      window.scrollTo(0, 0);
    } catch (_) {}
  };
  reset();
  requestAnimationFrame(() => { reset(); requestAnimationFrame(reset); });
}

  // ── v10 LOGIN MODE: employee is fixed; they only choose CITY → ACCOUNT → STORE. ──
  const ec = S.empCode;
  const loginEmp = EMPLOYEES[ec] || null;
