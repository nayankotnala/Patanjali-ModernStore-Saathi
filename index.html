  if (city && accounts.length === 1 && !S.account) S.account = accounts[0]; // single account → auto-fill
  const acc = S.account;
  // Zone/branch are locked & auto-derived from the employee's store scope.
  const scopeStore = (acc ? cityStores.find(s => s.chain === acc) : cityStores[0]) || myStores[0] || null;
  S.zone  = (scopeStore && scopeStore.zone)  || (loginEmp && loginEmp.zone) || S.zone || "";
  S.state = (scopeStore && scopeStore.state) || (loginEmp && (loginEmp.branch || loginEmp.state)) || S.state || "";
  const z = S.zone, st = S.state, sc = S.storeCode, att = S.attendance;
  let mjpResult = null, empMJPStatus = null;

    } else if (empMJPStatus.type === "NO_PLAN") {

        '<div style="font-size:13px;font-weight:900;color:#92400e;">⚠️ NO MJP PLAN FOUND FOR TODAY</div>' +

    } else if (empMJPStatus.type === "WORKING") {

function renderAudit() {
  const accDisplay = S.account;
  const acc = CHAIN_TO_ACCOUNT[accDisplay] || accDisplay;
  const cats = getCategoriesForAccount(acc);
  if (cats.length === 0) {
    return '<div class="topbar"><button class="topbar-back" id="btn-cancel">✕</button><div class="topbar-title"><h2>PATANJALI MODERN TRADE SAATHI</h2><p>NO CATEGORIES</p></div></div><div class="empty">NO SKU DATA FOR THIS ACCOUNT.</div>';
  }
  let cat = S.currentCat;
  if (!cat || !cats.includes(cat)) {
    cat = cats[0];
    S.currentCat = cat;
  }
  const skus = getSkusByCat(acc, cat);
  const store = STORES[String(S.storeCode)];
  const emp = EMPLOYEES[S.empCode];
  const done = catAnsweredCount(acc, cat);
  const total = skus.length;
  const pct = total ? Math.round(done/total*100) : 0;
  const sos = S.sosData[cat] || {our:"", total:"", confirmed:false};
  const sosValidation = (sos.our !== "" && sos.total !== "") ? validateSOS(acc, cat) : {ok:false, error:null};
  const sosPct = getSOSPct(cat);
  const completedCats = cats.filter(c => isCatComplete(acc, c)).length;
  const totalCats = cats.length;
  const categoryDoneText = completedCats + "/" + totalCats + " CATEGORIES DONE";
  const isLast = cats.indexOf(cat) === cats.length - 1;

  const catOptions = cats.map(c => {
    const isDone = isCatComplete(acc, c);
    const cnt = catAnsweredCount(acc, c);
    const tot = getSkusByCat(acc, c).length;
    const status = isDone ? " ✓ DONE" : (cnt > 0 ? " (" + cnt + "/" + tot + ")" : "");
    return '<option value="' + c + '"' + (cat===c?" selected":"") + (isDone?' class="done"':'') + '>' + catIcon(c) + " " + c + status + '</option>';
  }).join("");

  const hasStartedInCurrent = catHasAnyStarted(acc, cat);
  const isCurrentComplete = isCatComplete(acc, cat);
  const dropdownLocked = hasStartedInCurrent && !isCurrentComplete;
  const lockMsg = dropdownLocked ? '<div class="cat-locked-msg">⚠️ FINISH OR RESET ALL SKUS IN THIS CATEGORY BEFORE SWITCHING. TO RESET A SKU, TAP ITS SELECTED STATUS BUTTON TWICE.</div>' : '';

  return '' +
  '<div class="topbar">' +
    '<button class="topbar-back" id="btn-cancel">✕</button>' +
    '<div class="topbar-title"><h2>PATANJALI MODERN TRADE SAATHI</h2><p>CATEGORY: ' + cat + '</p></div>' +
    '<span class="topbar-badge">' + done + '/' + total + '</span>' +
  '</div>' +
  '<div class="cat-select-wrap">' +
    '<div class="cat-select-label">📂 SWITCH CATEGORY' + (dropdownLocked?" (LOCKED)":"") + '</div>' +
    '<div class="cat-select-wrap-inner">' +
      '<select class="cat-select" id="cat-switcher"' + (dropdownLocked?" disabled":"") + '>' + catOptions + '</select>' +
      '<span class="cat-select-arrow">▾</span>' +
    '</div>' +
    lockMsg +
  '</div>' +
  '<div class="prog-wrap"><div class="prog-fill" id="pbar" style="width:' + pct + '%"></div></div>' +
  '<div class="prog-label" id="plabel">ANSWERED ' + done + ' OF ' + total + ' SKUS (' + pct + '%)</div>' +
  '<div class="body" style="padding-bottom:90px">' +
    '<div class="store-bar">' +
      '<div class="store-bar-chain">' + accDisplay + ' · ' + S.zone + ' ZONE</div>' +
      '<div class="store-bar-name">' + (store?store.name:"") + '</div>' +
      '<div class="store-bar-loc">' + S.city + ' · ' + S.state + '</div>' +
      '<div class="store-bar-emp">' + (emp?emp.name:"") + ' · ' + S.empCode + '</div>' +
    '</div>' +
    '<div class="cat-header">' +
      '<div class="cat-icon">' + catIcon(cat) + '</div>' +
      '<div><div class="cat-title">' + cat + '</div><div class="cat-sub">' + total + ' SKUS · ' + (skus[0]?skus[0].div:"") + '</div></div>' +
    '</div>' +
    skus.map((sku, i) => renderSkuCard(sku, i)).join("") +
    '<div class="sos-card" id="sos-card-' + cat.replace(/[^A-Z0-9]/gi,"_") + '">' +
      '<div class="sos-title">📊 SHARE OF SHELF — ' + cat + ' <span style="color:#dc2626">*COMPULSORY</span></div>' +
      '<div class="sos-grid">' +
        '<div>' +
          '<div class="sos-label">NO. OF PATANJALI FACE-UPS</div>' +
          '<input class="sos-inp" type="number" min="0" step="1" placeholder="ENTER" id="sos-our" value="' + (sos.our===""?"":sos.our) + '" data-soscat="' + cat + '" data-sostype="our" ' + (sos.confirmed?"disabled":"") + '>' +
        '</div>' +
        '<div>' +
          '<div class="sos-label">NO. OF TOTAL CATEGORY FACE-UPS (ALL BRANDS)</div>' +
          '<input class="sos-inp" type="number" min="1" step="1" placeholder="ENTER" id="sos-total" max="999" value="' + (sos.total===""?"":sos.total) + '" data-soscat="' + cat + '" data-sostype="total" ' + (sos.confirmed?"disabled":"") + '>' +
        '</div>' +
      '</div>' +
      (sosValidation.error ? '<div class="sos-err">⚠️ ' + sosValidation.error + '</div>' : '') +
      '<div class="sos-result-row">' +
        '<div class="sos-result' + (sos.confirmed?" sos-confirmed":"") + '" id="sos-result" style="' + (sosPct!==null?"":"opacity:.4") + '">' +
          '<div class="sos-pct">' + (sosPct!==null?sosPct+"%":"—") + '</div>' +
          '<div class="sos-pct-label">' + (sos.confirmed?"✓ SOS CONFIRMED":"SHARE OF SHELF %") + '</div>' +
        '</div>' +
        (!sos.confirmed
          ? '<button class="sos-tick-btn" id="sos-tick" title="CONFIRM SOS" ' + (sosValidation.ok ? "" : "disabled") + '>✓</button>'
          : '<button class="sos-tick-btn confirmed" id="sos-edit" title="EDIT SOS">✎</button>') +
      '</div>' +
    '</div>' +
    // v3: shelf photo block — appears after SOS card, before next-button row
    (sos.confirmed ? renderPhotoBlock(cat) : '') +
    '<div style="margin-top:12px;position:sticky;bottom:0;background:#fff;padding:10px 0 4px;border-top:1.5px solid #d5e8d5">' +
      '<div style="text-align:center;font-size:11px;font-weight:900;color:#0a3d2e;margin:0 0 8px;letter-spacing:.4px">' + categoryDoneText + '</div>' +
      '<button class="btn btn-primary" id="btn-next">' +
        (cats.every(c => isCatComplete(acc, c)) ? "REVIEW & SUBMIT →" : "REVIEW & NEXT →") +
      '</button>' +
    '</div>' +
  '</div>';
}

function renderSkuCard(sku, i) {
  const a = S.skuAns[sku.id] || {status:null, qty:"", qtyConfirmed:false, mrp:"", sp:"", priceConfirmed:false};
  const stCls = a.status === "OUT OF STOCK" ? "st-oos" : a.status === "NOT LISTED" ? "st-nl" : a.status === "IN STOCK" ? "st-sih" : "";
  let extraHtml = "";
  if (a.status === "IN STOCK") {
    if (!a.qtyConfirmed) {
      extraHtml = '<div class="qty-row"><input class="qty-inp" type="number" min="0" step="1" placeholder="ENTER QUANTITY" data-qk="' + sku.id + '" value="' + (a.qty===""?"":a.qty) + '"><button class="tick-btn" data-tick="' + sku.id + '">✓</button></div>';
    } else {
      const priceVal = validatePrice(sku.id);
      extraHtml = '<div class="confirmed-bar"><span class="confirmed-text">✓ QTY: ' + a.qty + ' UNITS</span><button class="edit-link" data-undo="' + sku.id + '">EDIT QTY</button></div>' +
        '<div class="price-section">' +
          '<div class="price-grid">' +
            '<div>' +
              '<div class="price-label">MRP (₹) *</div>' +
              '<input class="price-inp" type="number" min="0" step="0.01" placeholder="ENTER MRP" data-pk="' + sku.id + '" data-ptype="mrp" value="' + (a.mrp||"") + '" ' + (a.priceConfirmed?"disabled":"") + '>' +
            '</div>' +
            '<div>' +
              '<div class="price-label">SELLING PRICE (₹) *</div>' +
              '<input class="price-inp' + ((a.mrp && a.sp && Number(a.sp) > Number(a.mrp))?" error":"") + '" type="number" min="0" step="0.01" placeholder="ENTER SP" data-pk="' + sku.id + '" data-ptype="sp" value="' + (a.sp||"") + '" ' + (a.priceConfirmed?"disabled":"") + '>' +
            '</div>' +
          '</div>' +
          '<div class="price-tick-row">' +
          (priceVal.error && (a.mrp || a.sp) ? '<span class="price-err">⚠️ ' + priceVal.error + '</span>' : '<span class="price-err"></span>') +
          (!a.priceConfirmed
            ? '<button class="price-tick-btn" data-ptick="' + sku.id + '" ' + (priceVal.ok?"":"disabled") + '>✓ CONFIRM MRP & SP</button>'
            : '<button class="price-tick-btn confirmed" data-pedit="' + sku.id + '">✓ CONFIRMED · EDIT</button>') +
          '</div>' +
        '</div>' +
        // v3: shelf talker capture — only shown after price confirmed
        (a.priceConfirmed ? renderShelfTalkerBlock(sku.id) : "");
    }
  }
  return '<div class="sku-card ' + stCls + '" id="sc-' + sku.id + '">' +
    '<div class="sku-num">SKU ' + (i+1) + ' · CODE: ' + sku.code + '</div>' +
    '<div class="sku-brand">' + sku.brand + '</div>' +
    '<div class="sku-desc">' + sku.desc + '</div>' +
    '<div class="status-btns">' +
      '<button class="sbtn' + (a.status==="OUT OF STOCK"?" sel-oos":"") + '" data-sk="' + sku.id + '" data-st="OUT OF STOCK">❌ OUT OF STOCK</button>' +
      '<button class="sbtn' + (a.status==="NOT LISTED"?" sel-nl":"") + '" data-sk="' + sku.id + '" data-st="NOT LISTED">🟡 ' + nlLabelFor(S.account) + '</button>' +
      '<button class="sbtn' + (a.status==="IN STOCK"?" sel-sih":"") + '" data-sk="' + sku.id + '" data-st="IN STOCK">✅ IN STOCK</button>' +
    '</div>' +
    extraHtml +
  '</div>';
}

function renderSuccess() {
  const sub = S.submissions.find(s => s.id === S.viewSubId);
  if (!sub) return '<div class="empty">SUBMISSION NOT FOUND</div>';
  const acc = CHAIN_TO_ACCOUNT[sub.account] || sub.account;
  const cats = uniq((sub.details||[]).map(d => d.cat));
  let overallSOS = null;
  if (sub.sosData) {
    let our = 0, total = 0;
    Object.values(sub.sosData).forEach(d => { our += Number(d.our||0); total += Number(d.total||0); });

  }
  return '' +
  '<div class="topbar"><div class="topbar-title"><h2>PATANJALI MODERN TRADE SAATHI</h2><p>AUDIT SUBMITTED ✓</p></div></div>' +
  '<div class="body" style="padding-bottom:18px">' +
    '<div style="text-align:center;padding:22px 0 16px"><div class="suc-icon">✓</div>' +
    '<div style="font-size:18px;font-weight:800;margin-bottom:4px">AUDIT SUBMITTED!</div>' +
    '<div style="font-size:11px;color:#666;font-weight:700">' + sub.storeName + '</div></div>' +
    '<div class="sum-card">' +
      '<div class="sum-row"><span class="sum-l">SUBMITTED</span><span class="sum-r">' + sub.submittedAt + '</span></div>' +
      '<div class="sum-row"><span class="sum-l">ZONE / BRANCH</span><span class="sum-r">' + sub.zone + ' / ' + sub.state + '</span></div>' +
      '<div class="sum-row"><span class="sum-l">CITY</span><span class="sum-r">' + sub.city + '</span></div>' +
      '<div class="sum-row"><span class="sum-l">ACCOUNT</span><span class="sum-r">' + sub.account + '</span></div>' +
      '<div class="sum-row"><span class="sum-l">STORE</span><span class="sum-r">' + sub.storeName + '</span></div>' +
      '<div class="sum-row"><span class="sum-l">EMPLOYEE</span><span class="sum-r">' + sub.empName + '</span></div>' +
      '<div class="sum-row"><span class="sum-l">TOTAL SKUS</span><span class="sum-r">' + (sub.details?sub.details.length:0) + '</span></div>' +
    '</div>' +
    (function(){
      const det = sub.details || [];
      const tot = det.length;
      const nIn = det.filter(d => d.status==="IN STOCK").length;
      const nOos = det.filter(d => d.status==="OUT OF STOCK").length;
      const nNl = det.filter(d => d.status==="NOT LISTED").length;
      const pc = n => tot ? Math.round(n/tot*100) + "%" : "—";
      const big = (n, p, lbl, bg, bd, fg) =>
        '<div style="flex:1;background:' + bg + ';border:1.6px solid ' + bd + ';border-radius:13px;padding:13px 6px;text-align:center">' +
          '<div style="font-size:22px;font-weight:900;color:' + fg + ';line-height:1">' + n + '</div>' +
          '<div style="font-size:13px;font-weight:900;color:' + fg + ';margin-top:3px">' + p + '</div>' +
          '<div style="font-size:8px;font-weight:900;color:' + fg + ';letter-spacing:.5px;margin-top:4px;opacity:.85">' + lbl + '</div>' +
        '</div>';
      let h = '<div style="display:flex;gap:8px;margin-top:10px">' +
        big(nIn, pc(nIn), "IN STOCK", "#ecfdf5", "#10b981", "#065f46") +
        big(nOos, pc(nOos), "OUT OF STOCK", "#fef2f2", "#ef4444", "#991b1b") +
        big(nNl, pc(nNl), nlLabelFor(sub.account), "#fffbeb", "#f59e0b", "#92400e") +
      '</div>';
      if (sub.sosData && Object.keys(sub.sosData).length) {
        const rows = Object.keys(sub.sosData).sort().map(cat => {
          const d = sub.sosData[cat];
          const our = Number(d.our||0), total = Number(d.total||0);
          const pct = total > 0 ? Math.round(our/total*100) + "%" : (our === 0 ? "0%" : "—");
          return '<div class="sum-row"><span class="sum-l">' + cat + '</span><span class="sum-r">' + our + ' / ' + total + ' · <b>' + pct + '</b></span></div>';
        }).join("");
        h += '<div class="sum-card" style="margin-top:10px">' +
          '<div style="font-size:10px;font-weight:900;color:#0a3d2e;letter-spacing:.5px;padding:2px 0 6px">📊 CATEGORY-WISE SOS%</div>' + rows + '</div>';
      }
      return h;
    })() +
    '<button class="btn btn-primary" id="btn-another" style="margin-top:10px">+ NEW SUBMISSION</button>' +
    '<button class="btn btn-secondary" id="btn-go-hist" style="margin-top:8px">VIEW HISTORY</button>' +
  '</div>';
}

  const subs = S.submissions.slice().reverse();
  const ec = S.empCode;
  const today = todayISO();
  const todayCount = ec ? subs.filter(s => s.empCode === ec && s.dateISO === today && s.attendance === "PRESENT").length : 0;
  const totalAssigned = ec ? getTotalMJPStoresForEmployeeToday(ec) : 0;
  return '' +
  '<div class="topbar">' +
    '<button class="topbar-back" id="btn-back-home">←</button>' +
    '<div class="topbar-title"><h2>PATANJALI MODERN TRADE SAATHI</h2><p>STORES COMPLETED' + (ec ? ' · ' + todayCount + '/' + totalAssigned + ' TODAY' : '') + '</p></div>' +
    '<span class="topbar-badge">' + subs.length + '</span>' +
  '</div>' +
  '<div class="body">' +
    (subs.length === 0
      ? '<div class="empty">NO SUBMISSIONS YET.<br>START YOUR FIRST AUDIT.</div>'
      : subs.map((s, i) => {
          let overallSOS = null;
          if (s.sosData) {
            let our = 0, total = 0;
            Object.values(s.sosData).forEach(d => { our += Number(d.our||0); total += Number(d.total||0); });
            overallSOS = total === 0 ? (our === 0 ? 0 : null) : Math.round(our/total*100);
          }
          return '<div style="background:#fff;border:1.5px solid #d5e8d5;border-radius:12px;padding:13px;margin-bottom:8px">' +
            '<div style="font-size:13px;font-weight:800;color:#111">' + (s.storeName||"NO STORE") + '</div>' +
            '<div style="font-size:10px;color:#666;margin-top:2px;font-weight:600">' + (s.account||"") + ' · ' + (s.city||"") + ', ' + (s.state||"") + '</div>' +
            '<div style="font-size:10px;color:#666;margin-top:2px;font-weight:600">' + (s.empName||"") + ' · ' + s.submittedAt + '</div>' +
            (s.attendance !== "PRESENT"
              ? '<div style="margin-top:7px"><span class="chip ' + (s.attendanceClass==="ABSENT"?"chip-abs":"chip-att") + '">' + s.attendance + (s.attReason?" ("+s.attReason+")":"") + '</span></div>'
              : '<div style="display:flex;gap:5px;margin-top:8px;flex-wrap:wrap">' +
                  '<span class="chip chip-oos">' + (s.details||[]).filter(d => d.status==="OUT OF STOCK").length + ' OOS</span>' +
                  '<span class="chip chip-nl">' + (s.details||[]).filter(d => d.status==="NOT LISTED").length + ' ' + nlLabelFor(s.account) + '</span>' +
                  '<span class="chip chip-sih">' + (s.details||[]).filter(d => d.status==="IN STOCK").length + ' SIH</span>' +
                  (overallSOS !== null ? '<span style="background:#fff8e1;color:#92400e;font-size:9px;font-weight:800;padding:3px 8px;border-radius:6px">SOS ' + overallSOS + '%</span>' : '') +
                '</div>') +
            '<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:9px;padding-top:8px;border-top:1px dashed #e2efe2">' +
              (s.dataSynced
                ? '<span style="font-size:10px;font-weight:800;color:#0a7d3e">✓ IN SHEET</span>'
                : (!s.clientKey
                    ? '<span style="font-size:10px;font-weight:800;color:#6b7280">◌ OLD — NOT CONFIRMED</span>'
                    : (s._syncing
                        ? '<span style="font-size:10px;font-weight:800;color:#b45309">⏳ SYNCING…</span>'
                        : '<span style="font-size:10px;font-weight:800;color:#b91c1c">✕ NOT IN SHEET</span>'))) +
              (s.dataSynced
                ? ''
                : '<button data-resend-idx="' + (S.submissions.length - 1 - i) + '" style="background:#0a3d2e;border:none;border-radius:14px;padding:6px 12px;font-size:10px;font-weight:800;color:#fff;cursor:pointer">↻ RE-SEND TO SHEET</button>') +
            '</div>' +
          '</div>';
        }).join("")) +
  '</div>';
}

// ═══════════════════════════════════════════════════════════════
// EVENT BINDING
// ═══════════════════════════════════════════════════════════════
function clearAttSubState() {
  S.adhocReason = ""; S.adhocConfirmed = false;
  S.closedReason = ""; S.closedOtherText = ""; S.closedConfirmed = false;
  S.underAuditConfirmed = false;
  S.emergencyConfirmed = false;
  S.bannedConfirmed = false;
}

function bind() {
  const on = (id, ev, fn) => { const el = $(id); if (el) el.addEventListener(ev, fn); };

  // v9: per-report "Re-send to sheet" buttons (shown only on failed reports).
  document.querySelectorAll('[data-resend-idx]').forEach(function(btn){
    btn.addEventListener("click", function(){
      const idx = parseInt(btn.getAttribute("data-resend-idx"), 10);
      const sub = (S.submissions||[])[idx];
      if (sub) retrySync(sub);
    });
  });

  // ---- HOME ----
  // v10 LOGIN: employee is fixed after sign-in — cascade never clears empCode.
  on("btn-login","click", doLogin);
  on("login-phone","keydown", e => { if (e.key === "Enter") doLogin(); });
  on("login-code","keydown", e => { if (e.key === "Enter") { const p = $("login-phone"); if (p) p.focus(); } });
  on("btn-logout","click", doLogout);
  // v10 dashboard handlers
  on("dash-logout","click", doLogout);
  on("dash-refresh","click", () => loadDashboard(true));
  on("dash-retry","click", () => loadDashboard(true));
  on("dash-ftog","click", () => { S.dash.fOpen = !S.dash.fOpen; render(); });
  on("dash-dl-page","click", dashDownloadCurrent);
  on("dash-dl-all","click", dashDownloadAll);
  on("dash-dl-raw","click", dashDownloadRaw);
  document.querySelectorAll("[data-dtab]").forEach(b => b.addEventListener("click", () => { S.dash.tab = b.getAttribute("data-dtab"); S.dash.detail = null; render(); }));
  document.querySelectorAll("[data-dseg]").forEach(b => b.addEventListener("click", () => {
    S.dash.filters[b.getAttribute("data-dseg")] = b.getAttribute("data-dsegval");
    render();
  }));
  // Stack multi-row sticky headers (totals band + header) at correct offsets.
  (function(){
    const tbl = document.querySelector("#dash-pagewrap table.dtbl");
    if(!tbl) return;
    const rows = tbl.querySelectorAll("thead tr");
    let off = 0;
    rows.forEach(tr=>{
      const h = tr.getBoundingClientRect().height || 26;
      tr.querySelectorAll("th,td").forEach(c=>{ c.style.top = off + "px"; });
      off += h;
    });
    // Freeze a 2nd column (store code) when requested: left offset = first col width.
    if(tbl.getAttribute("data-froz2")==="1"){
      const firstCell = tbl.querySelector("tr > *:first-child");
      const w = firstCell ? firstCell.getBoundingClientRect().width : 0;
      tbl.querySelectorAll(".c2").forEach(c=>{ c.style.left = w + "px"; });
    }
  })();
  document.querySelectorAll("[data-dfilter]").forEach(sel => sel.addEventListener("change", e => {
    S.dash.filters[sel.getAttribute("data-dfilter")] = e.target.value;
    if (sel.getAttribute("data-dfilter") === "cat") S.dash.filters.sku = "";
    S.dash.fOpen = true;
    S.dash.detail = null;
    render();
  }));
  const dpw = document.getElementById("dash-pagewrap");
  if (dpw) dpw.addEventListener("click", ev => {
    const cr = ev.target.closest("[data-crumb]");
    if (cr) {
      const i = parseInt(cr.getAttribute("data-crumb"), 10);
      if (i < 0) { S.dash.ov = { path:[], acc:"" }; }
      else { S.dash.ov.path = S.dash.ov.path.slice(0, i+1); S.dash.ov.acc = (S.dash.ov.path[i] && S.dash.ov.path[i].accAfter) || ""; }
      render(); return;
    }
    const dr = ev.target.closest("[data-drill]");
    if (dr) {
      try {
        const d = JSON.parse(dr.getAttribute("data-drill"));
        const accAfter = d.acc || S.dash.ov.acc || "";
        S.dash.ov.path.push({ lv:d.lv, val:d.val, lbl:d.lbl, accAfter:accAfter });
        S.dash.ov.acc = accAfter;
        render();
      } catch (e) {}
      return;
    }
    const sd = ev.target.closest("[data-storedrill]");
    if (sd) {
      try { const d = JSON.parse(sd.getAttribute("data-storedrill")); S.dash.detail = { pg:d.pg, store:d.store, label:d.label }; render(); } catch (e) {}
      return;
    }
    const t = ev.target.closest("[data-tip]");
    if (t) { try { showToast(t.getAttribute("data-tip")); } catch (e) {} }
  });
  on("dash-detail-back","click", () => { S.dash.detail = null; render(); });
  on("f-city","change", e => { S.city = e.target.value; S.account = S.storeCode = S.attendance = ""; clearAttSubState(); render(); });
  on("f-acc","change", e => { S.account = e.target.value; S.storeCode = S.attendance = ""; clearAttSubState(); render(); });
  on("f-store","change", e => { S.storeCode = e.target.value; S.attendance = ""; clearAttSubState(); render(); });
  on("f-att","change", e => { S.attendance = e.target.value; clearAttSubState(); render(); });
  on("btn-start","click", () => {
    const _pend = getPendingSyncSub(); if(_pend){ showSyncModal(_pend); return; }
    // v10: resume an audit paused via BACK (same store + account → keep all answers).
    if (S._auditPaused && S._pausedStore === S.storeCode && S._pausedAcc === S.account
        && S.skuAns && Object.keys(S.skuAns).length > 0) {
      S._auditPaused = false;
      S.view = "audit";
      render();
      scrollAuditToTop();
      return;
    }
    S._auditPaused = false;
    const acc = CHAIN_TO_ACCOUNT[S.account] || S.account;
    const skus = getSkus(acc);
    S.skuAns = {};
    S.sosData = {};
    S.formStartAt = new Date().toISOString();
    skus.forEach(s => { S.skuAns[s.id] = {status:null, qty:"", qtyConfirmed:false, mrp:"", sp:"", priceConfirmed:false}; });
    const cats = getCategoriesForAccount(acc);
    S.currentCat = cats[0] || "";
    S.view = "audit";
    render();
    scrollAuditToTop();
    preflightLocationCheck();
  });
  on("btn-submit-att","click", () => { const _p = getPendingSyncSub(); if(_p){ showSyncModal(_p); return; } submitAttendance(); });
  on("btn-hist","click", () => { S.view = "history"; render(); });
  on("btn-another","click", () => { const _p = getPendingSyncSub(); if(_p){ showSyncModal(_p); return; } resetForNewSubmission(); render(); });
  on("btn-go-hist","click", () => { S.view = "history"; render(); });
  on("btn-back-home","click", () => { S.view = "home"; render(); });

  // Sub-attendance
  on("adhoc-reason","input", e => { S.adhocReason = e.target.value; const b=$("adhoc-tick"); if (b) b.disabled = !(S.adhocReason && S.adhocReason.trim().length >= 3); });
  on("adhoc-tick","click", () => { if (S.adhocReason && S.adhocReason.trim().length >= 3) { S.adhocConfirmed = true; render(); } });
  on("closed-reason","change", e => { S.closedReason = e.target.value; S.closedOtherText = ""; render(); });
  on("closed-other","input", e => { S.closedOtherText = e.target.value; const b=$("closed-tick"); if (b) b.disabled = !(S.closedReason && S.closedOtherText && S.closedOtherText.trim().length >= 3); });
  on("closed-tick","click", () => { if (S.closedReason && (S.closedReason !== "OTHERS" || (S.closedOtherText && S.closedOtherText.trim().length >= 3))) { S.closedConfirmed = true; render(); } });
  on("audit-tick","click", () => { S.underAuditConfirmed = true; render(); });
  on("emergency-tick","click", () => { S.emergencyConfirmed = true; render(); });
  on("banned-tick","click", () => { S.bannedConfirmed = true; render(); });

  // ---- AUDIT ----
  on("btn-cancel","click", () => {
    if (confirm("DISCARD CURRENT AUDIT AND GO BACK?")) {
      S.view = "home";
      S.skuAns = {};
      S.sosData = {};
      S.currentCat = "";
      S._auditPaused = false;
      render();
    }
  });
  on("cat-switcher","change", e => {
    const newCat = e.target.value;
    const acc = CHAIN_TO_ACCOUNT[S.account] || S.account;
    if (catHasAnyStarted(acc, S.currentCat) && !isCatComplete(acc, S.currentCat)) {
      e.target.value = S.currentCat;
      showAlert("⚠️ CATEGORY NOT FINISHED", "Finish or reset every SKU in the current category before switching. To reset a SKU, tap its selected status button twice.");
      return;
    }
    S.currentCat = newCat;
    render();
    scrollAuditToTop();
  });
  on("btn-next","click", () => {
    const acc = CHAIN_TO_ACCOUNT[S.account] || S.account;
    const cats = getCategoriesForAccount(acc);
    const cat = S.currentCat;
    const skus = getSkusByCat(acc, cat);
    for (const sku of skus) {
      if (!isSkuAnswered(sku.id)) {
        const el = $("sc-"+sku.id);
        if (el) {
          el.scrollIntoView({behavior:"smooth", block:"center"});
          el.classList.add("highlight-error");
          setTimeout(()=>el.classList.remove("highlight-error"), 800);
        }
        showAlert("⚠️ INCOMPLETE SKUS", "Please answer every SKU in this category. The first unanswered SKU has been highlighted in red.");
        return;
      }
    }
    if (!S.sosData[cat] || !S.sosData[cat].confirmed) {
      const el = document.querySelector(".sos-card");
      if (el) {
        el.scrollIntoView({behavior:"smooth", block:"center"});
        el.classList.add("highlight-error");
        setTimeout(()=>el.classList.remove("highlight-error"), 800);
      }
      showAlert("⚠️ CONFIRM SHARE OF SHELF", "Enter the Patanjali and total face-ups for this category, then tap the green ✓ to confirm SOS before continuing.");
      return;
    }
    const incomplete = cats.find(c => !isCatComplete(acc, c));
    if (!incomplete) { doSubmit(); return; }
    S.currentCat = incomplete;
    render();
    scrollAuditToTop();
    showToast("PLEASE COMPLETE: " + incomplete, true);
  });

  // SKU status buttons
  document.querySelectorAll("[data-sk]").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.dataset.sk, st = btn.dataset.st;
      if (!S.skuAns[id]) S.skuAns[id] = {status:null, qty:"", qtyConfirmed:false, mrp:"", sp:"", priceConfirmed:false};
      const a = S.skuAns[id];
      if (a.status === st) {
        a.status = null; a.qty = ""; a.qtyConfirmed = false; a.mrp = ""; a.sp = ""; a.priceConfirmed = false;
        showToast("STATUS RESET");
      } else {
        a.status = st;
        if (st !== "IN STOCK") { a.qty = ""; a.qtyConfirmed = false; a.mrp = ""; a.sp = ""; a.priceConfirmed = false; }
      }
      render();
    });
  });
  // QTY input
  document.querySelectorAll("[data-qk]").forEach(inp => {
    inp.addEventListener("input", () => {
      const id = inp.dataset.qk;
      if (!S.skuAns[id]) S.skuAns[id] = {status:"IN STOCK", qty:"", qtyConfirmed:false, mrp:"", sp:"", priceConfirmed:false};
      const v = inp.value;
      S.skuAns[id].qty = v === "" ? "" : Number(v);
    });
  });
  // QTY tick
  document.querySelectorAll("[data-tick]").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.dataset.tick, a = S.skuAns[id];
      if (!a || a.qty === "" || a.qty === null) { showAlert("⚠️ QUANTITY NEEDED", "Please enter the quantity before confirming."); return; }
      if (Number(a.qty) < 0) { showAlert("⚠️ INVALID QUANTITY", "Quantity must be 0 or more."); return; }
      a.qtyConfirmed = true;
      render();
    });
  });
  // QTY undo
  document.querySelectorAll("[data-undo]").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.dataset.undo;
      S.skuAns[id].qtyConfirmed = false;
      S.skuAns[id].priceConfirmed = false;
      render();
    });
  });
  // PRICE inputs
  document.querySelectorAll("[data-pk]").forEach(inp => {
    inp.addEventListener("input", () => {
      const id = inp.dataset.pk, t = inp.dataset.ptype;
      if (!S.skuAns[id]) return;
      S.skuAns[id][t] = inp.value;
      const a = S.skuAns[id];
      const v = validatePrice(id);
      const tickBtn = document.querySelector('[data-ptick="' + id + '"]');
      if (tickBtn) tickBtn.disabled = !v.ok;
      const spInp = document.querySelector('[data-pk="' + id + '"][data-ptype="sp"]');
      if (spInp) {
        if (a.mrp && a.sp && Number(a.sp) > Number(a.mrp)) spInp.classList.add("error");
        else spInp.classList.remove("error");
      }
      const priceSection = inp.closest(".price-section");
      const errEl = priceSection ? priceSection.querySelector(".price-err") : null;
      if (errEl) errEl.textContent = (v.error && (a.mrp || a.sp)) ? ("⚠️ " + v.error) : "";
    });
  });
  // PRICE tick
  document.querySelectorAll("[data-ptick]").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.dataset.ptick, v = validatePrice(id);
      if (!v.ok) { showAlert("⚠️ CHECK MRP & SELLING PRICE", v.error); return; }
      S.skuAns[id].priceConfirmed = true;
      render();
    });
  });
  // PRICE edit
  document.querySelectorAll("[data-pedit]").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.dataset.pedit;
      S.skuAns[id].priceConfirmed = false;
      render();
    });
  });
  // SOS inputs
  document.querySelectorAll("[data-soscat]").forEach(inp => {
    inp.addEventListener("input", () => {
      const cat = inp.dataset.soscat, type = inp.dataset.sostype;
      if (!S.sosData[cat]) S.sosData[cat] = {our:"", total:"", confirmed:false};
      S.sosData[cat][type] = inp.value;
      const acc = CHAIN_TO_ACCOUNT[S.account] || S.account;
      const curCat = S.currentCat;
      const v = validateSOS(acc, curCat);
      const tickBtn = document.getElementById("sos-tick");
      if (tickBtn) tickBtn.disabled = !v.ok;
    });
  });
  // SOS tick
  on("sos-tick","click", () => {
    const acc = CHAIN_TO_ACCOUNT[S.account] || S.account;
    const cat = S.currentCat;
    const v = validateSOS(acc, cat);
    if (!v.ok) { showAlert("⚠️ CHECK FACE-UPS", v.error); return; }
    S.sosData[cat].confirmed = true;
    render();
  });
  on("sos-edit","click", () => {
    const cat = S.currentCat;
    if (S.sosData[cat]) S.sosData[cat].confirmed = false;
    render();
  });
  // v3: camera buttons — three kinds: shelf, selfie, talker
  document.querySelectorAll('[data-camcat]').forEach(btn => {
    btn.addEventListener('click', () => openCamera({ mode:"shelf", category: btn.getAttribute('data-camcat') }));
  });
  document.querySelectorAll('[data-cam-selfie]').forEach(btn => {
    btn.addEventListener('click', () => openCamera({ mode:"selfie" }));
  });
  document.querySelectorAll('[data-cam-talker]').forEach(btn => {
    btn.addEventListener('click', () => openCamera({ mode:"talker", skuId: btn.getAttribute('data-cam-talker') }));
  });
  document.querySelectorAll('[data-remove-selfie]').forEach(btn => {
    btn.addEventListener('click', (e) => { e.stopPropagation(); S.selfie = ""; S.selfieTime = ""; render(); });
  });
  document.querySelectorAll('[data-remove-talker]').forEach(btn => {
    btn.addEventListener('click', (e) => { e.stopPropagation(); delete S.skuPhotos[btn.getAttribute('data-remove-talker')]; render(); });
  });
  document.querySelectorAll('[data-remove-cat]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const cat = btn.getAttribute('data-remove-cat');
      const idx = parseInt(btn.getAttribute('data-remove-idx') || "0", 10);
      if (S.shelfPhotos[cat]) {
        S.shelfPhotos[cat].splice(idx, 1);
        if (!S.shelfPhotos[cat].length) delete S.shelfPhotos[cat];
      }
      render();
    });
  });
  // v3 update: photo tap → open lightbox
  document.querySelectorAll('[data-lb-cat]').forEach(el => {
    el.addEventListener('click', () => {
      const cat = el.getAttribute('data-lb-cat');
      const idx = parseInt(el.getAttribute('data-lb-idx') || "0", 10);
      const photos = S.shelfPhotos[cat] || [];
      if(photos.length) openLightbox(photos, idx);
    });
  });
  document.querySelectorAll('[data-lb-talker]').forEach(el => {
    el.addEventListener('click', () => {
      const skuId = el.getAttribute('data-lb-talker');
      const p = S.skuPhotos[skuId];
      if(p) openLightbox([p], 0);
    });
  });
  document.querySelectorAll('[data-lb-selfie]').forEach(el => {
    el.addEventListener('click', () => {
      if(S.selfie) openLightbox([S.selfie], 0);
    });
  });
}

function resetForNewSubmission() {
  // v10 LOGIN: the employee stays signed in — only the visit-specific fields reset.
  S.city = S.account = S.storeCode = S.attendance = "";
  S._auditPaused = false;
  S.skuAns = {}; S.sosData = {}; S.currentCat = "";
  S.formStartAt = new Date().toISOString();
  S.shelfPhotos = {};
  S.skuPhotos = {};
  S.selfie = "";
  S.selfieTime = "";
  S.gps = null;
  clearAttSubState();
  S.view = "home";
}

// ═══════════════════════════════════════════════════════════════
// v3 — STATE ADDITIONS (set on first reference to avoid breaking original state init)
// ═══════════════════════════════════════════════════════════════
if(!S.shelfPhotos) S.shelfPhotos = {};
if(!S.gps) S.gps = null;
if(!S.selfie) S.selfie = "";          // base64 attendance selfie
if(!S.selfieTime) S.selfieTime = "";  // HH:mm:ss when selfie was taken (Attendance Time)
if(!S.skuPhotos) S.skuPhotos = {};   // { pbb_code: base64 } shelf talker per SKU
if(!S.lightbox) S.lightbox = { open:false, items:[], index:0 };
if(!S.camera) S.camera = {
  open:false,
  mode:"shelf",          // "shelf" | "selfie" | "talker"
  category:null,         // for shelf
  skuId:null,            // for talker
  facing:"environment",  // "user" (front) | "environment" (back)
  stream:null,
  video:null,
  temp:[],
  error:"",
  busy:false             // true while opening camera
};

// ═══════════════════════════════════════════════════════════════
// v3 — GPS (user-initiated only, in-app browser warning)
// ═══════════════════════════════════════════════════════════════
function isInAppBrowser(){
  const ua = navigator.userAgent || "";
  return /WhatsApp|FBAN|FBAV|Instagram|Line\//i.test(ua);
}
function captureGPS(timeoutMs){
  // Two-stage capture so we almost never log a bare TIMEOUT:
  //   Stage 1 - quick precise GPS/satellite fix (enableHighAccuracy:true). Best outdoors.
  //   Stage 2 - if stage 1 fails/times out, fall back to a fast network/Wi-Fi fix
  //             (enableHighAccuracy:false), which still works inside stores where
  //             satellite GPS rarely locks. For a 500 m geo-fence the coarser fix is fine.
  // Both successful stages return status:"CAPTURED".
  const highAccMs = timeoutMs || 8000;
  const coarseMs  = 30000;
  const hardCapMs = highAccMs + coarseMs + 3000;
  return new Promise(resolve => {
    if(!navigator.geolocation){
      resolve({lat:null,lng:null,accuracy:null,status:"NOT_SUPPORTED"}); return;
    }
    let done = false;
    const finish = r => { if(done) return; done = true; resolve(r); };
    setTimeout(()=>finish({lat:null,lng:null,accuracy:null,status:"TIMEOUT"}), hardCapMs);
    const ok = pos => finish({
      lat: +pos.coords.latitude.toFixed(6),
      lng: +pos.coords.longitude.toFixed(6),
      accuracy: Math.round(pos.coords.accuracy || 0),
      status: "CAPTURED"
    });
    const classify = err => {
      if(err && err.code === 1) return "DENIED";
      if(err && err.code === 2) return "UNAVAILABLE";
      if(err && err.code === 3) return "TIMEOUT";
      return "FAILED";
    };
    const coarseStage = prevStatus => {
      navigator.geolocation.getCurrentPosition(
        ok,
        err => {
          let st = classify(err);
          if(st === "FAILED" && prevStatus) st = prevStatus;
          finish({lat:null,lng:null,accuracy:null,status:st});
        },
        { enableHighAccuracy: false, timeout: coarseMs, maximumAge: 300000 }
      );
    };
    navigator.geolocation.getCurrentPosition(
      ok,
      err => {
        const st = classify(err);
        if(st === "DENIED"){ finish({lat:null,lng:null,accuracy:null,status:"DENIED"}); return; }
        coarseStage(st);
      },
      { enableHighAccuracy: true, timeout: highAccMs, maximumAge: 120000 }
    );
  });
}

const PHOTO_MAX_WIDTH = 1280;
const PHOTO_QUALITY = 0.72;
const MAX_PHOTOS_PER_CATEGORY = 4;

// Modes: "shelf" (multi-photo per category), "selfie" (single front-cam), "talker" (single per-SKU)
async function openCamera(opts){
  // opts = { mode, category, skuId }
  opts = opts || {};
  const mode = opts.mode || "shelf";
  if(isInAppBrowser()){
    if(!confirm("⚠️ YOU APPEAR TO BE INSIDE WHATSAPP / IN-APP BROWSER.\n\nTHE CAMERA & LOCATION MAY NOT WORK HERE.\n\nFOR BEST RESULTS: TAP THE 3 DOTS (TOP RIGHT) → 'OPEN IN CHROME'.\n\nPROCEED ANYWAY?")) return;
  }
  // Initial state
  S.camera.open = true;
  S.camera.mode = mode;
  S.camera.category = opts.category || null;
  S.camera.skuId = opts.skuId || null;
  S.camera.facing = (mode === "selfie") ? "user" : "environment";
  S.camera.error = "";
  S.camera.stream = null;
  S.camera.video = null;
  S.camera.busy = false;
  // Pre-load existing photos for shelf mode (so the user can add more / retake)
  if(mode === "shelf"){
    S.camera.temp = (S.shelfPhotos[opts.category] || []).slice();
  } else {
    S.camera.temp = [];   // selfie & talker → single shot, no preload
  }
  render();
  setTimeout(()=>startCameraStream(), 30);
}

async function startCameraStream(){
  if(S.camera.stream){
    try{ S.camera.stream.getTracks().forEach(t=>t.stop()); }catch(e){}
    S.camera.stream = null;
  }
  S.camera.error = "";
  S.camera.busy = true;
  // Update busy indicator without full re-render
  const busyEl = document.getElementById("__cam_busy__");
  if(busyEl) busyEl.style.display = "block";

  try{
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: S.camera.facing },
        width: { ideal: 1920 },
        height: { ideal: 1080 }
      },
      audio: false
    });
    S.camera.stream = stream;
    const v = document.getElementById("__cam_video__");
    if(v){
      v.srcObject = stream;
      await v.play().catch(()=>{});
      S.camera.video = v;
    }
  }catch(e){
    let msg = "CAMERA COULD NOT BE OPENED.";
    if(e.name === "NotAllowedError" || e.name === "PermissionDeniedError"){
      msg = "CAMERA PERMISSION DENIED.\n\nTAP THE LOCK ICON IN THE ADDRESS BAR → PERMISSIONS → CAMERA → ALLOW.";
    } else if(e.name === "NotFoundError"){ msg = "NO CAMERA FOUND ON THIS DEVICE."; }
    else if(e.name === "NotReadableError"){ msg = "CAMERA IS BUSY (ANOTHER APP USING IT). CLOSE OTHER CAMERA APPS AND RETRY."; }
    else if(e.name === "OverconstrainedError" || e.name === "ConstraintNotSatisfiedError"){
      // Selected facing mode (front/back) not available — try the other one once
      const newFacing = S.camera.facing === "environment" ? "user" : "environment";
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: newFacing }, audio: false });
        S.camera.stream = stream;
        S.camera.facing = newFacing;
        const v = document.getElementById("__cam_video__");
        if(v){ v.srcObject = stream; await v.play().catch(()=>{}); S.camera.video = v; }
        S.camera.busy = false;
        render();
        return;
      } catch(e2){ msg = "REQUESTED CAMERA NOT AVAILABLE ON THIS DEVICE."; }
    } else { msg = "CAMERA ERROR: " + (e.message || e.name || e); }
    S.camera.error = msg;
  }
  S.camera.busy = false;
  if(busyEl) busyEl.style.display = "none";
  // Update only the toggle button label without re-render-thrash
  const toggleEl = document.getElementById("__cam_facing__");
  if(toggleEl) toggleEl.textContent = (S.camera.facing === "environment") ? "🔄 FRONT" : "🔄 BACK";
}

async function switchCameraFacing(){
  S.camera.facing = (S.camera.facing === "environment") ? "user" : "environment";
  await startCameraStream();
}

function closeCamera(){
  closeCameraReview();
  if(S.camera.stream){
    try{ S.camera.stream.getTracks().forEach(t=>t.stop()); }catch(e){}
  }
  S.camera = { open:false, mode:"shelf", category:null, skuId:null, facing:"environment", stream:null, video:null, temp:[], error:"", busy:false };
  render();
}

// Blur detection: variance-of-Laplacian on a downsampled grayscale snapshot.
// Below threshold → considered blurry. Threshold tuned for mobile camera output.
const BLUR_THRESHOLD = 180;  // tightened. Mobile cameras typically show 200-800+ when in focus.
function detectBlurScore(canvas){
  // Downsample to 320 wide for speed
  const targetW = 320;
  const scale = targetW / canvas.width;
  const targetH = Math.round(canvas.height * scale);
  const small = document.createElement("canvas");
  small.width = targetW; small.height = targetH;
  const sctx = small.getContext("2d");
  sctx.drawImage(canvas, 0, 0, targetW, targetH);
  const img = sctx.getImageData(0, 0, targetW, targetH);
  const data = img.data;
  // Grayscale buffer
  const gray = new Float32Array(targetW * targetH);
  for(let i = 0, j = 0; i < data.length; i += 4, j++){
    gray[j] = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
  }
  // Laplacian (3x3 kernel: 0 -1 0 / -1 4 -1 / 0 -1 0) and compute variance
  let sum = 0, sumSq = 0, n = 0;
  for(let y = 1; y < targetH - 1; y++){
    for(let x = 1; x < targetW - 1; x++){
      const idx = y * targetW + x;
      const lap = 4 * gray[idx] - gray[idx - 1] - gray[idx + 1] - gray[idx - targetW] - gray[idx + targetW];
      sum += lap; sumSq += lap * lap; n++;
    }
  }
  const mean = sum / n;
  const variance = (sumSq / n) - mean * mean;
  return variance;
}

// In-camera blur rejection banner — visible inside the camera modal so the user sees it
function showCamBlurBanner(score){
  const cam = document.querySelector(".cam-bg");
  if(!cam) return;
  // Remove any previous banner
  const old = document.getElementById("__cam_blur_banner__");
  if(old) old.remove();
  const banner = document.createElement("div");
  banner.id = "__cam_blur_banner__";
  banner.style.cssText = "position:absolute;top:74px;left:14px;right:14px;background:#dc2626;color:#fff;padding:14px 16px;border-radius:12px;font-size:13px;font-weight:900;letter-spacing:.3px;text-align:center;z-index:5;box-shadow:0 8px 24px rgba(220,38,38,.5);animation:slideIn .3s ease";
  banner.innerHTML = "⚠ PHOTO TOO BLURRY (SCORE " + Math.round(score) + ") — HOLD STEADY & RETAKE";
  cam.appendChild(banner);
  setTimeout(()=>{ if(banner.parentNode){ banner.style.transition = "opacity .4s"; banner.style.opacity = "0"; setTimeout(()=>banner.remove(), 400); } }, 2800);
}

function snapPhoto(){
  // Mode-specific max
  const maxThis = (S.camera.mode === "shelf") ? MAX_PHOTOS_PER_CATEGORY : 1;
  if(S.camera.temp.length >= maxThis){
    if(maxThis === 1){
      showToast("ONLY ONE PHOTO ALLOWED — DELETE IT FIRST TO RETAKE", true);
    } else {
      showToast("MAX " + maxThis + " PHOTOS", true);
    }
    return;
  }
  const v = S.camera.video;
  if(!v || !v.videoWidth){ showToast("CAMERA NOT READY", true); return; }
  let w = v.videoWidth, h = v.videoHeight;
  if(w > PHOTO_MAX_WIDTH){ h = Math.round(h * (PHOTO_MAX_WIDTH/w)); w = PHOTO_MAX_WIDTH; }
  const canvas = document.createElement("canvas");
  canvas.width = w; canvas.height = h;
  canvas.getContext("2d").drawImage(v, 0, 0, w, h);

  // BLUR DETECTION — reject blurry photos
  const blurScore = detectBlurScore(canvas);
  if(blurScore < BLUR_THRESHOLD){
    // Show clear, persistent in-camera banner so the user sees the rejection
    showCamBlurBanner(blurScore);
    // Subtle red flash to make rejection obvious
    const flash = document.createElement("div");
    flash.style.cssText = "position:fixed;inset:0;background:#dc2626;z-index:99999;opacity:.45;transition:opacity .35s;pointer-events:none";
    document.body.appendChild(flash);
    setTimeout(()=>{ flash.style.opacity = "0"; setTimeout(()=>flash.remove(), 350); }, 80);
    return;  // do NOT save
  }

  const dataUrl = canvas.toDataURL("image/jpeg", PHOTO_QUALITY);
  S.camera.temp.push(dataUrl);
  // White flash for successful capture
  const flash = document.createElement("div");
  flash.style.cssText = "position:fixed;inset:0;background:#fff;z-index:99999;opacity:.85;transition:opacity .3s;pointer-events:none";
  document.body.appendChild(flash);
  setTimeout(()=>{ flash.style.opacity = "0"; setTimeout(()=>flash.remove(), 300); }, 50);
  refreshCameraStrip();
}
function removeCameraTemp(idx){
  S.camera.temp.splice(idx, 1);
  refreshCameraStrip();
}
// Item 10: review captured photos full-screen while staying inside the live
// capture interface. Injected directly into the DOM (no render()) so the
// camera stream/video element is never torn down.
function reviewCameraPhoto(idx){
  if(!S.camera || !S.camera.temp.length) return;
  closeCameraReview();
  S.camera.reviewIdx = Math.max(0, Math.min(idx, S.camera.temp.length - 1));
  const ov = document.createElement("div");
  ov.id = "__cam_review__";
  ov.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:7000;display:flex;flex-direction:column;align-items:center;justify-content:center";
  ov.onclick = closeCameraReview;
  document.body.appendChild(ov);
  paintCameraReview();
}
function paintCameraReview(){
  const ov = document.getElementById("__cam_review__");
  if(!ov) return;
  if(!S.camera.temp.length){ closeCameraReview(); return; }
  const i = S.camera.reviewIdx;
  const total = S.camera.temp.length;
  ov.innerHTML =
    '<button onclick="event.stopPropagation();closeCameraReview()" style="position:absolute;top:18px;right:18px;background:rgba(0,0,0,.55);color:#fff;border:none;width:44px;height:44px;border-radius:50%;font-size:24px;font-weight:900;cursor:pointer;z-index:1">×</button>' +
    '<div style="position:absolute;top:24px;left:50%;transform:translateX(-50%);color:#fff;font-size:12px;font-weight:800;letter-spacing:.4px;background:rgba(0,0,0,.55);padding:6px 14px;border-radius:14px">' + (i+1) + ' / ' + total + '</div>' +
    '<img src="' + S.camera.temp[i] + '" onclick="event.stopPropagation()" style="max-width:96vw;max-height:74vh;object-fit:contain;border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,.6)"/>' +
    (total > 1 ? '<button onclick="event.stopPropagation();reviewStep(-1)" ' + (i===0?'disabled':'') + ' style="position:absolute;top:50%;left:14px;transform:translateY(-50%);background:rgba(0,0,0,.55);color:#fff;border:none;width:48px;height:48px;border-radius:50%;font-size:26px;font-weight:900;cursor:pointer;opacity:' + (i===0?'.25':'1') + '">‹</button>' : '') +
    (total > 1 ? '<button onclick="event.stopPropagation();reviewStep(1)" ' + (i===total-1?'disabled':'') + ' style="position:absolute;top:50%;right:14px;transform:translateY(-50%);background:rgba(0,0,0,.55);color:#fff;border:none;width:48px;height:48px;border-radius:50%;font-size:26px;font-weight:900;cursor:pointer;opacity:' + (i===total-1?'.25':'1') + '">›</button>' : '') +
    '<button onclick="event.stopPropagation();deleteReviewedPhoto()" style="position:absolute;bottom:calc(env(safe-area-inset-bottom,16px) + 20px);left:50%;transform:translateX(-50%);background:#dc2626;color:#fff;border:none;padding:12px 22px;border-radius:10px;font-weight:800;font-size:12px;letter-spacing:.3px;cursor:pointer;font-family:inherit">🗑 DELETE THIS PHOTO</button>';
}
function reviewStep(d){
  S.camera.reviewIdx = Math.max(0, Math.min(S.camera.reviewIdx + d, S.camera.temp.length - 1));
  paintCameraReview();
}
function deleteReviewedPhoto(){
  S.camera.temp.splice(S.camera.reviewIdx, 1);
  refreshCameraStrip();
  if(!S.camera.temp.length){ closeCameraReview(); return; }
  S.camera.reviewIdx = Math.min(S.camera.reviewIdx, S.camera.temp.length - 1);
  paintCameraReview();
}
function closeCameraReview(){
  const ov = document.getElementById("__cam_review__");
  if(ov) ov.remove();
}
function refreshCameraStrip(){
  const el = document.getElementById("__cam_strip__");
  if(el){
    el.innerHTML = S.camera.temp.map((p,i)=>
      '<div class="cam-strip-item"><img src="' + p + '" onclick="reviewCameraPhoto(' + i + ')"/><button class="photo-thumb-x" onclick="event.stopPropagation();removeCameraTemp(' + i + ')">×</button></div>'
    ).join("");
  }
  const dn = document.getElementById("__cam_done__");
  if(dn){
    const ok = S.camera.temp.length > 0;
    const maxThis = (S.camera.mode === "shelf") ? MAX_PHOTOS_PER_CATEGORY : 1;
    dn.disabled = !ok;
    dn.textContent = "DONE" + (ok && maxThis > 1 ? (" (" + S.camera.temp.length + ")") : "");
  }
  const cnt = document.getElementById("__cam_counter__");
  if(cnt) cnt.textContent = S.camera.temp.length + " / " + MAX_PHOTOS_PER_CATEGORY;
}
function commitCameraPhotos(){
  if(!S.camera.temp.length){ showToast("TAKE AT LEAST ONE PHOTO", true); return; }
  const mode = S.camera.mode;
  if(mode === "selfie"){
    S.selfie = S.camera.temp[0];
    // Stamp the moment the attendance selfie was taken (local IST-style HH:mm:ss).
    S.selfieTime = nowTime();
    if(!S.selfieTime){ S.selfieTime = nowTime(); }   // belt-and-braces
  } else if(mode === "talker"){
    if(S.camera.skuId){ S.skuPhotos[S.camera.skuId] = S.camera.temp[0]; }
  } else {
    // shelf
    S.shelfPhotos[S.camera.category] = S.camera.temp.slice();
  }
  closeCamera();
}

function getMissingPhotoCategories(){

  if(!isPhotoMandatory()) return [];
  const acc = CHAIN_TO_ACCOUNT[S.account] || S.account;
  const cats = getCategoriesForAccount(acc);

  if(S.attendance !== "PRESENT") return [];
  if(!isPhotoMandatory()) return [];
  const acc = CHAIN_TO_ACCOUNT[S.account] || S.account;

}

// helper for HTML-escaping camera title strings
function esc(s){ return String(s||"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); }

function buildAttendanceSubmission() {
  const att = S.attendance;
  let attRecord = att, attReason = "", attDetail = "", attendanceClass = "PRESENT";
  if (att === "PRESENT") {
    attRecord = "PRESENT"; attendanceClass = "PRESENT";
  } else if (att === "ADHOC TASK ASSIGNED") {
    attRecord = "PRESENT (ADHOC TASK)"; attReason = "ADHOC TASK"; attDetail = S.adhocReason; attendanceClass = "PRESENT";
  } else if (att === "STORE CLOSED") {
    attRecord = "PRESENT (STORE CLOSED)"; attReason = "STORE CLOSED";
    attDetail = S.closedReason === "OTHERS" ? "OTHERS: " + S.closedOtherText : S.closedReason;
    attendanceClass = "PRESENT";
  } else if (att === "STORE UNDER INDEPENDENT AUDIT") {
    attRecord = "PRESENT (STORE UNDER AUDIT)"; attReason = "STORE UNDER AUDIT"; attendanceClass = "PRESENT";
  } else if (att === "EMERGENCY LEAVE") {
    attRecord = "ABSENT (EMERGENCY LEAVE)"; attReason = "EMERGENCY LEAVE"; attendanceClass = "ABSENT";
  } else if (att === "BANNED (DUE TO DISCIPLINARY ACTIONS)") {
    attRecord = "ABSENT (BANNED DUE TO DISCIPLINARY ACTIONS)"; attReason = "BANNED DUE TO DISCIPLINARY ACTIONS"; attendanceClass = "ABSENT";
  }
  return {attRecord, attReason, attDetail, attendanceClass};
}

function submitAttendance() {
  const {attRecord, attReason, attDetail, attendanceClass} = buildAttendanceSubmission();
  const id = genId();
  const store = STORES[String(S.storeCode)] || {};
  const emp = EMPLOYEES[S.empCode] || {};
  const sub = {
    id, submittedAt: nowStr(), submitDate: todayDate().toLocaleDateString("en-IN"), submitTime: nowTime(),
    formStartTime: formatDateTimeISO(S.formStartAt), duration: durationFromStart(S.formStartAt), dateISO: todayISO(),
    zone: S.zone, state: S.state, branch: S.state, city: S.city, account: S.account,
    storeCode: S.storeCode, storeName: store.name||"",
    empCode: S.empCode, empName: emp.name||"", empDesig: emp.desig||"",
    payroll: emp.payroll||"", hq: emp.hq||"", phone: emp.phone||"",
    soName: emp.soName||"", soEmployeeCode: emp.soEmployeeCode||"", asmName: emp.asmName||"", zmName: emp.zmName||"",
    attendance: attRecord, attendanceClass: attendanceClass, attReason: attReason, attDetail: attDetail,
    details: null, sosData: null
  };
  sub.clientKey = makeClientKey();
  sub.synced = false; sub.dataSynced = false;
  sub.pending = {
    clientKey: sub.clientKey,
    photos: {},
    selfie: S.selfie || "",
    selfieTime: (S.selfie && !S.selfieTime ? nowTime() : (S.selfieTime || "")),
    skuPhotos: {},
    gps: S.gps || { lat:null, lng:null, accuracy:null, status:"UNKNOWN" },
    formDurationSec: S.formStartAt ? Math.round((Date.now() - new Date(S.formStartAt).getTime())/1000) : ""
  };
  S.submissions.push(sub);
  saveSubmissions();
  clearCurrentDraft();
  S.viewSubId = id;
  S.view = "att-done";
  render();
  S.selfie = ""; S.selfieTime = ""; S.gps = null;
  setTimeout(function(){ showSyncModal(sub, "syncing"); syncSubmission(sub, true); }, 250);
}

async function doSubmit() {
  // v3: photo gates (skip for DMART) + GPS capture before submission
  if (isSelfieMissing()) {
    showAlert("📷 SELFIE REQUIRED", "Please take your attendance selfie before submitting.");
    return;
  }
  const missingTalkers = getMissingShelfTalkerSkus();
  if (missingTalkers.length) {
    const list = missingTalkers.slice(0,2).join(", ") + (missingTalkers.length > 2 ? (" +" + (missingTalkers.length-2) + " MORE") : "");
    showAlert("📷 SHELF TALKER PHOTO MISSING", "A shelf talker photo is still missing for: " + list + ".");
    return;
  }
  const missing = getMissingPhotoCategories();
  if (missing.length) {
    showAlert("📷 CATEGORY PHOTO REQUIRED", "A category photo is required for: " + missing.join(", ") + ".");
    return;
  }
  // Capture GPS at submit. If we don't get a CAPTURED fix, gate the submission:
  // let the rep RETRY (fresh capture) or explicitly SUBMIT ANYWAY. Stops silent
  // "moved-on-too-early" rows without hard-blocking a genuine no-signal visit.
  let gps;
  while (true) {
    showLoadingModal("GETTING LOCATION…");
    try {
      gps = await captureGPS();
    } catch (e) {
      gps = { lat:null, lng:null, accuracy:null, status:"FAILED" };
    } finally {
      hideModal();
    }
    S.gps = gps;
    if (gps && gps.status === "CAPTURED") break;
    const choice = await showGpsGate(gps ? gps.status : "UNKNOWN");
    if (choice === "anyway") break;
  }
  doSubmitInner();
}

function doSubmitInner() {
  const id = genId();
  const store = STORES[String(S.storeCode)] || {};
  const emp = EMPLOYEES[S.empCode] || {};
  const acc = CHAIN_TO_ACCOUNT[S.account] || S.account;
  const skus = getSkus(acc);
  const sub = {
    id, submittedAt: nowStr(), submitDate: todayDate().toLocaleDateString("en-IN"), submitTime: nowTime(),
    formStartTime: formatDateTimeISO(S.formStartAt), duration: durationFromStart(S.formStartAt), dateISO: todayISO(),
    zone: S.zone, state: S.state, branch: S.state, city: S.city, account: S.account,
    storeCode: S.storeCode, storeName: store.name||"",
    empCode: S.empCode, empName: emp.name||"", empDesig: emp.desig||"",
    payroll: emp.payroll||"", hq: emp.hq||"", phone: emp.phone||"",
    soName: emp.soName||"", soEmployeeCode: emp.soEmployeeCode||"", asmName: emp.asmName||"", zmName: emp.zmName||"",
    attendance: "PRESENT", attendanceClass: "PRESENT", attReason: "", attDetail: "",
    sosData: JSON.parse(JSON.stringify(S.sosData)),
    details: skus.map(s => {
      const a = S.skuAns[s.id] || {};
      const cat = s.cat;
      const sosForCat = S.sosData[cat] || {};
      const sosOur = sosForCat.our !== "" ? Number(sosForCat.our) : null;
      const sosTotal = sosForCat.total !== "" ? Number(sosForCat.total) : null;
      const sosPct = (sosOur !== null && sosTotal !== null && sosTotal > 0) ? Math.round(sosOur/sosTotal*100) : (sosOur === 0 && sosTotal === 0 ? 0 : null);
      return {
        skuId: s.id, code: s.code, chain_code: s.chain_code, brand: s.brand, desc: s.desc, cat: s.cat, div: s.div,
        status: a.status,
        qty: a.qty != null && a.qty !== "" ? Number(a.qty) : null,
        mrp: a.mrp != null && a.mrp !== "" ? Number(a.mrp) : null,
        sp: a.sp != null && a.sp !== "" ? Number(a.sp) : null,
        discountPct: (a.mrp && a.sp && Number(a.mrp) > 0 && Number(a.sp) > 0) ? Math.round(((Number(a.mrp)-Number(a.sp))/Number(a.mrp))*100) : "",
        sosOur: sosOur, sosTotal: sosTotal, sosPct: sosPct
      };
    })
  };
  sub.clientKey = makeClientKey();
  sub.synced = false; sub.dataSynced = false;
  sub.pending = {
    clientKey: sub.clientKey,
    photos: JSON.parse(JSON.stringify(S.shelfPhotos || {})),
    selfie: S.selfie || "",
    selfieTime: (S.selfie && !S.selfieTime ? nowTime() : (S.selfieTime || "")),
    skuPhotos: JSON.parse(JSON.stringify(S.skuPhotos || {})),
    gps: S.gps || { lat:null, lng:null, accuracy:null, status:"UNKNOWN" },
    formDurationSec: S.formStartAt ? Math.round((Date.now() - new Date(S.formStartAt).getTime())/1000) : ""
  };
  S.submissions.push(sub);
  saveSubmissions();
  clearCurrentDraft();
  S.viewSubId = id;
  S.view = "success";
  render();
  S.shelfPhotos = {}; S.skuPhotos = {}; S.selfie = ""; S.selfieTime = ""; S.gps = null;
  setTimeout(function(){ showSyncModal(sub, "syncing"); syncSubmission(sub, true); }, 250);
}

function buildRowsForSubmission(sub) {
  const rows = [];
  // Keys MUST match the Apps Script RESPONSE_HEADERS_V5 names exactly, or the
  // column lands blank. The backend fills Selfie URL / Shelf Talker Photo URL /
  // Category Photo URL 1-4 / GPS / Submission ID,Date,Time / Form Duration
  // itself from the payload, so we do not set those here. SOS% and Discount %
  // are sent as plain numbers (0-100); the sheet formats them with a % sign.
  const branchValue = sub.branch || sub.state || "";
  const baseRow = {
    Zone: sub.zone || "", Branch: branchValue, City: sub.city || "", HQ: sub.hq || "",
    Account: sub.account || "",
    "Store Code": sub.storeCode || "", "Store Name": sub.storeName || "",
    "Employee Code": sub.empCode || "", "Employee Name": sub.empName || "",
    Designation: sub.empDesig || "", Payroll: sub.payroll || "",
    "SO Name": sub.soName || "", "ASM Name": sub.asmName || "", "ZM/RM Name": sub.zmName || "",
    Phone: sub.phone || "",
    Attendance: sub.attendance || "",
    "Attendance Reason": (sub.attReason || "") + (sub.attDetail ? (" — " + sub.attDetail) : "")
  };
  if (sub.attendance !== "PRESENT" || !sub.details || sub.details.length === 0) {
    rows.push({...baseRow, Division:"", Category:"", Brand:"", "Product Name":"", "PBB Code":"", "Chain Article Code":"", Availability:"", Quantity:"", MRP:"", "Selling Price":"", "Discount %":"", "Patanjali Face-up":"", "All Brand Face-up":"", "SOS%":""});
  } else {
    sub.details.forEach(d => rows.push({...baseRow,
      Division:d.div||"", Category:d.cat||"", Brand:d.brand||"", "Product Name":d.desc||"", "PBB Code":d.code||"", "Chain Article Code":d.chain_code||"", Availability:(d.status==="NOT LISTED" ? nlLabelFor(sub.account) : (d.status||"")), Quantity:d.qty!=null?d.qty:"", MRP:d.mrp!=null?d.mrp:"", "Selling Price":d.sp!=null?d.sp:"", "Discount %":(d.discountPct===""||d.discountPct==null?"":d.discountPct), "Patanjali Face-up":d.sosOur!=null?d.sosOur:"", "All Brand Face-up":d.sosTotal!=null?d.sosTotal:"", "SOS%":d.sosPct!=null?d.sosPct:""
    }));
  }
  return rows;
}

function postToWebhook(rows) {
  if (!WEBHOOK_URL) {
    showToast("WEBHOOK NOT CONFIGURED", true);
    return;
  }
  if (!rows || !rows.length) {
    showToast("NOTHING TO SUBMIT", true);
    return;
  }
  // The v3 backend uploads photos to Drive and writes their URLs into the
  // Selfie URL / Shelf Talker URL / Shelf Photo N URL columns, so we MUST send
  // the base64 images. It keys category photos by Category and shelf-talker
  // photos by PBB Code, matching how this client stores them.
  const photos = S.shelfPhotos || {};                 // { Category: [base64,...] }
  const skuPhotos = S.skuPhotos || {};                // { PBB Code: base64 }
  const shelfPhotoCount = Object.values(photos).reduce((a,b)=>a+(b?b.length:0), 0);
  const talkerCount = Object.keys(skuPhotos).length;
  const selfieCount = S.selfie ? 1 : 0;
  const totalPhotoCount = shelfPhotoCount + talkerCount + selfieCount;
  const payloadObj = {
    rows: rows,
    photos: photos,
    selfie: S.selfie || "",
    // Last-resort: a PRESENT submission with a selfie must carry a time.
    selfieTime: (S.selfie && !S.selfieTime ? nowTime() : (S.selfieTime || "")),
    skuPhotos: skuPhotos,
    clientBuild: "HTML-v8-attTime-2",
    gps: S.gps || { lat:null, lng:null, accuracy:null, status:"UNKNOWN" },
    formDurationSec: S.formStartAt ? Math.round((Date.now() - new Date(S.formStartAt).getTime())/1000) : "",
    source: "PATANJALI_MODERN_TRADE_SAATHI_V3",
    clientTime: new Date().toISOString()
  };
  showLoadingModal(totalPhotoCount ? ("UPLOADING " + totalPhotoCount + " PHOTO" + (totalPhotoCount>1?"S":"") + " & SUBMITTING…") : "SUBMITTING…");
  fetch(WEBHOOK_URL, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify(payloadObj)
  }).then(() => {
    hideModal();
    showToast("SUBMITTED ✓");
    S.shelfPhotos = {};
    S.skuPhotos = {};
    S.selfie = "";
    S.selfieTime = "";
    S.gps = null;
  }).catch(err => {
    hideModal();
    showToast("FAILED – CHECK NETWORK", true);
    console.error("Fetch error:", err);
  });
}

async function init(){
  try { if ("scrollRestoration" in history) history.scrollRestoration = "manual"; } catch (_) {}
  loadSubmissions();
  installCurrentDraftAutosave();
  // Show loading splash while we fetch master data
  document.body.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:Arial,sans-serif;color:#0a3d2e;text-align:center;padding:20px">' +
    '<div style="width:48px;height:48px;border:5px solid #d5e8d5;border-top-color:#0a3d2e;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:18px"></div>' +
    '<div style="font-size:14px;font-weight:800;letter-spacing:.4px">LOADING…</div>' +
    '<div style="font-size:11px;color:#888;margin-top:6px">Please wait</div>' +
    '</div><style>@keyframes spin{to{transform:rotate(360deg)}}</style>';
  try{
    await loadMasterData(false);
  }catch(e){
    document.body.innerHTML = '<div style="padding:30px;font-family:Arial,sans-serif;color:#991b1b;text-align:center">' +
      '<div style="font-size:36px;margin-bottom:14px">⚠️</div>' +
      '<div style="font-size:15px;font-weight:800;letter-spacing:.4px;margin-bottom:8px">COULD NOT LOAD DATA</div>' +
      '<div style="font-size:12px;color:#444;line-height:1.5;max-width:340px;margin:0 auto">' + (e && e.message ? e.message : e) + '</div>' +
      '<button onclick="location.reload()" style="margin-top:20px;background:#0a3d2e;color:#fff;border:none;padding:12px 24px;border-radius:8px;font-weight:800;letter-spacing:.4px;cursor:pointer">RETRY</button>' +
      '</div>';
    return;
  }
  // Rebuild the original app shell now that data is loaded
  document.body.innerHTML = '<div class="app" id="app"></div>';
  // Replace render container reference
  // v10 LOGIN: restore a saved session, otherwise show the login screen.
  const savedLogin = getSavedLogin();
  if (savedLogin) {
    S.login = savedLogin;
    const mgr = findManagerByCode(savedLogin.code);
    if (mgr) { S.mgr = mgr; S.view = "dash"; }
    else { applyLoginToState(findEmployeeByCode(savedLogin.code)); S.view = "home"; }
  } else {
    S.view = "login";
  }
  // Restore unfinished audit/attendance work after mobile call refresh or reload.
  if (S.view !== "login" && S.view !== "dash") restoreCurrentDraftIfAny();
  render();
  if (S.view === "dash") { try { loadDashboard(true); } catch (e) {} }
  // v9: reliability layer — show sync status + retry any unsent reports.
  try {
    ensureSyncBanner();
    updateSyncBadge();
    syncAllPending();
    window.addEventListener("online", function(){ syncAllPending(); });
    if (!window.__saathiSyncTimer) {
      window.__saathiSyncTimer = setInterval(function(){
        if (navigator.onLine !== false) syncAllPending();
      }, 45000);
    }
    if (!window.__saathiBackHooked) {
      window.__saathiBackHooked = true;
      window.addEventListener("popstate", saathiPopstate);
      armBackBuffer();   // keep a small history buffer so BACK can never instantly close the app
    }
  } catch (e) {}
}
