function isMJPPeriodActive() {
  const d = todayDate();
  return d.getFullYear() === MJP_YEAR && d.getMonth() === MJP_MONTH;
}
function todayDayOfMonth() { return todayDate().getDate(); }
function todayISO() {
  const d = todayDate(), p = n => String(n).padStart(2,"0");
  return d.getFullYear() + "-" + p(d.getMonth()+1) + "-" + p(d.getDate());
}
function nowStr() {

}

}
function formatDateTimeISO(iso) {

  return d.toLocaleString("en-IN");
}
function durationFromStart(startIso) {
  if (!startIso) return "";
  const start = new Date(startIso);
  const end = new Date();
  const diff = Math.round((end - start) / 1000);
  const mins = Math.floor(diff / 60);
  const secs = diff % 60;
  return `${mins}m ${secs}s`;
}
function genId() {

// ── MASTER QUERIES ──
function getZones() { return uniq(Object.values(STORES).map(s => s.zone)).filter(Boolean).sort(); }
function getStates(zone) {
  if (!zone) return [];
  return uniq(Object.values(STORES).filter(s => s.zone === zone).map(s => s.state)).sort();
}
function getCities(zone, state) {
  if (!zone || !state) return [];
  return uniq(Object.values(STORES).filter(s => s.zone === zone && s.state === state).map(s => s.city)).sort();
}
function getAccounts(zone, state, city) {
  if (!zone || !state || !city) return [];
  return uniq(Object.values(STORES).filter(s => s.zone === zone && s.state === state && s.city === city).map(s => s.chain)).sort();
}
function getStoresForCriteria(zone, state, city, accountChain) {
  return Object.values(STORES).filter(s => s.zone === zone && s.state === state && s.city === city && s.chain === accountChain);
}
function getEmployeesForCriteria(zone, state, city, accountChain) {
  const matchingStoreCodes = new Set(getStoresForCriteria(zone, state, city, accountChain).map(s => s.code));
  const result = [];
  for (const ec of Object.keys(EMPLOYEES)) {
    const stores = EMP_STORES[ec] || [];
    if (stores.some(sc => matchingStoreCodes.has(sc))) {
      result.push(EMPLOYEES[ec]);
    }
  }
  return result.sort((a,b) => (a.name || "").localeCompare(b.name || ""));
}
function getMJPStoresForEmployeeToday(empCode, zone, state, city, accountChain) {
  if (!empCode) return {type:"NONE", stores:[]};
  if (!isMJPPeriodActive()) return {type:"WRONG_PERIOD", stores:[]};
  const day = String(todayDayOfMonth());
  const mjpEntry = MJP[empCode];
  if (!mjpEntry || mjpEntry[day] === undefined || mjpEntry[day] === null) return {type:"NO_PLAN", stores:[]};
  const v = mjpEntry[day];
  if (typeof v === "string") return {type:"OFF", reason: v, stores: []};
  const matchingStoreCodes = new Set(getStoresForCriteria(zone, state, city, accountChain).map(s => s.code));
  const stores = v.filter(sc => matchingStoreCodes.has(sc)).map(sc => STORES[sc]).filter(Boolean);
  return {type:"STORES", stores};
}
function getTotalMJPStoresForEmployeeToday(empCode) {
  if (!empCode) return 0;
  if (!isMJPPeriodActive()) return 0;
  const day = String(todayDayOfMonth());
  const v = MJP[empCode] && MJP[empCode][day];
  if (!v || typeof v === "string") return 0;
  return v.length;
}
function getStoresCompletedToday(empCode) {
  if (!empCode) return 0;
  const today = todayISO();
  const set = new Set();
  S.submissions.forEach(sub => {
    if (sub.empCode === empCode && sub.dateISO === today && sub.attendance === "PRESENT") {
      set.add(sub.storeCode);
    }
  });
  return set.size;
}
function hasSubmittedTodayForStore(storeCode, empCode) {
  const today = todayISO();
  return S.submissions.some(s => String(s.storeCode) === String(storeCode) && s.empCode === empCode && s.attendance === "PRESENT" && s.dateISO === today);
}
function hasSubmittedAttendanceToday(empCode) {
  const today = todayISO();
  return S.submissions.some(s => s.empCode === empCode && s.dateISO === today && s.attendance !== "PRESENT");
}
function getEmployeeMJPTodayStatus(empCode) {
  if (!empCode) return {type:"NONE"};
  if (!isMJPPeriodActive()) return {type:"WRONG_PERIOD"};
  const day = String(todayDayOfMonth());
  const entry = MJP[empCode];
  if (!entry) return {type:"NO_PLAN"};
  const v = entry[day];
  if (v === undefined || v === null) return {type:"NO_PLAN"};
  if (typeof v === "string") return {type:"OFF", reason: v.toUpperCase()};
  const storeList = v.map(sc => STORES[sc] ? STORES[sc].name : sc);
  return {type:"WORKING", count: v.length, stores: storeList, codes: v};
}
function getSkus(account) { return SKU_MASTER[account] || []; }
function getCategoriesForAccount(account) { return uniq(getSkus(account).map(s => s.cat)); }
function getSkusByCat(account, cat) { return getSkus(account).filter(s => s.cat === cat); }
function isSkuAnswered(skuId) {
  const a = S.skuAns[skuId];
  if (!a || !a.status) return false;
  if (a.status === "OUT OF STOCK" || a.status === "NOT LISTED") return true;
  if (a.status === "IN STOCK") return a.qtyConfirmed && a.priceConfirmed;
  return false;
}
function isSkuStarted(skuId) {
  const a = S.skuAns[skuId];
  if (!a) return false;
  if (a.status) return true;
  return false;
}
function catHasAnyStarted(account, cat) {
  return getSkusByCat(account, cat).some(s => isSkuStarted(s.id));
}
function isCatComplete(account, cat) {
  const skus = getSkusByCat(account, cat);
  return skus.length > 0 && skus.every(s => isSkuAnswered(s.id)) && (S.sosData[cat] && S.sosData[cat].confirmed === true);
}
function catAnsweredCount(account, cat) {
  return getSkusByCat(account, cat).filter(s => isSkuAnswered(s.id)).length;
}
function allSkusOutOfStockOrNotListed(account, cat) {
  const skus = getSkusByCat(account, cat);
  if (skus.length === 0) return false;
  return skus.every(s => {
    const a = S.skuAns[s.id];
    return a && (a.status === "OUT OF STOCK" || a.status === "NOT LISTED");
  });
}
function hasAnyInStockWithQty(account, cat) {
  const skus = getSkusByCat(account, cat);
  return skus.some(s => {
    const a = S.skuAns[s.id];
    return a && a.status === "IN STOCK" && a.qtyConfirmed && Number(a.qty) > 0;
  });
}
function validateSOS(account, cat) {
  const sos = S.sosData[cat] || {our:"", total:"", confirmed:false};
  if (sos.our === "" || sos.total === "") return {ok:false, error:"PLEASE FILL BOTH FACE-UP FIELDS"};
  const our = Number(sos.our), total = Number(sos.total);
  if (isNaN(our) || isNaN(total) || our < 0 || total < 0) return {ok:false, error:"FACE-UPS MUST BE NUMERIC AND ≥ 0"};
  if (total > 999) return {ok:false, error:"TOTAL FACE-UPS CANNOT EXCEED 999"};
  if (our > total) return {ok:false, error:"PATANJALI FACE-UPS CANNOT EXCEED TOTAL FACE-UPS"};
  if (allSkusOutOfStockOrNotListed(account, cat) && our !== 0) return {ok:false, error:"ALL SKUS ARE OUT OF STOCK / NOT LISTED — PATANJALI FACE-UPS MUST BE 0"};
  if (hasAnyInStockWithQty(account, cat)) {
    if (our === 0) return {ok:false, error:"YOU HAVE STOCK QUANTITY ENTERED — PATANJALI FACE-UPS CANNOT BE 0"};
    if (total === 0) return {ok:false, error:"YOU HAVE STOCK QUANTITY ENTERED — TOTAL FACE-UPS CANNOT BE 0"};
  }
  return {ok:true, error:null};
}
function getSOSPct(cat) {
  const sos = S.sosData[cat] || {};
  if (sos.our === "" || sos.total === "" || sos.our == null || sos.total == null) return null;
  const our = Number(sos.our), total = Number(sos.total);
  if (isNaN(our) || isNaN(total)) return null;
  if (total === 0) return our === 0 ? 0 : null;
  return Math.round(our / total * 100);
}
function getOverallSOS() {
  let our = 0, total = 0;
  Object.values(S.sosData).forEach(d => { our += Number(d.our||0); total += Number(d.total||0); });
  if (total === 0) return our === 0 ? 0 : null;
  return Math.round(our/total*100);
}
function validatePrice(skuId) {
  const a = S.skuAns[skuId];
  if (!a) return {ok:false, error:"NO DATA"};
  if (a.mrp === "" || a.sp === "") return {ok:false, error:"FILL BOTH MRP AND SP"};
  const mrp = Number(a.mrp), sp = Number(a.sp);
  if (isNaN(mrp) || isNaN(sp) || mrp <= 0 || sp <= 0) return {ok:false, error:"MRP & SP MUST BE > 0"};
  if (sp > mrp) return {ok:false, error:"SELLING PRICE CANNOT EXCEED MRP"};
  return {ok:true, error:null};
}

    subAttUI = '<div class="sub-att-block"><h3>📋 ADHOC TASK — ENTER REASON</h3>' +
      '<textarea class="sub-att-textarea" id="adhoc-reason" placeholder="DESCRIBE THE ADHOC TASK ASSIGNED TO YOU TODAY..." ' + (S.adhocConfirmed?"disabled":"") + '>' + (S.adhocReason||"") + '</textarea>' +
      '<div class="sub-tick-row">' +
      '<div class="sub-tick-label">' + (S.adhocConfirmed ? "✓ REASON CONFIRMED" : "TAP TICK TO CONFIRM REASON") + '</div>' +
      '<button class="sub-tick-btn' + (S.adhocConfirmed?" confirmed":"") + '" id="adhoc-tick" ' + ((!S.adhocReason || S.adhocReason.trim().length < 3) && !S.adhocConfirmed ? "disabled" : "") + '>✓</button>' +
      '</div></div>';
  } else if (att === "STORE CLOSED") {
    const reasonOpts = [
      ["UNDER CONSTRUCTION/RENOVATION", "STORE UNDER CONSTRUCTION/RENOVATION"],
      ["GOVERNMENT RESTRICTION", "GOVERNMENT RESTRICTION"],
      ["NATURAL/UNNATURAL CALAMITY", "NATURAL/UNNATURAL CALAMITY IN STORE"],
      ["OTHERS", "OTHERS"]
    ];
    subAttUI = '<div class="sub-att-block"><h3>🚫 STORE CLOSED — SELECT REASON</h3>' +
      '<select class="sel sub-att-sel" id="closed-reason" ' + (S.closedConfirmed?"disabled":"") + '>' +
      '<option value="">— SELECT REASON —</option>' +
      reasonOpts.map(([v, l]) => '<option value="' + v + '"' + (S.closedReason===v?" selected":"") + '>' + l + '</option>').join("") +
      '</select>';
    if (S.closedReason === "OTHERS") {
      subAttUI += '<textarea class="sub-att-textarea" id="closed-other" style="margin-top:8px" placeholder="PLEASE SPECIFY THE REASON..." ' + (S.closedConfirmed?"disabled":"") + '>' + (S.closedOtherText||"") + '</textarea>';
    }
    let canConfirm = !!S.closedReason && (S.closedReason !== "OTHERS" || (S.closedOtherText && S.closedOtherText.trim().length >= 3));
    subAttUI += '<div class="sub-tick-row">' +
      '<div class="sub-tick-label">' + (S.closedConfirmed ? "✓ REASON CONFIRMED" : "TAP TICK TO CONFIRM REASON") + '</div>' +
      '<button class="sub-tick-btn' + (S.closedConfirmed?" confirmed":"") + '" id="closed-tick" ' + (!canConfirm && !S.closedConfirmed ? "disabled" : "") + '>✓</button>' +
      '</div></div>';
  } else if (att === "STORE UNDER INDEPENDENT AUDIT") {
    subAttUI = '<div class="sub-att-block"><h3>📊 STORE UNDER INDEPENDENT AUDIT</h3>' +
      '<div style="font-size:11px;color:#7c3d00;font-weight:700;margin-bottom:10px;line-height:1.5">CONFIRM THAT THIS STORE IS CURRENTLY UNDER INDEPENDENT AUDIT.</div>' +
      '<div class="sub-tick-row">' +
      '<div class="sub-tick-label">' + (S.underAuditConfirmed ? "✓ CONFIRMED" : "TAP TICK TO CONFIRM") + '</div>' +
      '<button class="sub-tick-btn' + (S.underAuditConfirmed?" confirmed":"") + '" id="audit-tick">✓</button>' +
      '</div></div>';
  } else if (att === "EMERGENCY LEAVE") {
    subAttUI = '<div class="sub-att-block" style="background:#fef2f2;border-color:#dc2626"><h3 style="color:#991b1b">⚠️ EMERGENCY LEAVE</h3>' +
      '<div style="font-size:11px;color:#991b1b;font-weight:700;margin-bottom:10px;line-height:1.5">CONFIRM THAT YOU ARE ON EMERGENCY LEAVE TODAY. THIS WILL BE RECORDED AS ABSENT.</div>' +
      '<div class="sub-tick-row">' +
      '<div class="sub-tick-label" style="color:#991b1b">' + (S.emergencyConfirmed ? "✓ CONFIRMED" : "TAP TICK TO CONFIRM") + '</div>' +
      '<button class="sub-tick-btn' + (S.emergencyConfirmed?" confirmed":"") + '" id="emergency-tick">✓</button>' +
      '</div></div>';
  } else if (att === "BANNED (DUE TO DISCIPLINARY ACTIONS)") {
    subAttUI = '<div class="sub-att-block" style="background:#fef2f2;border-color:#dc2626"><h3 style="color:#991b1b">⛔ BANNED DUE TO DISCIPLINARY ACTIONS</h3>' +
      '<div style="font-size:11px;color:#991b1b;font-weight:700;margin-bottom:10px;line-height:1.5">CONFIRM THIS STATUS. THIS WILL BE RECORDED AS ABSENT.</div>' +
      '<div class="sub-tick-row">' +
      '<div class="sub-tick-label" style="color:#991b1b">' + (S.bannedConfirmed ? "✓ CONFIRMED" : "TAP TICK TO CONFIRM") + '</div>' +
      '<button class="sub-tick-btn' + (S.bannedConfirmed?" confirmed":"") + '" id="banned-tick">✓</button>' +
      '</div></div>';
  }

  const accSku = CHAIN_TO_ACCOUNT[acc] || acc;
  const skusForAccount = getSkus(accSku);
  const canStartAudit = attReady && att === "PRESENT" && skusForAccount.length > 0 && !alreadyDone;
  const canSubmitAdhoc = attReady && att === "ADHOC TASK ASSIGNED" && S.adhocConfirmed;
  const canSubmitClosed = attReady && att === "STORE CLOSED" && S.closedConfirmed;
  const canSubmitUnderAudit = attReady && att === "STORE UNDER INDEPENDENT AUDIT" && S.underAuditConfirmed;
  const canSubmitEmergency = attReady && att === "EMERGENCY LEAVE" && S.emergencyConfirmed;
  const canSubmitBanned = attReady && att === "BANNED (DUE TO DISCIPLINARY ACTIONS)" && S.bannedConfirmed;
  const noSku = att === "PRESENT" && acc && !skusForAccount.length;

  return '' +
  '<div class="hero"><div class="hero-logo">🌿</div><div class="hero-title">PATANJALI MODERN TRADE SAATHI</div><div class="hero-sub">DAILY STORE REPORTING FORM</div></div>' +
  '<div class="date-bar">📅 ' + todayDate().toLocaleDateString("en-IN",{weekday:"long",day:"2-digit",month:"long",year:"numeric"}) + ' (DAY ' + todayDayOfMonth() + ')</div>' +
  '<div class="form-card">' +
  fld(1, "SELECT ZONE", !!z, false, '<select class="sel' + (z?" filled":"") + '" id="f-zone"><option value="">— SELECT ZONE —</option>' + zones.map(zn => '<option value="' + zn + '"' + (z===zn?" selected":"") + '>' + zn + ' ZONE</option>').join("") + '</select>') +
  fld(2, "SELECT BRANCH", !!st, !z, '<select class="sel' + (st?" filled":"") + '" id="f-state"' + (!z?" disabled":"") + '><option value="">— SELECT BRANCH —</option>' + states.map(s => '<option value="' + s + '"' + (st===s?" selected":"") + '>' + s + '</option>').join("") + '</select>') +
  fld(3, "SELECT CITY", !!city, !st, '<select class="sel' + (city?" filled":"") + '" id="f-city"' + (!st?" disabled":"") + '><option value="">— SELECT CITY —</option>' + cities.map(c => '<option value="' + c + '"' + (city===c?" selected":"") + '>' + c + '</option>').join("") + '</select>') +
  fld(4, "SELECT ACCOUNT", !!acc, !city, '<select class="sel' + (acc?" filled":"") + '" id="f-acc"' + (!city?" disabled":"") + '><option value="">— SELECT ACCOUNT —</option>' + accounts.map(a => '<option value="' + a + '"' + (acc===a?" selected":"") + '>' + a + '</option>').join("") + '</select>') +
  fld(5, "SELECT EMPLOYEE", !!ec, !acc, '<select class="sel' + (ec?" filled":"") + '" id="f-emp"' + (!acc?" disabled":"") + '><option value="">— SELECT EMPLOYEE —</option>' + employees.map(e => { const ms = getEmployeeMJPTodayStatus(e.code); const suffix = ms.type==="OFF" ? " 🔴 "+ms.reason : ms.type==="WRONG_PERIOD" ? " ⚠️ WRONG PERIOD" : ms.type==="NO_PLAN" ? " ⚪ NO PLAN" : " 🟢 "+ms.count+" STORE"+(ms.count===1?"":"S")+" TODAY"; return '<option value="' + e.code + '"' + (ec===e.code?" selected":"") + '>' + e.name + ' · ' + e.code + suffix + '</option>'; }).join("") + '</select>') +
  mjpBanner +
  (!isEmployeeOffToday && !isEmployeeNoPlan ? fld(6, "SELECT STORE (FROM TODAY'S MJP)", !!sc, !ec, storeContent) : '') +
  (!isEmployeeOffToday && !isEmployeeNoPlan ? '<div class="field-row att-row' + (!sc?" disabled":"") + '">' +
    '<div class="field-label">' + sn(7, !!att, !sc) + '&nbsp;ATTENDANCE STATUS</div>' +
    '<select class="sel ' + attCls + '" id="f-att"' + (!sc?" disabled":"") + '>' +
      '<option value="">— SELECT ATTENDANCE —</option>' +
      '<option value="PRESENT"' + (att==="PRESENT"?" selected":"") + '>✅ PRESENT</option>' +
      '<option value="ADHOC TASK ASSIGNED"' + (att==="ADHOC TASK ASSIGNED"?" selected":"") + '>📋 ADHOC TASK ASSIGNED</option>' +
      '<option value="STORE CLOSED"' + (att==="STORE CLOSED"?" selected":"") + '>🚫 STORE CLOSED</option>' +
      '<option value="STORE UNDER INDEPENDENT AUDIT"' + (att==="STORE UNDER INDEPENDENT AUDIT"?" selected":"") + '>📊 STORE UNDER INDEPENDENT AUDIT</option>' +
      '<option value="EMERGENCY LEAVE"' + (att==="EMERGENCY LEAVE"?" selected":"") + '>⚠️ EMERGENCY LEAVE</option>' +
      '<option value="BANNED (DUE TO DISCIPLINARY ACTIONS)"' + (att==="BANNED (DUE TO DISCIPLINARY ACTIONS)"?" selected":"") + '>⛔ BANNED (DUE TO DISCIPLINARY ACTIONS)</option>' +
    '</select>' +
    (att?'<span class="sel-check">✓</span>':'<span class="sel-arrow">▾</span>') +
  '</div>' : '') +
  '</div>' +
  (!isEmployeeOffToday && !isEmployeeNoPlan ? subAttUI : '') +
  (!isEmployeeOffToday && !isEmployeeNoPlan && alreadyDone && att === "PRESENT" ? '<div class="already-sub-banner">⛔ STOCK AUDIT FOR THIS STORE WAS ALREADY SUBMITTED TODAY.<br>ONLY ONE SUBMISSION PER STORE PER DAY IS ALLOWED.</div>' : "") +
  (!isEmployeeOffToday && !isEmployeeNoPlan && alreadyAttSubmittedToday && att && att !== "PRESENT" ? '<div class="already-sub-banner">⚠️ ATTENDANCE FOR TODAY WAS ALREADY SUBMITTED. ANY NEW SUBMISSION WILL BE ADDED AS AN ADDITIONAL RECORD.</div>' : "") +
  (!isEmployeeOffToday && !isEmployeeNoPlan && noSku ? '<div style="margin:0 14px 8px;background:#fef9ee;border:1.5px solid #d97706;border-radius:10px;padding:11px;font-size:11px;color:#7c3d00;font-weight:700">⚠️ NO SKU LIST AVAILABLE FOR ' + acc + '. CONTACT ADMIN.</div>' : "") +
  '<div style="margin:0 14px 14px;display:flex;flex-direction:column;gap:8px">' +
    (!isEmployeeOffToday && !isEmployeeNoPlan && canStartAudit ? '<button class="btn btn-primary" id="btn-start">START STOCK AUDIT →</button>' : '') +
    (!isEmployeeOffToday && !isEmployeeNoPlan && canSubmitAdhoc ? '<button class="btn btn-att" id="btn-submit-att">SUBMIT ATTENDANCE (ADHOC TASK) →</button>' : '') +
    (!isEmployeeOffToday && !isEmployeeNoPlan && canSubmitClosed ? '<button class="btn btn-att" id="btn-submit-att">SUBMIT ATTENDANCE (STORE CLOSED) →</button>' : '') +
    (!isEmployeeOffToday && !isEmployeeNoPlan && canSubmitUnderAudit ? '<button class="btn btn-att" id="btn-submit-att">SUBMIT ATTENDANCE (UNDER AUDIT) →</button>' : '') +
    (!isEmployeeOffToday && !isEmployeeNoPlan && canSubmitEmergency ? '<button class="btn btn-danger" id="btn-submit-att">SUBMIT ATTENDANCE (EMERGENCY LEAVE) →</button>' : '') +
    (!isEmployeeOffToday && !isEmployeeNoPlan && canSubmitBanned ? '<button class="btn btn-danger" id="btn-submit-att">SUBMIT ATTENDANCE (BANNED) →</button>' : '') +
    (!isEmployeeOffToday && !isEmployeeNoPlan && !attReady ? '<button class="btn btn-primary" style="background:#9ab9ad;cursor:not-allowed">COMPLETE ALL FIELDS ABOVE</button>' : '') +
  '</div>' +
  '<div style="text-align:center;padding-bottom:18px">' +
    '<button class="btn" style="width:auto;padding:9px 22px;background:none;border:1.5px solid #cde0cd;border-radius:20px;font-size:10px;font-weight:800;color:#555;cursor:pointer" id="btn-hist">📋 STORES COMPLETED ' + (ec ? '(' + completedCount + '/' + totalAssignedToday + ')' : '(' + S.submissions.length + ' TOTAL)') + '</button>' +
  '</div>';
}

function renderAudit() {
  const accDisplay = S.account;
  const acc = CHAIN_TO_ACCOUNT[accDisplay] || accDisplay;
  const cats = getCategoriesForAccount(acc);
  if (cats.length === 0) {
    return '<div class="topbar"><button class="topbar-back" id="btn-cancel">✕</button><div class="topbar-title"><h2>PATANJALI MODERN TRADE SAATHI</h2><p>NO CATEGORIES</p></div></div><div class="empty">NO SKU DATA FOR THIS ACCOUNT.</div>';
  }
  let cat = S.currentCat;
  if (!cat || !cats.includes(cat)) {
    cat = cats[0];
    S.currentCat = cat;
  }
  const skus = getSkusByCat(acc, cat);
  const store = STORES[String(S.storeCode)];
  const emp = EMPLOYEES[S.empCode];
  const done = catAnsweredCount(acc, cat);
  const total = skus.length;
  const pct = total ? Math.round(done/total*100) : 0;
  const sos = S.sosData[cat] || {our:"", total:"", confirmed:false};
  const sosValidation = (sos.our !== "" && sos.total !== "") ? validateSOS(acc, cat) : {ok:false, error:null};
  const sosPct = getSOSPct(cat);
  const completedCats = cats.filter(c => isCatComplete(acc, c)).length;
  const totalCats = cats.length;
  const categoryDoneText = completedCats + "/" + totalCats + " CATEGORIES DONE";
  const isLast = cats.indexOf(cat) === cats.length - 1;

  const catOptions = cats.map(c => {
    const isDone = isCatComplete(acc, c);
    const cnt = catAnsweredCount(acc, c);
    const tot = getSkusByCat(acc, c).length;
    const status = isDone ? " ✓ DONE" : (cnt > 0 ? " (" + cnt + "/" + tot + ")" : "");
    return '<option value="' + c + '"' + (cat===c?" selected":"") + (isDone?' class="done"':'') + '>' + catIcon(c) + " " + c + status + '</option>';
  }).join("");

  const hasStartedInCurrent = catHasAnyStarted(acc, cat);
  const isCurrentComplete = isCatComplete(acc, cat);
  const dropdownLocked = hasStartedInCurrent && !isCurrentComplete;
  const lockMsg = dropdownLocked ? '<div class="cat-locked-msg">⚠️ FINISH OR RESET ALL SKUS IN THIS CATEGORY BEFORE SWITCHING. TO RESET A SKU, TAP ITS SELECTED STATUS BUTTON TWICE.</div>' : '';

  return '' +
  '<div class="topbar">' +
    '<button class="topbar-back" id="btn-cancel">✕</button>' +
    '<div class="topbar-title"><h2>PATANJALI MODERN TRADE SAATHI</h2><p>CATEGORY: ' + cat + '</p></div>' +
    '<span class="topbar-badge">' + done + '/' + total + '</span>' +
  '</div>' +
  '<div class="cat-select-wrap">' +
    '<div class="cat-select-label">📂 SWITCH CATEGORY' + (dropdownLocked?" (LOCKED)":"") + '</div>' +
    '<div class="cat-select-wrap-inner">' +
      '<select class="cat-select" id="cat-switcher"' + (dropdownLocked?" disabled":"") + '>' + catOptions + '</select>' +
      '<span class="cat-select-arrow">▾</span>' +
    '</div>' +
    lockMsg +
  '</div>' +
  '<div class="prog-wrap"><div class="prog-fill" id="pbar" style="width:' + pct + '%"></div></div>' +
  '<div class="prog-label" id="plabel">ANSWERED ' + done + ' OF ' + total + ' SKUS (' + pct + '%)</div>' +
  '<div class="body" style="padding-bottom:90px">' +
    '<div class="store-bar">' +
      '<div class="store-bar-chain">' + accDisplay + ' · ' + S.zone + ' ZONE</div>' +
      '<div class="store-bar-name">' + (store?store.name:"") + '</div>' +
      '<div class="store-bar-loc">' + S.city + ' · ' + S.state + '</div>' +
      '<div class="store-bar-emp">' + (emp?emp.name:"") + ' · ' + S.empCode + '</div>' +
    '</div>' +
    '<div class="cat-header">' +
      '<div class="cat-icon">' + catIcon(cat) + '</div>' +
      '<div><div class="cat-title">' + cat + '</div><div class="cat-sub">' + total + ' SKUS · ' + (skus[0]?skus[0].div:"") + '</div></div>' +
    '</div>' +
    skus.map((sku, i) => renderSkuCard(sku, i)).join("") +
    '<div class="sos-card" id="sos-card-' + cat.replace(/[^A-Z0-9]/gi,"_") + '">' +
      '<div class="sos-title">📊 SHARE OF SHELF — ' + cat + ' <span style="color:#dc2626">*COMPULSORY</span></div>' +
      '<div class="sos-grid">' +
        '<div>' +
          '<div class="sos-label">NO. OF PATANJALI FACE-UPS</div>' +
          '<input class="sos-inp" type="number" min="0" step="1" placeholder="ENTER" id="sos-our" value="' + (sos.our===""?"":sos.our) + '" data-soscat="' + cat + '" data-sostype="our" ' + (sos.confirmed?"disabled":"") + '>' +
        '</div>' +
        '<div>' +
          '<div class="sos-label">NO. OF TOTAL CATEGORY FACE-UPS (ALL BRANDS)</div>' +
          '<input class="sos-inp" type="number" min="0" step="1" placeholder="ENTER" id="sos-total" max="999" value="' + (sos.total===""?"":sos.total) + '" data-soscat="' + cat + '" data-sostype="total" ' + (sos.confirmed?"disabled":"") + '>' +
        '</div>' +
      '</div>' +
      (sosValidation.error ? '<div class="sos-err">⚠️ ' + sosValidation.error + '</div>' : '') +
      '<div class="sos-result-row">' +
        '<div class="sos-result' + (sos.confirmed?" sos-confirmed":"") + '" id="sos-result" style="' + (sosPct!==null?"":"opacity:.4") + '">' +
          '<div class="sos-pct">' + (sosPct!==null?sosPct+"%":"—") + '</div>' +
          '<div class="sos-pct-label">' + (sos.confirmed?"✓ SOS CONFIRMED":"SHARE OF SHELF %") + '</div>' +
        '</div>' +
        (!sos.confirmed
          ? '<button class="sos-tick-btn" id="sos-tick" title="CONFIRM SOS" ' + (sosValidation.ok ? "" : "disabled") + '>✓</button>'
          : '<button class="sos-tick-btn confirmed" id="sos-edit" title="EDIT SOS">✎</button>') +
      '</div>' +
    '</div>' +
    '<div style="margin-top:12px;position:sticky;bottom:0;background:#fff;padding:10px 0 4px;border-top:1.5px solid #d5e8d5">' +
      '<div style="text-align:center;font-size:11px;font-weight:900;color:#0a3d2e;margin:0 0 8px;letter-spacing:.4px">' + categoryDoneText + '</div>' +
      '<button class="btn btn-primary" id="btn-next">' +
        (cats.every(c => isCatComplete(acc, c)) ? "REVIEW & SUBMIT →" : "REVIEW & NEXT →") +
      '</button>' +
    '</div>' +
  '</div>';
}

function renderSkuCard(sku, i) {
  const a = S.skuAns[sku.id] || {status:null, qty:"", qtyConfirmed:false, mrp:"", sp:"", priceConfirmed:false};
  const stCls = a.status === "OUT OF STOCK" ? "st-oos" : a.status === "NOT LISTED" ? "st-nl" : a.status === "IN STOCK" ? "st-sih" : "";
  let extraHtml = "";
  if (a.status === "IN STOCK") {
    if (!a.qtyConfirmed) {
      extraHtml = '<div class="qty-row"><input class="qty-inp" type="number" min="0" step="1" placeholder="ENTER QUANTITY" data-qk="' + sku.id + '" value="' + (a.qty===""?"":a.qty) + '"><button class="tick-btn" data-tick="' + sku.id + '">✓</button></div>';
    } else {
      const priceVal = validatePrice(sku.id);
      extraHtml = '<div class="confirmed-bar"><span class="confirmed-text">✓ QTY: ' + a.qty + ' UNITS</span><button class="edit-link" data-undo="' + sku.id + '">EDIT QTY</button></div>' +
        '<div class="price-section">' +
          '<div class="price-grid">' +
            '<div>' +
              '<div class="price-label">MRP (₹) *</div>' +
              '<input class="price-inp" type="number" min="0" step="0.01" placeholder="ENTER MRP" data-pk="' + sku.id + '" data-ptype="mrp" value="' + (a.mrp||"") + '" ' + (a.priceConfirmed?"disabled":"") + '>' +
            '</div>' +
            '<div>' +
              '<div class="price-label">SELLING PRICE (₹) *</div>' +
              '<input class="price-inp' + ((a.mrp && a.sp && Number(a.sp) > Number(a.mrp))?" error":"") + '" type="number" min="0" step="0.01" placeholder="ENTER SP" data-pk="' + sku.id + '" data-ptype="sp" value="' + (a.sp||"") + '" ' + (a.priceConfirmed?"disabled":"") + '>' +
            '</div>' +
          '</div>' +
          '<div class="price-tick-row">' +
          (priceVal.error && (a.mrp || a.sp) ? '<span class="price-err">⚠️ ' + priceVal.error + '</span>' : '<span class="price-err"></span>') +
          (!a.priceConfirmed
            ? '<button class="price-tick-btn" data-ptick="' + sku.id + '" ' + (priceVal.ok?"":"disabled") + '>✓ CONFIRM MRP & SP</button>'
            : '<button class="price-tick-btn confirmed" data-pedit="' + sku.id + '">✓ CONFIRMED · EDIT</button>') +
          '</div>' +
        '</div>';
    }
  }
  return '<div class="sku-card ' + stCls + '" id="sc-' + sku.id + '">' +
    '<div class="sku-num">SKU ' + (i+1) + ' · CODE: ' + sku.code + '</div>' +
    '<div class="sku-brand">' + sku.brand + '</div>' +
    '<div class="sku-desc">' + sku.desc + '</div>' +
    '<div class="status-btns">' +
      '<button class="sbtn' + (a.status==="OUT OF STOCK"?" sel-oos":"") + '" data-sk="' + sku.id + '" data-st="OUT OF STOCK">❌ OUT OF STOCK</button>' +
      '<button class="sbtn' + (a.status==="NOT LISTED"?" sel-nl":"") + '" data-sk="' + sku.id + '" data-st="NOT LISTED">🟡 NOT LISTED</button>' +
      '<button class="sbtn' + (a.status==="IN STOCK"?" sel-sih":"") + '" data-sk="' + sku.id + '" data-st="IN STOCK">✅ IN STOCK</button>' +
    '</div>' +
    extraHtml +
  '</div>';
}

function renderAttDone() {
  const sub = S.submissions.find(s => s.id === S.viewSubId);
  if (!sub) return '<div class="empty">SUBMISSION NOT FOUND</div>';
  const store = STORES[String(sub.storeCode)] || {};
  return '' +
  '<div class="topbar"><div class="topbar-title"><h2>PATANJALI MODERN TRADE SAATHI</h2><p>ATTENDANCE RECORDED</p></div></div>' +
  '<div class="body" style="text-align:center;padding:26px 14px">' +
    '<div class="suc-icon" style="background:' + (sub.attendanceClass==="ABSENT"?"#fef2f2":"#fef9ee") + ';border-color:' + (sub.attendanceClass==="ABSENT"?"#dc2626":"#d97706") + '">' + (sub.attendanceClass==="ABSENT"?"⚠️":"📋") + '</div>' +
    '<div style="font-size:18px;font-weight:800;margin-bottom:5px">' + (sub.attendanceClass==="ABSENT"?"MARKED ABSENT":"ATTENDANCE RECORDED") + '</div>' +
    '<div style="font-size:12px;color:#666;font-weight:700;margin-bottom:18px">' + (store.name||"") + '</div>' +
    '<div class="sum-card">' +
      '<div class="sum-row"><span class="sum-l">DATE & TIME</span><span class="sum-r">' + sub.submittedAt + '</span></div>' +
      '<div class="sum-row"><span class="sum-l">ZONE / STATE</span><span class="sum-r">' + sub.zone + ' / ' + sub.state + '</span></div>' +

// ═══════════════════════════════════════════════════════════════
// EVENT BINDING
// ═══════════════════════════════════════════════════════════════
function clearAttSubState() {
  S.adhocReason = ""; S.adhocConfirmed = false;
  S.closedReason = ""; S.closedOtherText = ""; S.closedConfirmed = false;
  S.underAuditConfirmed = false;
  S.emergencyConfirmed = false;
  S.bannedConfirmed = false;
}

function bind() {
  const on = (id, ev, fn) => { const el = $(id); if (el) el.addEventListener(ev, fn); };

  // ---- HOME ----
  on("f-zone","change", e => { S.zone = e.target.value; S.state = S.city = S.account = S.empCode = S.storeCode = S.attendance = ""; clearAttSubState(); render(); });
  on("f-state","change", e => { S.state = e.target.value; S.city = S.account = S.empCode = S.storeCode = S.attendance = ""; clearAttSubState(); render(); });
  on("f-city","change", e => { S.city = e.target.value; S.account = S.empCode = S.storeCode = S.attendance = ""; clearAttSubState(); render(); });
  on("f-acc","change", e => { S.account = e.target.value; S.empCode = S.storeCode = S.attendance = ""; clearAttSubState(); render(); });
  on("f-emp","change", e => { S.empCode = e.target.value; S.storeCode = S.attendance = ""; clearAttSubState(); render(); });
  on("f-store","change", e => { S.storeCode = e.target.value; S.attendance = ""; clearAttSubState(); render(); });
  on("f-att","change", e => { S.attendance = e.target.value; clearAttSubState(); render(); });
  on("btn-start","click", () => {
    const acc = CHAIN_TO_ACCOUNT[S.account] || S.account;
    const skus = getSkus(acc);
    S.skuAns = {};
    S.sosData = {};
    S.formStartAt = new Date().toISOString();
    skus.forEach(s => { S.skuAns[s.id] = {status:null, qty:"", qtyConfirmed:false, mrp:"", sp:"", priceConfirmed:false}; });
    const cats = getCategoriesForAccount(acc);
    S.currentCat = cats[0] || "";
    S.view = "audit";
    render();
  });
  on("btn-submit-att","click", () => submitAttendance());
  on("btn-hist","click", () => { S.view = "history"; render(); });
  on("btn-another","click", () => { resetForNewSubmission(); render(); });
  on("btn-go-hist","click", () => { S.view = "history"; render(); });
  on("btn-back-home","click", () => { S.view = "home"; render(); });

  // Sub-attendance
  on("adhoc-reason","input", e => { S.adhocReason = e.target.value; const b=$("adhoc-tick"); if (b) b.disabled = !(S.adhocReason && S.adhocReason.trim().length >= 3); });
  on("adhoc-tick","click", () => { if (S.adhocReason && S.adhocReason.trim().length >= 3) { S.adhocConfirmed = true; render(); } });
  on("closed-reason","change", e => { S.closedReason = e.target.value; S.closedOtherText = ""; render(); });
  on("closed-other","input", e => { S.closedOtherText = e.target.value; const b=$("closed-tick"); if (b) b.disabled = !(S.closedReason && S.closedOtherText && S.closedOtherText.trim().length >= 3); });
  on("closed-tick","click", () => { if (S.closedReason && (S.closedReason !== "OTHERS" || (S.closedOtherText && S.closedOtherText.trim().length >= 3))) { S.closedConfirmed = true; render(); } });
  on("audit-tick","click", () => { S.underAuditConfirmed = true; render(); });
  on("emergency-tick","click", () => { S.emergencyConfirmed = true; render(); });
  on("banned-tick","click", () => { S.bannedConfirmed = true; render(); });

  // ---- AUDIT ----
  on("btn-cancel","click", () => {
    if (confirm("DISCARD CURRENT AUDIT AND GO BACK?")) {
      S.view = "home";
      S.skuAns = {};
      S.sosData = {};
      S.currentCat = "";
      render();
    }
  });
  on("cat-switcher","change", e => {
    const newCat = e.target.value;
    const acc = CHAIN_TO_ACCOUNT[S.account] || S.account;
    if (catHasAnyStarted(acc, S.currentCat) && !isCatComplete(acc, S.currentCat)) {
      e.target.value = S.currentCat;
      showToast("FINISH OR RESET CURRENT CATEGORY FIRST", true);
      return;
    }
    S.currentCat = newCat;
    render();
    window.scrollTo(0,0);
  });
  on("btn-next","click", () => {
    const acc = CHAIN_TO_ACCOUNT[S.account] || S.account;
    const cats = getCategoriesForAccount(acc);
    const cat = S.currentCat;
    const skus = getSkusByCat(acc, cat);
    for (const sku of skus) {
      if (!isSkuAnswered(sku.id)) {
        const el = $("sc-"+sku.id);
        if (el) {
          el.scrollIntoView({behavior:"smooth", block:"center"});
          el.classList.add("highlight-error");
          setTimeout(()=>el.classList.remove("highlight-error"), 800);
        }
        showToast("PLEASE COMPLETE ALL SKU ANSWERS", true);
        return;
      }
    }
    if (!S.sosData[cat] || !S.sosData[cat].confirmed) {
      const el = document.querySelector(".sos-card");
      if (el) {
        el.scrollIntoView({behavior:"smooth", block:"center"});
        el.classList.add("highlight-error");
        setTimeout(()=>el.classList.remove("highlight-error"), 800);
      }
      showToast("PLEASE CONFIRM SOS FOR THIS CATEGORY", true);
      return;
    }
    const incomplete = cats.find(c => !isCatComplete(acc, c));
    if (!incomplete) { doSubmit(); return; }
    S.currentCat = incomplete;
    render();
    window.scrollTo(0,0);
    showToast("PLEASE COMPLETE: " + incomplete, true);
  });

  // SKU status buttons
  document.querySelectorAll("[data-sk]").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.dataset.sk, st = btn.dataset.st;
      if (!S.skuAns[id]) S.skuAns[id] = {status:null, qty:"", qtyConfirmed:false, mrp:"", sp:"", priceConfirmed:false};
      const a = S.skuAns[id];
      if (a.status === st) {
        a.status = null; a.qty = ""; a.qtyConfirmed = false; a.mrp = ""; a.sp = ""; a.priceConfirmed = false;
        showToast("STATUS RESET");
      } else {
        a.status = st;
        if (st !== "IN STOCK") { a.qty = ""; a.qtyConfirmed = false; a.mrp = ""; a.sp = ""; a.priceConfirmed = false; }
      }
      render();
    });
  });
  // QTY input
  document.querySelectorAll("[data-qk]").forEach(inp => {
    inp.addEventListener("input", () => {
      const id = inp.dataset.qk;
      if (!S.skuAns[id]) S.skuAns[id] = {status:"IN STOCK", qty:"", qtyConfirmed:false, mrp:"", sp:"", priceConfirmed:false};
      const v = inp.value;
      S.skuAns[id].qty = v === "" ? "" : Number(v);
    });
  });
  // QTY tick
  document.querySelectorAll("[data-tick]").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.dataset.tick, a = S.skuAns[id];
      if (!a || a.qty === "" || a.qty === null) { showToast("ENTER QUANTITY FIRST", true); return; }
      if (Number(a.qty) < 0) { showToast("QUANTITY MUST BE ≥ 0", true); return; }
      a.qtyConfirmed = true;
      render();
    });
  });
  // QTY undo
  document.querySelectorAll("[data-undo]").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.dataset.undo;
      S.skuAns[id].qtyConfirmed = false;
      S.skuAns[id].priceConfirmed = false;
      render();
    });
  });
  // PRICE inputs
  document.querySelectorAll("[data-pk]").forEach(inp => {
    inp.addEventListener("input", () => {
      const id = inp.dataset.pk, t = inp.dataset.ptype;
      if (!S.skuAns[id]) return;
      S.skuAns[id][t] = inp.value;
      const a = S.skuAns[id];
      const v = validatePrice(id);
      const tickBtn = document.querySelector('[data-ptick="' + id + '"]');
      if (tickBtn) tickBtn.disabled = !v.ok;
      const spInp = document.querySelector('[data-pk="' + id + '"][data-ptype="sp"]');
      if (spInp) {
        if (a.mrp && a.sp && Number(a.sp) > Number(a.mrp)) spInp.classList.add("error");
        else spInp.classList.remove("error");
      }
      const priceSection = inp.closest(".price-section");
      const errEl = priceSection ? priceSection.querySelector(".price-err") : null;
      if (errEl) errEl.textContent = (v.error && (a.mrp || a.sp)) ? ("⚠️ " + v.error) : "";
    });
  });
  // PRICE tick
  document.querySelectorAll("[data-ptick]").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.dataset.ptick, v = validatePrice(id);
      if (!v.ok) { showToast(v.error, true); return; }
      S.skuAns[id].priceConfirmed = true;
      render();
    });
  });
  // PRICE edit
  document.querySelectorAll("[data-pedit]").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.dataset.pedit;
      S.skuAns[id].priceConfirmed = false;
      render();
    });
  });
  // SOS inputs
  document.querySelectorAll("[data-soscat]").forEach(inp => {
    inp.addEventListener("input", () => {
      const cat = inp.dataset.soscat, type = inp.dataset.sostype;
      if (!S.sosData[cat]) S.sosData[cat] = {our:"", total:"", confirmed:false};
      S.sosData[cat][type] = inp.value;
      const acc = CHAIN_TO_ACCOUNT[S.account] || S.account;
      const curCat = S.currentCat;
      const v = validateSOS(acc, curCat);
      const tickBtn = document.getElementById("sos-tick");
      if (tickBtn) tickBtn.disabled = !v.ok;
    });
  });
  // SOS tick
  on("sos-tick","click", () => {
    const acc = CHAIN_TO_ACCOUNT[S.account] || S.account;
    const cat = S.currentCat;
    const v = validateSOS(acc, cat);
    if (!v.ok) { showToast(v.error, true); return; }
    S.sosData[cat].confirmed = true;
    render();
  });
  on("sos-edit","click", () => {
    const cat = S.currentCat;
    if (S.sosData[cat]) S.sosData[cat].confirmed = false;
    render();
  });
}

function resetForNewSubmission() {
  S.zone = S.state = S.city = S.account = S.empCode = S.storeCode = S.attendance = "";
  S.skuAns = {}; S.sosData = {}; S.currentCat = "";
  S.formStartAt = new Date().toISOString();
  clearAttSubState();
  S.view = "home";
}

// ═══════════════════════════════════════════════════════════════
// SUBMIT FUNCTIONS
// ═══════════════════════════════════════════════════════════════
function buildAttendanceSubmission() {
  const att = S.attendance;
  let attRecord = att, attReason = "", attDetail = "", attendanceClass = "PRESENT";
  if (att === "PRESENT") {
    attRecord = "PRESENT"; attendanceClass = "PRESENT";
  } else if (att === "ADHOC TASK ASSIGNED") {
    attRecord = "PRESENT (ADHOC TASK)"; attReason = "ADHOC TASK"; attDetail = S.adhocReason; attendanceClass = "PRESENT";
  } else if (att === "STORE CLOSED") {
    attRecord = "PRESENT (STORE CLOSED)"; attReason = "STORE CLOSED";
    attDetail = S.closedReason === "OTHERS" ? "OTHERS: " + S.closedOtherText : S.closedReason;
    attendanceClass = "PRESENT";
  } else if (att === "STORE UNDER INDEPENDENT AUDIT") {
    attRecord = "PRESENT (STORE UNDER AUDIT)"; attReason = "STORE UNDER AUDIT"; attendanceClass = "PRESENT";
  } else if (att === "EMERGENCY LEAVE") {
    attRecord = "ABSENT (EMERGENCY LEAVE)"; attReason = "EMERGENCY LEAVE"; attendanceClass = "ABSENT";
  } else if (att === "BANNED (DUE TO DISCIPLINARY ACTIONS)") {
    attRecord = "ABSENT (BANNED DUE TO DISCIPLINARY ACTIONS)"; attReason = "BANNED DUE TO DISCIPLINARY ACTIONS"; attendanceClass = "ABSENT";
  }
  return {attRecord, attReason, attDetail, attendanceClass};
}

function submitAttendance() {
  const {attRecord, attReason, attDetail, attendanceClass} = buildAttendanceSubmission();
  const id = genId();
  const store = STORES[String(S.storeCode)] || {};
  const emp = EMPLOYEES[S.empCode] || {};
  const sub = {
    id, submittedAt: nowStr(), submitDate: todayDate().toLocaleDateString("en-IN"), submitTime: nowTime(),
    formStartTime: formatDateTimeISO(S.formStartAt), duration: durationFromStart(S.formStartAt), dateISO: todayISO(),
    zone: S.zone, state: S.state, branch: S.state, city: S.city, account: S.account,
    storeCode: S.storeCode, storeName: store.name||"",
    empCode: S.empCode, empName: emp.name||"", empDesig: emp.desig||"",
    soName: emp.soName||"", soEmployeeCode: emp.soEmployeeCode||"", asmName: emp.asmName||"", zmName: emp.zmName||"",
    attendance: attRecord, attendanceClass: attendanceClass, attReason: attReason, attDetail: attDetail,
    details: null, sosData: null
  };
  S.submissions.push(sub);
  saveSubmissions();
  S.viewSubId = id;
  postToWebhook(buildRowsForSubmission(sub));
  S.view = "att-done";
  render();
}

function doSubmit() {
  const id = genId();
  const store = STORES[String(S.storeCode)] || {};
  const emp = EMPLOYEES[S.empCode] || {};
  const acc = CHAIN_TO_ACCOUNT[S.account] || S.account;
  const skus = getSkus(acc);
  const sub = {
    id, submittedAt: nowStr(), submitDate: todayDate().toLocaleDateString("en-IN"), submitTime: nowTime(),
    formStartTime: formatDateTimeISO(S.formStartAt), duration: durationFromStart(S.formStartAt), dateISO: todayISO(),
    zone: S.zone, state: S.state, branch: S.state, city: S.city, account: S.account,
    storeCode: S.storeCode, storeName: store.name||"",
    empCode: S.empCode, empName: emp.name||"", empDesig: emp.desig||"",
    soName: emp.soName||"", soEmployeeCode: emp.soEmployeeCode||"", asmName: emp.asmName||"", zmName: emp.zmName||"",
    attendance: "PRESENT", attendanceClass: "PRESENT", attReason: "", attDetail: "",
    sosData: JSON.parse(JSON.stringify(S.sosData)),
    details: skus.map(s => {
      const a = S.skuAns[s.id] || {};
      const cat = s.cat;
      const sosForCat = S.sosData[cat] || {};
      const sosOur = sosForCat.our !== "" ? Number(sosForCat.our) : null;
      const sosTotal = sosForCat.total !== "" ? Number(sosForCat.total) : null;
      const sosPct = (sosOur !== null && sosTotal !== null && sosTotal > 0) ? Math.round(sosOur/sosTotal*100) : (sosOur === 0 && sosTotal === 0 ? 0 : null);
      return {
        skuId: s.id, code: s.code, chain_code: s.chain_code, brand: s.brand, desc: s.desc, cat: s.cat, div: s.div,
        status: a.status,
        qty: a.qty != null && a.qty !== "" ? Number(a.qty) : null,
        mrp: a.mrp != null && a.mrp !== "" ? Number(a.mrp) : null,
        sp: a.sp != null && a.sp !== "" ? Number(a.sp) : null,
        discountPct: (a.mrp && a.sp && Number(a.mrp) > 0) ? Math.round(((Number(a.mrp)-Number(a.sp))/Number(a.mrp))*100) + "%" : "",
        sosOur: sosOur, sosTotal: sosTotal, sosPct: sosPct
      };
    })
  };
  S.submissions.push(sub);
  saveSubmissions();
  S.viewSubId = id;
  postToWebhook(buildRowsForSubmission(sub));
  S.view = "success";
  render();
}

function buildRowsForSubmission(sub) {
  const rows = [];
  const branchValue = sub.branch || sub.state || "";
  const baseRow = {
    Zone: sub.zone, Branch: branchValue, City: sub.city, Account: sub.account,
    "Store Code": sub.storeCode, "Store Name": sub.storeName,
    "Employee Code": sub.empCode, "Employee Name": sub.empName,
    "SO Name": sub.soName || "", "SO Employee Code": sub.soEmployeeCode || "",
    ASM: sub.asmName, "ZM/RM": sub.zmName,
    Attendance: sub.attendance,
    "Attendance Reason": sub.attReason + (sub.attDetail ? (" — " + sub.attDetail) : ""),
    "Submission Date": sub.submitDate,
    "Form Start Time": sub.formStartTime || "", Duration: sub.duration || "", "Submission Time": sub.submitTime
  };
  if (sub.attendance !== "PRESENT" || !sub.details || sub.details.length === 0) {
    rows.push({...baseRow, Division:"", Category:"", Brand:"", "Product Name":"", "PBB Code":"", "Chain Article Code":"", Availability:"", Quantity:"", MRP:"", "Selling Price":"", "Discount %":"", "Patanjali Face-up":"", "All Brand Face-up":"", "SOS%":""});
  } else {
    sub.details.forEach(d => rows.push({...baseRow,
      Division:d.div||"", Category:d.cat||"", Brand:d.brand||"", "Product Name":d.desc||"", "PBB Code":d.code||"", "Chain Article Code":d.chain_code||"", Availability:d.status||"", Quantity:d.qty!=null?d.qty:"", MRP:d.mrp!=null?d.mrp:"", "Selling Price":d.sp!=null?d.sp:"", "Discount %":d.discountPct||"", "Patanjali Face-up":d.sosOur!=null?d.sosOur:"", "All Brand Face-up":d.sosTotal!=null?d.sosTotal:"", "SOS%":d.sosPct!=null?d.sosPct+"%":""
    }));
  }
  return rows;
}

function postToWebhook(rows) {
  if (!WEBHOOK_URL) {
    showToast("WEBHOOK NOT CONFIGURED", true);
    return;
  }
  const payloadObj = {
    rows: rows,
    source: "PATANJALI_MODERN_TRADE_SAATHI",
    clientTime: new Date().toISOString()
  };
  fetch(WEBHOOK_URL, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: new URLSearchParams({ payload: JSON.stringify(payloadObj) })
  }).then(() => {
    showToast("SUBMITTED TO GOOGLE SHEET ✓");
    console.log("Submission sent (no-cors, cannot read response)");
  }).catch(err => {
    showToast("FAILED – CHECK NETWORK CONSOLE", true);
    console.error("Fetch error:", err);
  });
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
loadSubmissions();
render();
</script>
