<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a3d2e">
<title>PATANJALI MODERN TRADE SAATHI</title>
<style>
/* ========== FULL CSS (same as original) ========== */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f4f0;min-height:100vh;text-transform:uppercase;overflow-anchor:none}
.app{max-width:480px;margin:0 auto;background:#fff;min-height:100vh;display:flex;flex-direction:column;overflow-anchor:none}
.topbar{background:#0a3d2e;padding:0 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;min-height:56px}
.topbar-back{background:rgba(255,255,255,.12);border:none;color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.topbar-title{flex:1}.topbar-title h2{font-size:11px;font-weight:800;color:#fff;letter-spacing:.3px;line-height:1.2}
.topbar-title p{font-size:10px;color:rgba(255,255,255,.6);margin-top:1px}
.topbar-badge{background:rgba(255,255,255,.15);font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;color:#fff;white-space:nowrap}
.hero{background:#fff;padding:30px 20px 22px;text-align:center;color:#0a3d2e;border-bottom:3px solid #0a3d2e}
.hero-title{color:#0a3d2e;font-size:16px;font-weight:900;letter-spacing:.4px;margin-top:14px}
.hero-sub{color:#6b7280;font-size:11px;letter-spacing:.4px;font-weight:700;margin-top:4px}
.hero-logo{font-size:44px;margin-bottom:10px}
.date-bar{background:#063022;color:#fff;text-align:center;padding:6px;font-size:10px;font-weight:700;letter-spacing:.4px}
.form-card{margin:14px;background:#fff;border:1px solid #d5e8d5;border-radius:16px;overflow:hidden;box-shadow:0 2px 8px rgba(10,61,46,.07)}
.field-row{padding:13px 16px;border-bottom:1px solid #eef5ee;position:relative}
.field-row:last-child{border-bottom:none}
.field-row.disabled{opacity:.35;pointer-events:none}
.field-row.att-row{background:#f8fdf8;border-top:2.5px solid #0a3d2e}
.field-label{font-size:10px;font-weight:800;color:#0a3d2e;letter-spacing:.6px;margin-bottom:7px;display:flex;align-items:center;gap:7px}
.step-num{width:20px;height:20px;border-radius:50%;background:#0a3d2e;color:#fff;font-size:10px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.step-num.done{background:#16a34a}.step-num.locked{background:#bbb}
.sel{width:100%;padding:13px 38px 13px 14px;border:2px solid #cde0cd;border-radius:10px;font-size:13px;font-weight:600;color:#111;background:#f8fdf8;appearance:none;-webkit-appearance:none;cursor:pointer;font-family:inherit;text-transform:uppercase}
.sel:focus{outline:none;border-color:#0a3d2e;background:#fff}
.sel.filled{border-color:#0a3d2e;background:#e8f5e8;color:#0a3d2e}
.sel.att-present{border-color:#16a34a;background:#e8f9ee;color:#16a34a}
.sel.att-other{border-color:#b45309;background:#fef9ee;color:#7c3d00}
.sel.att-absent{border-color:#dc2626;background:#fef2f2;color:#991b1b}
.sel-arrow{position:absolute;right:26px;bottom:23px;pointer-events:none;color:#999;font-size:13px}
.sel-check{position:absolute;right:26px;bottom:21px;pointer-events:none;color:#16a34a;font-size:15px;font-weight:700}
.btn{width:100%;padding:15px;border-radius:13px;border:none;font-size:14px;font-weight:800;cursor:pointer;transition:all .15s;font-family:inherit;letter-spacing:.5px;text-transform:uppercase}
.btn:active{transform:scale(.97)}
.btn-primary{background:#0a3d2e;color:#fff}
.btn-primary:hover{background:#0d5240}
.btn-secondary{background:#f0f4f0;color:#333;border:1px solid #cde0cd}
.btn-att{background:#d97706;color:#fff}
.btn-danger{background:#dc2626;color:#fff}
.body{flex:1;padding:14px;overflow-y:auto;overflow-anchor:none}
.cat-select-wrap{position:sticky;top:56px;background:#fff;z-index:90;padding:10px 14px;border-bottom:1px solid #eef5ee;box-shadow:0 2px 6px rgba(0,0,0,.04)}
.cat-select-label{font-size:9px;font-weight:800;color:#0a3d2e;letter-spacing:.5px;margin-bottom:5px}
.cat-select{width:100%;padding:11px 32px 11px 12px;border:2px solid #0a3d2e;border-radius:10px;font-size:12px;font-weight:800;color:#0a3d2e;background:#e8f5e8;appearance:none;-webkit-appearance:none;cursor:pointer;font-family:inherit;text-transform:uppercase;position:relative}
.cat-select:focus{outline:none;background:#fff}
.cat-select-wrap-inner{position:relative}
.cat-select-arrow{position:absolute;right:10px;top:50%;transform:translateY(-50%);pointer-events:none;color:#0a3d2e;font-size:13px;font-weight:800}
.cat-select option.done{background:#dcfce7;color:#14532d}
.cat-locked-msg{margin-top:6px;font-size:9px;color:#dc2626;font-weight:700;letter-spacing:.3px;line-height:1.4}
.prog-wrap{height:6px;background:#d5e8d5;border-radius:3px;margin:0 14px 3px}
.prog-fill{height:6px;background:#0a3d2e;border-radius:3px;transition:width .3s}
.prog-label{margin:0 14px 12px;font-size:10px;color:#666;font-weight:600;letter-spacing:.2px}
.store-bar{background:#e8f5e8;border-radius:11px;padding:12px 14px;margin-bottom:12px}
.store-bar-chain{font-size:9px;font-weight:800;color:#0a3d2e;letter-spacing:.5px;margin-bottom:2px}
.store-bar-name{font-size:13px;font-weight:800;color:#111;margin-bottom:1px}
.store-bar-loc{font-size:10px;color:#555;font-weight:600}
.store-bar-emp{font-size:10px;color:#0a3d2e;font-weight:700;margin-top:3px}
.cat-header{background:#0a3d2e;border-radius:12px;padding:13px 15px;margin-bottom:13px;color:#fff;display:flex;align-items:center;gap:11px}
.cat-icon{font-size:26px}.cat-title{font-size:15px;font-weight:800;letter-spacing:.4px}
.cat-sub{font-size:10px;opacity:.7;margin-top:2px}
.sku-card{border:2px solid #e0eae0;border-radius:13px;padding:13px;margin-bottom:10px;background:#fff;transition:border-color .2s,background .2s}
.sku-card.st-oos{border-color:#dc2626;background:#fff5f5}
.sku-card.st-nl{border-color:#d97706;background:#fffbeb}
.sku-card.st-sih{border-color:#16a34a;background:#f0fdf4}
.sku-card.highlight-error{border-color:#dc2626!important;background:#fff5f5!important;animation:shake .4s ease-in-out}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.sku-num{font-size:9px;font-weight:800;color:#999;letter-spacing:.4px;margin-bottom:3px}
.sku-brand{font-size:10px;font-weight:800;color:#555;letter-spacing:.3px;margin-bottom:3px}
.sku-desc{font-size:13px;font-weight:700;color:#111;line-height:1.4;margin-bottom:11px}
.status-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.sbtn{padding:10px 4px;border-radius:10px;border:2px solid #e0eae0;background:#f8f8f8;cursor:pointer;font-size:10px;font-weight:800;color:#666;text-align:center;transition:all .15s;line-height:1.3;font-family:inherit;letter-spacing:.2px;text-transform:uppercase}
.sbtn:active{transform:scale(.93)}
.sbtn.sel-oos{background:#dc2626;border-color:#dc2626;color:#fff}
.sbtn.sel-nl{background:#d97706;border-color:#d97706;color:#fff}
.sbtn.sel-sih{background:#16a34a;border-color:#16a34a;color:#fff}
.qty-row{display:flex;align-items:center;gap:8px;margin-top:10px}
.qty-inp{flex:1;padding:11px 10px;border:2px solid #16a34a;border-radius:10px;font-size:17px;font-weight:800;color:#14532d;background:#f0fdf4;text-align:center;outline:none;font-family:inherit}
.qty-inp::placeholder{color:#86efac;font-size:11px;font-weight:700}
.tick-btn{width:44px;height:44px;border-radius:10px;border:none;background:#9ca3af;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:700;transition:background .2s}
.tick-btn:active{transform:scale(.9)}
.tick-btn.confirmed{background:#16a34a}
.price-section{margin-top:10px;background:#f0fdf4;border:1.5px solid #bbf7d0;border-radius:11px;padding:12px}
.price-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.price-label{font-size:9px;font-weight:800;color:#15803d;letter-spacing:.4px;margin-bottom:5px}
.price-inp{width:100%;padding:10px 8px;border:1.5px solid #86efac;border-radius:8px;font-size:15px;font-weight:800;color:#14532d;background:#fff;text-align:center;outline:none;font-family:inherit}
.price-inp::placeholder{color:#86efac;font-size:11px;font-weight:600}
.price-inp.error{border-color:#dc2626;background:#fff5f5}
.price-tick-row{display:flex;justify-content:flex-end;align-items:center;gap:8px}
.price-err{flex:1;font-size:9px;color:#dc2626;font-weight:700;letter-spacing:.3px}
.price-tick-btn{padding:10px 18px;border-radius:10px;border:none;background:#9ca3af;color:#fff;font-size:11px;font-weight:800;cursor:pointer;transition:background .2s;font-family:inherit;letter-spacing:.3px;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.price-tick-btn:active{transform:scale(.95)}
.price-tick-btn.confirmed{background:#16a34a}
.price-tick-btn:disabled{background:#cbd5e1;cursor:not-allowed}
.sos-card{background:#fff8e1;border:2px solid #f59e0b;border-radius:13px;padding:14px;margin-top:14px;margin-bottom:4px;transition:all .2s}
.sos-card.highlight-error{border-color:#dc2626!important;background:#fff5f5!important;animation:shake .4s ease-in-out}
.sos-title{font-size:10px;font-weight:800;color:#92400e;letter-spacing:.4px;margin-bottom:11px;display:flex;align-items:center;gap:5px}
.sos-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:8px}
.sos-label{font-size:9px;font-weight:800;color:#92400e;letter-spacing:.4px;margin-bottom:5px;line-height:1.3;min-height:24px}
.sos-inp{width:100%;padding:11px 8px;border:2px solid #fbbf24;border-radius:9px;font-size:17px;font-weight:800;color:#78350f;background:#fff;text-align:center;outline:none;font-family:inherit}
.sos-inp::placeholder{color:#fbbf24;font-size:11px;font-weight:600}
.sos-inp:focus{border-color:#f59e0b}
.sos-inp.error{border-color:#dc2626;background:#fff5f5}
.sos-err{font-size:9.5px;color:#dc2626;font-weight:800;letter-spacing:.3px;margin:5px 0;line-height:1.4;padding:6px 8px;background:#fef2f2;border-radius:6px}
.sos-result-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:8px}
.sos-result{flex:1;background:#f59e0b;border-radius:9px;padding:11px;text-align:center}
.sos-result.sos-confirmed{background:#16a34a}
.sos-pct{font-size:24px;font-weight:800;color:#fff}
.sos-pct-label{font-size:9px;color:rgba(255,255,255,.85);font-weight:700;letter-spacing:.4px}
.sos-tick-btn{width:50px;height:50px;border-radius:10px;border:none;background:#9ca3af;color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:700;transition:background .2s}
.sos-tick-btn:active{transform:scale(.9)}
.sos-tick-btn.confirmed{background:#16a34a}
.sos-tick-btn:disabled{background:#cbd5e1;cursor:not-allowed}
.confirmed-bar{margin-top:9px;background:#dcfce7;border-radius:9px;padding:9px 12px;display:flex;justify-content:space-between;align-items:center}
.confirmed-text{font-size:11px;font-weight:800;color:#14532d}
.edit-link{background:none;border:none;color:#16a34a;font-size:11px;font-weight:800;cursor:pointer;text-decoration:underline;font-family:inherit;text-transform:uppercase}
.sum-card{background:#f0fdf4;border:2px solid #bbf7d0;border-radius:13px;padding:14px;margin-bottom:10px}
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #d1fae5;font-size:11px}
.sum-row:last-child{border-bottom:none}
.sum-l{color:#555;font-weight:600}.sum-r{font-weight:800;color:#111;text-align:right;max-width:58%}
.chip{font-size:9px;font-weight:800;padding:3px 8px;border-radius:6px;display:inline-block}
.chip-oos{background:#fee2e2;color:#991b1b}
.chip-nl{background:#fef3c7;color:#92400e}
.chip-sih{background:#dcfce7;color:#14532d}
.chip-att{background:#fef3c7;color:#92400e}
.chip-abs{background:#fee2e2;color:#991b1b}
.sos-overall-card{background:#fff8e1;border:2px solid #f59e0b;border-radius:13px;padding:14px;margin-bottom:10px;text-align:center}
.sos-big{font-size:36px;font-weight:800;color:#92400e}
.suc-icon{width:72px;height:72px;border-radius:50%;background:#dcfce7;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:32px;border:3px solid #16a34a}
.empty{text-align:center;padding:50px 20px;color:#999;font-size:13px;font-weight:800;letter-spacing:.3px}
.already-sub-banner{margin:0 14px 10px;background:#fef2f2;border:2px solid #dc2626;border-radius:11px;padding:12px 14px;font-size:11px;font-weight:700;color:#991b1b;line-height:1.5}
.sub-att-block{margin:14px;background:#fff8e1;border:2px solid #d97706;border-radius:13px;padding:14px}
.sub-att-block h3{font-size:12px;font-weight:800;color:#7c3d00;letter-spacing:.4px;margin-bottom:10px}
.sub-att-textarea{width:100%;padding:11px;border:1.5px solid #d97706;border-radius:9px;font-size:13px;font-weight:600;background:#fff;font-family:inherit;resize:vertical;min-height:70px;color:#111;text-transform:uppercase}
.sub-att-textarea:focus{outline:none;border-color:#0a3d2e}
.sub-tick-row{display:flex;justify-content:flex-end;margin-top:10px;align-items:center;gap:8px}
.sub-tick-btn{width:46px;height:46px;border-radius:10px;border:none;background:#9ca3af;color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;transition:background .2s}
.sub-tick-btn:active{transform:scale(.9)}
.sub-tick-btn.confirmed{background:#16a34a}
.sub-tick-btn:disabled{background:#cbd5e1;cursor:not-allowed}
.sub-tick-label{flex:1;font-size:10px;font-weight:700;color:#7c3d00;letter-spacing:.3px}
.sub-att-sel{margin-top:10px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:14px;padding:20px;max-width:340px;width:100%;text-align:center}
.modal-title{font-size:14px;font-weight:800;color:#0a3d2e;margin-bottom:10px;letter-spacing:.3px}
.modal-msg{font-size:12px;color:#444;font-weight:600;margin-bottom:16px;line-height:1.5}
.modal-btns{display:flex;gap:8px}
.spinner{width:38px;height:38px;border:4px solid #d5e8d5;border-top-color:#0a3d2e;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0a3d2e;color:#fff;padding:11px 22px;border-radius:24px;font-size:11px;font-weight:800;letter-spacing:.4px;box-shadow:0 4px 16px rgba(0,0,0,.25);z-index:2000;animation:fadeUp .3s}
.toast.error{background:#dc2626}
@keyframes fadeUp{from{opacity:0;transform:translate(-50%,12px)}to{opacity:1;transform:translate(-50%,0)}}
/* ── v3 additions: logo, photo block, live camera, gps banner ── */
.hero-logo-img{width:260px;height:auto;max-width:75%;background:transparent;display:block;margin:0 auto;padding:0;border-radius:0;box-shadow:none}
.refresh-link{font-size:10px;color:#fbbf24;font-weight:700;text-decoration:underline;cursor:pointer;margin-left:6px}
.photo-block{margin:10px 0 4px;padding:11px;border-radius:11px;border:2px dashed #f59e0b;background:#fff8e1}
.photo-block.done{border-style:solid;border-color:#16a34a;background:#f0fdf4}
.photo-block.optional{border-color:#cbd5e1;background:#f8fafc}
.photo-block-lbl{font-size:10px;font-weight:800;color:#92400e;letter-spacing:.4px;margin-bottom:9px;text-transform:uppercase}
.photo-block.done .photo-block-lbl{color:#14532d}
.photo-block.optional .photo-block-lbl{color:#64748b}
.photo-thumbs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:9px}
.photo-thumb{position:relative;width:60px;height:60px;border-radius:8px;overflow:hidden;border:1.5px solid #16a34a;background:#000}
.photo-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.photo-thumb-x{position:absolute;top:0;right:0;width:18px;height:18px;background:#dc2626;color:#fff;border:none;border-radius:0 0 0 6px;font-size:12px;font-weight:900;padding:0;line-height:1;cursor:pointer}
.photo-btn{width:100%;padding:13px;background:#16a34a;color:#fff;border:none;border-radius:10px;font-size:12px;font-weight:800;letter-spacing:.4px;cursor:pointer;text-transform:uppercase;font-family:inherit}
.photo-btn:active{transform:scale(.98)}
.photo-btn.warn{background:#d97706}
.photo-btn.gray{background:#94a3b8}
.gps-banner{margin:10px 14px 0;padding:9px 12px;border-radius:9px;font-size:10px;font-weight:800;letter-spacing:.3px;text-align:center}
.gps-banner.ok{background:#dcfce7;color:#14532d;border:1.5px solid #16a34a}
.gps-banner.warn{background:#fef9ee;color:#92400e;border:1.5px solid #f59e0b}
.gps-banner.err{background:#fee2e2;color:#991b1b;border:1.5px solid #dc2626}
/* live camera modal */
.cam-bg{position:fixed;inset:0;background:#000;z-index:5000;display:flex;flex-direction:column}
.cam-top{position:absolute;top:0;left:0;right:0;padding:14px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(180deg, rgba(0,0,0,.7), transparent);z-index:2;pointer-events:none}
.cam-top > *{pointer-events:auto}
.cam-close{background:rgba(0,0,0,.5);color:#fff;border:none;width:40px;height:40px;border-radius:50%;font-size:22px;font-weight:900;cursor:pointer}
.cam-title{color:#fff;font-size:11px;font-weight:800;letter-spacing:.4px;text-align:center;flex:1;text-shadow:0 1px 4px #000}
.cam-counter{background:rgba(0,0,0,.5);color:#fff;padding:6px 12px;border-radius:14px;font-size:11px;font-weight:800;letter-spacing:.3px}
.cam-video{flex:1;width:100%;object-fit:cover;background:#000}
.cam-canvas{display:none}
/* bottom panel — controls live in lower 1/3 for easy thumb reach */
.cam-controls{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(0deg, rgba(0,0,0,.85), transparent);padding:20px 16px calc(env(safe-area-inset-bottom, 16px) + 16px);display:flex;flex-direction:column;gap:14px;z-index:2}
.cam-thumb-strip{display:flex;gap:6px;overflow-x:auto;min-height:54px;padding-bottom:2px}
.cam-thumb-strip:empty{display:none}
.cam-strip-item{flex:none;width:54px;height:54px;border-radius:8px;overflow:hidden;border:1.5px solid #fff;position:relative;background:#000}
.cam-strip-item img{width:100%;height:100%;object-fit:cover;display:block}
.cam-action-row{display:flex;align-items:center;justify-content:space-between;gap:14px}
.cam-snap{width:76px;height:76px;border-radius:50%;border:5px solid #fff;background:transparent;cursor:pointer;position:relative;display:flex;align-items:center;justify-content:center;flex:none;padding:0}
.cam-snap::after{content:'';width:60px;height:60px;border-radius:50%;background:#fff;display:block}
.cam-snap:active::after{background:#e5e7eb;transform:scale(.92)}
.cam-snap[disabled]{opacity:.4}
.cam-done{background:#16a34a;color:#fff;border:none;padding:14px 18px;border-radius:12px;font-weight:900;font-size:13px;letter-spacing:.4px;cursor:pointer;text-transform:uppercase;flex:1;font-family:inherit}
.cam-done:disabled{background:#475569;cursor:not-allowed}
.cam-hint{color:#fff;font-size:10px;font-weight:600;text-align:center;opacity:.8;letter-spacing:.3px;text-transform:uppercase}
.cam-err-panel{background:#fff;padding:24px;border-radius:14px;margin:24px;text-align:center;color:#991b1b;font-size:13px;font-weight:700;line-height:1.5}
.cam-err-panel button{margin-top:14px;background:#0a3d2e;color:#fff;border:none;padding:11px 22px;border-radius:8px;font-weight:800;letter-spacing:.3px;cursor:pointer;font-family:inherit;text-transform:uppercase}/* Lightbox for reviewing photos full-screen */
.lb-bg{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:6000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:env(safe-area-inset-top,16px) 0 env(safe-area-inset-bottom,16px) 0}
.lb-close{position:absolute;top:18px;right:18px;background:rgba(0,0,0,.55);color:#fff;border:none;width:44px;height:44px;border-radius:50%;font-size:24px;font-weight:900;cursor:pointer;z-index:1}

<body>
<div class="app" id="app"></div>
<div id="modal-mount"></div>
<div id="toast-mount"></div>
<script>
// ═══════════════════════════════════════════════════════════════
// WEBHOOK URL — your newly deployed Apps Script
// ═══════════════════════════════════════════════════════════════
const WEBHOOK_URL = "https://script.google.com/macros/s/AKfycby4qUT2GCEmwCCkdrnwi0NSs7lKkM9tf22bBSa30h7OCots64GB1rT57WV-AHZ847al/exec";

// ═══════════════════════════════════════════════════════════════
// EMBEDDED MASTER DATA — EMPLOYEES (part 1)
// ═══════════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════════
// v3 — MASTER DATA STUBS (populated from Google Sheet at runtime)
// ═══════════════════════════════════════════════════════════════
let EMPLOYEES = {};        // EMP_CODE → { code, name, desig, zone, branch, soEmployeeCode, soName, asmName, zmName, phone }
let STORES = {};           // STORE_CODE → { code, name, chain, city, branch, state, zone, lat, lng }
let EMP_STORES = {};       // EMP_CODE → [ STORE_CODE, ... ]
let MJP = {};              // EMP_CODE → { dayOfMonth: [STORE_CODE,...] | "WEEK OFF" }
let SKU_MASTER = {};       // ACCOUNT → [ { id, code, chain_code, brand, desc, cat, div } ]
let CHAIN_TO_ACCOUNT = {}; // store.chain → SKU_MASTER key (1:1 in v3; chain == account)
const CAT_ICONS = {};      // intentionally empty in v3 — no emojis after category names
let MJP_YEAR = (new Date()).getFullYear();
let MJP_MONTH = (new Date()).getMonth();
let MJP_MONTH_NAME = ["January","February","March","April","May","June","July","August","September","October","November","December"][MJP_MONTH];
let MASTER_LOADED_AT = null;

// Chains where shelf photos are MANDATORY (DMART is optional per business decision)
const PHOTO_MANDATORY_CHAINS = function(chain){ return chain && chain.toUpperCase() !== "DMART"; };

// ═══════════════════════════════════════════════════════════════
// v3 — fetch master data from Apps Script, populate the stubs
// ═══════════════════════════════════════════════════════════════
const CACHE_KEY_MASTER = "saathi_master_v3";
const CACHE_TTL_HOURS = 24;

async function fetchMasterFromServer(){
  const url = WEBHOOK_URL + "?action=master&t=" + Date.now();
  const r = await fetch(url, { method:"GET", mode:"cors" });
  if(!r.ok) throw new Error("HTTP " + r.status);
  const j = await r.json();
  if(!j.ok) throw new Error(j.error || "fetch failed");
  return j;
}
function loadMasterCache(){
  try{
    const raw = localStorage.getItem(CACHE_KEY_MASTER);
    if(!raw) return null;
    const p = JSON.parse(raw);
    if(!p || !p.master || !p.savedAt) return null;
    if(Date.now() - p.savedAt > CACHE_TTL_HOURS*3600*1000) return null;
    return p;
  }catch(e){ return null; }
}
function saveMasterCache(master){
  try{ localStorage.setItem(CACHE_KEY_MASTER, JSON.stringify({ master, savedAt: Date.now() })); }catch(e){}
}
function clearMasterCache(){ try{ localStorage.removeItem(CACHE_KEY_MASTER); }catch(e){} }

function applyMasterData(master){
  // EMPLOYEES
  EMPLOYEES = {};
  (master.employees || []).forEach(e=>{
    EMPLOYEES[e.code] = {
      code: e.code,
      name: e.name,
      desig: e.designation || "",
      payroll: e.payroll || "",
      zone: e.zone || "",
      branch: e.branch || "",
      city: e.city || "",
      hq: e.hq || "",
      state: e.state || "",
      soEmployeeCode: e.soCode || "",
      soName: e.soName || e.boss || "",
      asmName: e.asmName || "",
      zmName: e.zmName || "",
      phone: e.phone || ""
    };
  });
  // STORES + EMP_STORES (from stores_by_emp)
  STORES = {};
  EMP_STORES = {};
  Object.keys(master.stores_by_emp || {}).forEach(empCode=>{
    const list = master.stores_by_emp[empCode] || [];
    EMP_STORES[empCode] = list.map(s=>s.code).filter(Boolean);
    list.forEach(s=>{
      if(s.code && !STORES[s.code]){
        STORES[s.code] = {
          code: s.code,
          name: s.name,
          chain: s.chain,
          city: s.city,
          branch: s.branch,
          // v3 fix: OG cascade UI labels step-2 as "BRANCH" but reads .state.
          // Map .state to the BRANCH column value so dropdown shows branches.
          state: s.branch || s.state,
          actualState: s.state,
          zone: s.zone,
          lat: s.lat || null,
          lng: s.lng || null
        };
      }
    });
  });
  // Fix-up todays_plan stores too (filter logic compares .state against cascade selection)
  if(master.todays_plan && master.todays_plan.plans){
    Object.keys(master.todays_plan.plans).forEach(empCode=>{
      const plan = master.todays_plan.plans[empCode];
      if(plan && plan.stores){
        plan.stores.forEach(s=>{
          s.actualState = s.state;
          s.state = s.branch || s.state;
        });
      }
    });
  }
  // SKU_MASTER from products_by_account
  SKU_MASTER = {};
  CHAIN_TO_ACCOUNT = {};
  Object.keys(master.products_by_account || {}).forEach(acc=>{
    SKU_MASTER[acc] = (master.products_by_account[acc] || []).map((p,i)=>({
      id: p.pbb || (acc + "_" + i),
      code: p.pbb || "",
      chain_code: p.chain_code || "",
      brand: p.brand || "",
      desc: p.product_name || "",
      cat: p.category || "",
      div: p.division || ""
    }));
    CHAIN_TO_ACCOUNT[acc] = acc; // identity mapping — store.chain matches the account directly
  });
  // MJP — converted from today_iso plan. Original app's MJP is month-wide; v3 server only sends today's plan.
  // Strategy: keep MJP empty and use a v3-specific lookup function `getTodayMJPv3()` instead.
  MJP = {};
  // Stash master JSON so v3 helpers can read today's plan + raw cell text
  window.__SAATHI_MASTER__ = master;
  MASTER_LOADED_AT = Date.now();
  // Adjust period to today (so original isMJPPeriodActive() returns true)
  const today = new Date();
  MJP_YEAR = today.getFullYear();
  MJP_MONTH = today.getMonth();
  MJP_MONTH_NAME = ["January","February","March","April","May","June","July","August","September","October","November","December"][MJP_MONTH];
}

async function loadMasterData(force){
  // v3 FINAL: always fetch fresh from server first (real-time sheet updates).
  // Only fall back to cache if network fails AND we have nothing else.
  try {
    const m = await fetchMasterFromServer();
    saveMasterCache(m);
    applyMasterData(m);
    return;
  } catch (e) {
    console.warn("Fresh fetch failed, trying cache fallback:", e);
    const c = loadMasterCache();
    if(c){
      applyMasterData(c.master);
      // Show a small notice that data may be stale
      setTimeout(()=>{ try { showToast("⚠ USING CACHED DATA — NO NETWORK", true); } catch(_){} }, 800);
      return;
    }
    // No cache, no network → propagate error
    throw e;
  }
}


// ========== STATE VARIABLES ==========
let S = {
  view: "home",
  zone: "", state: "", city: "", account: "",
  empCode: "", storeCode: "", attendance: "",
  adhocReason: "", adhocConfirmed: false,
  closedReason: "", closedOtherText: "", closedConfirmed: false,
  underAuditConfirmed: false,
  emergencyConfirmed: false,
  bannedConfirmed: false,
  currentCat: "",
  skuAns: {},
  sosData: {},
  submissions: [],
  viewSubId: null,
  formStartAt: new Date().toISOString(),
  toggleClickTracker: {}
};

// ========== HELPER FUNCTIONS (abbreviated – full original logic) ==========
// For production, you must copy the entire helper/render/bind logic from your original file.
// The code below is a placeholder – in your final HTML, replace with your complete JS functions.
// Because of length, I'm not duplicating all ~1000 lines, but you can paste them from your original.
// They include: uniq, isMJPPeriodActive, getZones, getStates, getCities, getAccounts,
// getStoresForCriteria, getEmployeesForCriteria, getMJPStoresForEmployeeToday, 
// getTotalMJPStoresForEmployeeToday, getStoresCompletedToday, hasSubmittedTodayForStore,
// getEmployeeMJPTodayStatus, getSkus, getCategoriesForAccount, getSkusByCat,
// isSkuAnswered, isSkuStarted, catHasAnyStarted, isCatComplete, catAnsweredCount,
// allSkusOutOfStockOrNotListed, hasAnyInStockWithQty, validateSOS, getSOSPct, getOverallSOS,
// validatePrice, showToast, showLoadingModal, hideModal, renderHome, renderAudit, renderSkuCard,
// renderAttDone, renderSuccess, renderHistory, bind, buildAttendanceSubmission, submitAttendance,
// doSubmit, buildRowsForSubmission, postToWebhook, and the event listeners.
// Since you already have a working HTML file, simply copy the entire <script> from your original,
// but replace WEBHOOK_URL and the postToWebhook function with the ones above.
// Then combine Part 1 (HTML+CSS+EMPLOYEES) + Part 2 (the rest of data + the script) into one file.

// ==================== PART 3 ====================
// Complete Application Logic (Renderers, Helpers, Event Binding, Submission)

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
const $ = id => document.getElementById(id);
const uniq = a => [...new Set(a)];
const todayDate = () => new Date();
// MJP_YEAR / MJP_MONTH / MJP_MONTH_NAME declared above as `let` (v3 stubs section)
// They get set to today's year/month inside applyMasterData() so isMJPPeriodActive() always returns true in v3

function isMJPPeriodActive() {
  const d = todayDate();
  return d.getFullYear() === MJP_YEAR && d.getMonth() === MJP_MONTH;
}
function todayDayOfMonth() { return todayDate().getDate(); }
function todayISO() {
  const d = todayDate(), p = n => String(n).padStart(2,"0");
  return d.getFullYear() + "-" + p(d.getMonth()+1) + "-" + p(d.getDate());
}
function nowStr() {
  const d = todayDate();
  return d.toLocaleDateString("en-IN") + " " + d.toLocaleTimeString("en-IN", {hour:"2-digit", minute:"2-digit"});
}
function nowTime() {
  return todayDate().toLocaleTimeString("en-IN", {hour:"2-digit", minute:"2-digit", second:"2-digit"});
}
function formatDateTimeISO(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  return d.toLocaleString("en-IN");
}
function durationFromStart(startIso) {
  if (!startIso) return "";
  const start = new Date(startIso);
  const end = new Date();
  const diff = Math.round((end - start) / 1000);
  const mins = Math.floor(diff / 60);
  const secs = diff % 60;
  return `${mins}m ${secs}s`;
}
function genId() {
  const d = todayDate(), p = n => String(n).padStart(2,"0");
  return d.getFullYear() + p(d.getMonth()+1) + p(d.getDate()) + "-" + (S.storeCode||"NO") + "-" + (S.empCode||"NO") + "-" + p(d.getHours()) + p(d.getMinutes()) + p(d.getSeconds());
}
function catIcon(c) { return ""; /* v3: no emojis */ }

// ── localStorage ──
function loadSubmissions() {
  try {
    const raw = localStorage.getItem("pmt_submissions_v1");
    if (raw) S.submissions = JSON.parse(raw);
  } catch(e) { S.submissions = []; }
}
function saveSubmissions() {
  try { localStorage.setItem("pmt_submissions_v1", JSON.stringify(S.submissions)); } catch(e) {}
}

// ── MASTER QUERIES ──
function getZones() { return uniq(Object.values(STORES).map(s => s.zone)).filter(Boolean).sort(); }
function getStates(zone) {
  if (!zone) return [];
  return uniq(Object.values(STORES).filter(s => s.zone === zone).map(s => s.state)).sort();
}
function getCities(zone, state) {
  if (!zone || !state) return [];
  return uniq(Object.values(STORES).filter(s => s.zone === zone && s.state === state).map(s => s.city)).sort();
}
function getAccounts(zone, state, city) {
  if (!zone || !state || !city) return [];
  return uniq(Object.values(STORES).filter(s => s.zone === zone && s.state === state && s.city === city).map(s => s.chain)).sort();
}
function getStoresForCriteria(zone, state, city, accountChain) {
  return Object.values(STORES).filter(s => s.zone === zone && s.state === state && s.city === city && s.chain === accountChain);
}
function getEmployeesForCriteria(zone, state, city, accountChain) {
  const matchingStoreCodes = new Set(getStoresForCriteria(zone, state, city, accountChain).map(s => s.code));
  const result = [];
  for (const ec of Object.keys(EMPLOYEES)) {
    const stores = EMP_STORES[ec] || [];
    if (stores.some(sc => matchingStoreCodes.has(sc))) {
      result.push(EMPLOYEES[ec]);
    }
  }
  return result.sort((a,b) => (a.name || "").localeCompare(b.name || ""));
}
function getMJPStoresForEmployeeToday(empCode, zone, state, city, accountChain) {
  if (!empCode) return {type:"NONE", stores:[]};
  const m = window.__SAATHI_MASTER__;
  if (!m || !m.todays_plan) return {type:"NO_PLAN", stores:[]};
  if (!m.todays_plan.found_today_column) return {type:"NO_PLAN", stores:[]};
  const plan = m.todays_plan.plans && m.todays_plan.plans[empCode];
  if (!plan) return {type:"NO_PLAN", stores:[]};
  if (plan.status === "WEEK_OFF") return {type:"OFF", reason:"WEEK OFF", stores:[]};
  if (plan.status === "ON_LEAVE") return {type:"OFF", reason:"ON LEAVE", stores:[]};
  if (plan.status === "HOLIDAY") return {type:"OFF", reason:"HOLIDAY", stores:[]};
  // WORKING — filter today's stores by chain/city/etc match
  const stores = (plan.stores || []).filter(s =>
    s && s.code &&
    (!accountChain || s.chain === accountChain) &&
    (!city || s.city === city) &&
    (!state || s.state === state) &&
    (!zone || s.zone === zone)
  ).map(s => STORES[s.code] || s).filter(Boolean);
  return {type:"STORES", stores};
}
function getTotalMJPStoresForEmployeeToday(empCode) {
  if (!empCode) return 0;
  const m = window.__SAATHI_MASTER__;
  const plan = m && m.todays_plan && m.todays_plan.plans && m.todays_plan.plans[empCode];
  if (!plan || plan.status !== "WORKING") return 0;
  return (plan.stores || []).length;
}
function getStoresCompletedToday(empCode) {
  if (!empCode) return 0;
  const today = todayISO();
  const set = new Set();
  S.submissions.forEach(sub => {
    if (sub.empCode === empCode && sub.dateISO === today && sub.attendance === "PRESENT") {
      set.add(sub.storeCode);
    }
  });
  return set.size;
}
function hasSubmittedTodayForStore(storeCode, empCode) {
  const today = todayISO();
  return S.submissions.some(s => String(s.storeCode) === String(storeCode) && s.empCode === empCode && s.attendance === "PRESENT" && s.dateISO === today);
}
function hasSubmittedAttendanceToday(empCode) {
  const today = todayISO();
  return S.submissions.some(s => s.empCode === empCode && s.dateISO === today && s.attendance !== "PRESENT");
}
function getEmployeeMJPTodayStatus(empCode) {
  if (!empCode) return {type:"NONE"};
  const m = window.__SAATHI_MASTER__;
  if (!m || !m.todays_plan) return {type:"NO_PLAN"};
  if (!m.todays_plan.found_today_column) return {type:"NO_PLAN"};
  const plan = m.todays_plan.plans && m.todays_plan.plans[empCode];
  if (!plan) return {type:"NO_PLAN"};
  if (plan.status === "WEEK_OFF") return {type:"OFF", reason:"WEEK OFF"};
  if (plan.status === "ON_LEAVE") return {type:"OFF", reason:"ON LEAVE"};
  if (plan.status === "HOLIDAY") return {type:"OFF", reason:"HOLIDAY"};
  if (plan.status === "WORKING") {
    const storeList = (plan.stores || []).map(s => s.name || s.code);
    return {type:"WORKING", count: (plan.stores||[]).length, stores: storeList, codes: (plan.stores||[]).map(s=>s.code)};
  }
  return {type:"NO_PLAN"};
}
function getSkus(account) { return SKU_MASTER[account] || []; }
function getCategoriesForAccount(account) { return uniq(getSkus(account).map(s => s.cat)); }
function getSkusByCat(account, cat) { return getSkus(account).filter(s => s.cat === cat); }
function isSkuAnswered(skuId) {
  const a = S.skuAns[skuId];
  if (!a || !a.status) return false;
  if (a.status === "OUT OF STOCK" || a.status === "NOT LISTED") return true;
  if (a.status === "IN STOCK") return a.qtyConfirmed && a.priceConfirmed;
  return false;
}
function isSkuStarted(skuId) {
  const a = S.skuAns[skuId];
  if (!a) return false;
  if (a.status) return true;
  return false;
}
function catHasAnyStarted(account, cat) {
  return getSkusByCat(account, cat).some(s => isSkuStarted(s.id));
}
function isCatComplete(account, cat) {
  const skus = getSkusByCat(account, cat);
  const skuDone = skus.length > 0 && skus.every(s => isSkuAnswered(s.id));
  const sosDone = S.sosData[cat] && S.sosData[cat].confirmed === true;
  const photoDone = (S.shelfPhotos && S.shelfPhotos[cat] && S.shelfPhotos[cat].length > 0) || !isPhotoMandatory();
  return skuDone && sosDone && photoDone;
}
function catAnsweredCount(account, cat) {
  return getSkusByCat(account, cat).filter(s => isSkuAnswered(s.id)).length;
}
function allSkusOutOfStockOrNotListed(account, cat) {
  const skus = getSkusByCat(account, cat);
  if (skus.length === 0) return false;
  return skus.every(s => {
    const a = S.skuAns[s.id];
    return a && (a.status === "OUT OF STOCK" || a.status === "NOT LISTED");
  });
}
function hasAnyInStockWithQty(account, cat) {
  const skus = getSkusByCat(account, cat);
  return skus.some(s => {
    const a = S.skuAns[s.id];
    return a && a.status === "IN STOCK" && a.qtyConfirmed && Number(a.qty) > 0;
  });
}
function validateSOS(account, cat) {
  const sos = S.sosData[cat] || {our:"", total:"", confirmed:false};
  if (sos.our === "" || sos.total === "") return {ok:false, error:"PLEASE FILL BOTH FACE-UP FIELDS"};
  const our = Number(sos.our), total = Number(sos.total);
  if (isNaN(our) || isNaN(total) || our < 0 || total < 0) return {ok:false, error:"FACE-UPS MUST BE NUMERIC AND ≥ 0"};
  if (total === 0) return {ok:false, error:"TOTAL CATEGORY FACE-UPS CANNOT BE ZERO"};
  if (total > 999) return {ok:false, error:"TOTAL FACE-UPS CANNOT EXCEED 999"};
  if (our > total) return {ok:false, error:"PATANJALI FACE-UPS CANNOT EXCEED TOTAL FACE-UPS"};
  if (allSkusOutOfStockOrNotListed(account, cat) && our !== 0) return {ok:false, error:"ALL SKUS ARE OUT OF STOCK / NOT LISTED — PATANJALI FACE-UPS MUST BE 0"};
  if (hasAnyInStockWithQty(account, cat)) {
    if (our === 0) return {ok:false, error:"YOU HAVE STOCK QUANTITY ENTERED — PATANJALI FACE-UPS CANNOT BE 0"};
    if (total === 0) return {ok:false, error:"YOU HAVE STOCK QUANTITY ENTERED — TOTAL FACE-UPS CANNOT BE 0"};
  }
  return {ok:true, error:null};
}
function getSOSPct(cat) {
  const sos = S.sosData[cat] || {};
  if (sos.our === "" || sos.total === "" || sos.our == null || sos.total == null) return null;
  const our = Number(sos.our), total = Number(sos.total);
  if (isNaN(our) || isNaN(total)) return null;
  if (total === 0) return our === 0 ? 0 : null;
  return Math.round(our / total * 100);
}
function getOverallSOS() {
  let our = 0, total = 0;
  Object.values(S.sosData).forEach(d => { our += Number(d.our||0); total += Number(d.total||0); });
  if (total === 0) return our === 0 ? 0 : null;
  return Math.round(our/total*100);
}
function validatePrice(skuId) {
  const a = S.skuAns[skuId];
  if (!a) return {ok:false, error:"NO DATA"};
  if (a.mrp === "" || a.sp === "") return {ok:false, error:"FILL BOTH MRP AND SP"};
  const mrp = Number(a.mrp), sp = Number(a.sp);
  if (isNaN(mrp) || isNaN(sp) || mrp <= 0 || sp <= 0) return {ok:false, error:"MRP & SP MUST BE > 0"};
  if (sp > mrp) return {ok:false, error:"SELLING PRICE CANNOT EXCEED MRP"};
  return {ok:true, error:null};
}

// ═══════════════════════════════════════════════════════════════
// TOAST / MODAL
// ═══════════════════════════════════════════════════════════════
function showToast(msg, isError) {
  const m = $("toast-mount");
  m.innerHTML = '<div class="toast' + (isError?" error":"") + '">' + msg + '</div>';
  setTimeout(() => { m.innerHTML = ""; }, 2400);
}
// Loading modal — these were referenced during submit but never defined,
// which threw a ReferenceError and silently aborted the whole submission.
function showLoadingModal(msg) {
  const m = $("modal-mount");
  if (!m) return;
  m.innerHTML = '<div class="modal-bg"><div class="modal">' +
    '<div class="spinner"></div>' +
    '<div class="modal-title">' + (msg || "PLEASE WAIT…") + '</div>' +
    '</div></div>';
}
function hideModal() {
  const m = $("modal-mount");
  if (m) m.innerHTML = "";
}
// Persistent pop-up for blocking validation errors (SP>MRP, zero face-ups,
// missing photos, etc.). Unlike a toast it stays until the user taps OK, so
// the rep always sees WHY they can't continue. Reuses the modal styles.
function showAlert(title, message) {
  if (message === undefined) { message = title; title = "⚠️ PLEASE CHECK"; }
  const m = $("modal-mount");
  if (!m) { try { alert((title ? title + "\n\n" : "") + message); } catch (_) {} return; }
  m.innerHTML =
    '<div class="modal-bg" id="__alert_bg__"><div class="modal">' +
      '<div class="modal-title">' + title + '</div>' +
      '<div class="modal-msg">' + message + '</div>' +
      '<div class="modal-btns"><button class="btn btn-primary" id="__alert_ok__">OK, GOT IT</button></div>' +
    '</div></div>';
  const ok = $("__alert_ok__"); if (ok) ok.addEventListener("click", closeAlert);
  const bg = $("__alert_bg__"); if (bg) bg.addEventListener("click", e => { if (e.target === bg) closeAlert(); });
}
function closeAlert() { const m = $("modal-mount"); if (m) m.innerHTML = ""; }
function showErrorPopup(msg) { showAlert(msg); }

// GPS GATE - block silent submission without a location fix.
// Shown at submit time whenever captureGPS() did NOT return CAPTURED.
// Reuses existing modal styles. Resolves to "retry" | "anyway".
function showGpsGate(status){
  var reasonMap = {
    "TIMEOUT":       "We could not lock your location in time. This usually happens indoors or on a weak signal.",
    "UNAVAILABLE":   "Location is currently unavailable. Your phone's location (GPS) may be switched OFF.",
    "DENIED":        "Location access was blocked for this app/site, so we cannot record where you are.",
    "FAILED":        "We could not get your location.",
    "NOT_SUPPORTED": "This device/browser cannot provide a location.",
    "UNKNOWN":       "We could not confirm your location."
  };
  var fixHint = (status === "DENIED")
    ? "To fix: allow Location for this app, then tap RETRY."
    : (status === "UNAVAILABLE")
      ? "To fix: turn ON your phone's Location / GPS, then tap RETRY."
      : "Move near an entrance or window for better signal, then tap RETRY.";
  var reason = reasonMap[status] || reasonMap.UNKNOWN;
  return new Promise(function(resolve){
    var m = $("modal-mount");
    if (!m) { resolve(confirm("LOCATION NOT CAPTURED. SUBMIT ANYWAY?") ? "anyway" : "retry"); return; }
    m.innerHTML =
      '<div class="modal-bg" id="__gps_bg__"><div class="modal">' +
        '<div class="modal-title">\uD83D\uDCCD LOCATION NOT CAPTURED</div>' +
        '<div class="modal-msg">' + reason + '<br><br><b>' + fixHint + '</b></div>' +
        '<div class="modal-btns">' +
          '<button class="btn btn-secondary" id="__gps_anyway__">SUBMIT ANYWAY</button>' +
          '<button class="btn btn-primary" id="__gps_retry__">RETRY GPS</button>' +
        '</div>' +
      '</div></div>';
    var done = function(v){ m.innerHTML = ""; resolve(v); };
    var r = $("__gps_retry__");  if (r) r.addEventListener("click", function(){ done("retry"); });
    var a = $("__gps_anyway__"); if (a) a.addEventListener("click", function(){ done("anyway"); });
  });
}

// PRE-FLIGHT LOCATION CHECK - run once when an audit starts.
// Warns the rep early if Location is OFF/blocked. Non-blocking.
var __locPreflightDone = false;
function preflightLocationCheck(){
  if (__locPreflightDone) return;
  __locPreflightDone = true;
  if (!navigator.geolocation) return;
  var warnOff = function(){
    showAlert("\uD83D\uDCCD TURN ON LOCATION",
      "Your phone's Location (GPS) looks switched OFF or blocked.<br><br>" +
      "Please turn it ON now so your store visit can be verified. " +
      "You'll be asked to capture GPS when you submit.");
  };
  if (navigator.permissions && navigator.permissions.query) {
    navigator.permissions.query({ name: "geolocation" })
      .then(function(res){ if (res && res.state === "denied") warnOff(); })
      .catch(function(){});
    return;
  }
  try {
    navigator.geolocation.getCurrentPosition(
      function(){},
      function(err){ if (err && (err.code === 1 || err.code === 2)) warnOff(); },
      { enableHighAccuracy: false, timeout: 4000, maximumAge: 600000 }
    );
  } catch (e) {}
}

// v3 update: PHOTO LIGHTBOX (tap thumbnail to review full-screen)
// ═══════════════════════════════════════════════════════════════
function openLightbox(items, index){
  if(!items || !items.length) return;
  S.lightbox = { open:true, items:items.slice(), index: index || 0 };
  render();
}
function closeLightbox(){
  S.lightbox = { open:false, items:[], index:0 };
  render();
}
function lightboxNext(){
  if(S.lightbox.index < S.lightbox.items.length - 1){
    S.lightbox.index++; render();
  }
}
function lightboxPrev(){
  if(S.lightbox.index > 0){
    S.lightbox.index--; render();
  }
}
function renderLightbox(){
  if(!S.lightbox || !S.lightbox.open) return "";
  const items = S.lightbox.items;
  const idx = S.lightbox.index;
  return '<div class="lb-bg" onclick="closeLightbox()">' +
    '<button class="lb-close" onclick="event.stopPropagation();closeLightbox()">×</button>' +
    (items.length > 1 ? '<div class="lb-counter">' + (idx+1) + ' / ' + items.length + '</div>' : '') +
    '<img class="lb-img" src="' + items[idx] + '" onclick="event.stopPropagation()" alt="review"/>' +
    (items.length > 1
      ? '<button class="lb-nav prev" onclick="event.stopPropagation();lightboxPrev()" ' + (idx===0?"disabled":"") + '>‹</button>' +
        '<button class="lb-nav next" onclick="event.stopPropagation();lightboxNext()" ' + (idx===items.length-1?"disabled":"") + '>›</button>'
      : '') +
  '</div>';
}

// ═══════════════════════════════════════════════════════════════
// RENDER FUNCTIONS
// ═══════════════════════════════════════════════════════════════
let __lastView = null;
function render() {
  const app = $("app");
  const viewChanged = (S.view !== __lastView);
  if (S.view === "home") app.innerHTML = renderHome();
  else if (S.view === "audit") app.innerHTML = renderAudit();
  else if (S.view === "success") app.innerHTML = renderSuccess();
  else if (S.view === "att-done") app.innerHTML = renderAttDone();
  else if (S.view === "history") app.innerHTML = renderHistory();
  __lastView = S.view;
  // v3: append camera modal overlay if open
  if (S.camera && S.camera.open) {
    app.insertAdjacentHTML("beforeend", renderCameraModal());
  }
  // v3 update: append lightbox if open
  if (S.lightbox && S.lightbox.open) {
    app.insertAdjacentHTML("beforeend", renderLightbox());
  }
  bind();
  // Open every NEW page at the top (but not when only an overlay toggled, and
  // not on same-view in-place updates like confirming a SKU). Category changes
  // stay within the audit view and are handled by explicit scrollAuditToTop().
  if (viewChanged && !(S.camera && S.camera.open) && !(S.lightbox && S.lightbox.open)) {
    scrollAuditToTop();
  }
}

// Force the view back to the very top so a new page/category always opens at
// its FIRST question. In this layout the window is the real scroll container
// (the ".body" has no fixed height), and Chrome's scroll-anchoring used to
// snap it back — so we reset window + document + every ".body" + #app, run it
// immediately AND across two animation frames to beat any late re-layout.
function scrollAuditToTop() {
  const reset = () => {
    try {
      document.querySelectorAll(".body").forEach(b => { b.scrollTop = 0; });
      const app = document.getElementById("app");
      if (app) app.scrollTop = 0;
      if (document.scrollingElement) document.scrollingElement.scrollTop = 0;
      document.documentElement.scrollTop = 0;
      document.body.scrollTop = 0;
      window.scrollTo(0, 0);
    } catch (_) {}
  };
  reset();
  requestAnimationFrame(() => { reset(); requestAnimationFrame(reset); });
}

function renderAudit() {
  const accDisplay = S.account;
  const acc = CHAIN_TO_ACCOUNT[accDisplay] || accDisplay;
  const cats = getCategoriesForAccount(acc);
  if (cats.length === 0) {
    return '<div class="topbar"><button class="topbar-back" id="btn-cancel">✕</button><div class="topbar-title"><h2>PATANJALI MODERN TRADE SAATHI</h2><p>NO CATEGORIES</p></div></div><div class="empty">NO SKU DATA FOR THIS ACCOUNT.</div>';
  }
  let cat = S.currentCat;
  if (!cat || !cats.includes(cat)) {
    cat = cats[0];
    S.currentCat = cat;
  }
  const skus = getSkusByCat(acc, cat);
  const store = STORES[String(S.storeCode)];
  const emp = EMPLOYEES[S.empCode];
  const done = catAnsweredCount(acc, cat);
  const total = skus.length;
  const pct = total ? Math.round(done/total*100) : 0;
  const sos = S.sosData[cat] || {our:"", total:"", confirmed:false};
  const sosValidation = (sos.our !== "" && sos.total !== "") ? validateSOS(acc, cat) : {ok:false, error:null};
  const sosPct = getSOSPct(cat);
  const completedCats = cats.filter(c => isCatComplete(acc, c)).length;
  const totalCats = cats.length;
  const categoryDoneText = completedCats + "/" + totalCats + " CATEGORIES DONE";
  const isLast = cats.indexOf(cat) === cats.length - 1;

  const catOptions = cats.map(c => {
    const isDone = isCatComplete(acc, c);
    const cnt = catAnsweredCount(acc, c);
    const tot = getSkusByCat(acc, c).length;
    const status = isDone ? " ✓ DONE" : (cnt > 0 ? " (" + cnt + "/" + tot + ")" : "");
    return '<option value="' + c + '"' + (cat===c?" selected":"") + (isDone?' class="done"':'') + '>' + catIcon(c) + " " + c + status + '</option>';
  }).join("");

  const hasStartedInCurrent = catHasAnyStarted(acc, cat);
  const isCurrentComplete = isCatComplete(acc, cat);
  const dropdownLocked = hasStartedInCurrent && !isCurrentComplete;
  const lockMsg = dropdownLocked ? '<div class="cat-locked-msg">⚠️ FINISH OR RESET ALL SKUS IN THIS CATEGORY BEFORE SWITCHING. TO RESET A SKU, TAP ITS SELECTED STATUS BUTTON TWICE.</div>' : '';

  return '' +
  '<div class="topbar">' +
    '<button class="topbar-back" id="btn-cancel">✕</button>' +
    '<div class="topbar-title"><h2>PATANJALI MODERN TRADE SAATHI</h2><p>CATEGORY: ' + cat + '</p></div>' +
    '<span class="topbar-badge">' + done + '/' + total + '</span>' +
  '</div>' +
  '<div class="cat-select-wrap">' +
    '<div class="cat-select-label">📂 SWITCH CATEGORY' + (dropdownLocked?" (LOCKED)":"") + '</div>' +
    '<div class="cat-select-wrap-inner">' +
      '<select class="cat-select" id="cat-switcher"' + (dropdownLocked?" disabled":"") + '>' + catOptions + '</select>' +
      '<span class="cat-select-arrow">▾</span>' +
    '</div>' +
    lockMsg +
  '</div>' +
  '<div class="prog-wrap"><div class="prog-fill" id="pbar" style="width:' + pct + '%"></div></div>' +
  '<div class="prog-label" id="plabel">ANSWERED ' + done + ' OF ' + total + ' SKUS (' + pct + '%)</div>' +
  '<div class="body" style="padding-bottom:90px">' +
    '<div class="store-bar">' +
      '<div class="store-bar-chain">' + accDisplay + ' · ' + S.zone + ' ZONE</div>' +
      '<div class="store-bar-name">' + (store?store.name:"") + '</div>' +
      '<div class="store-bar-loc">' + S.city + ' · ' + S.state + '</div>' +
      '<div class="store-bar-emp">' + (emp?emp.name:"") + ' · ' + S.empCode + '</div>' +
    '</div>' +
    '<div class="cat-header">' +
      '<div class="cat-icon">' + catIcon(cat) + '</div>' +
      '<div><div class="cat-title">' + cat + '</div><div class="cat-sub">' + total + ' SKUS · ' + (skus[0]?skus[0].div:"") + '</div></div>' +
    '</div>' +
    skus.map((sku, i) => renderSkuCard(sku, i)).join("") +
    '<div class="sos-card" id="sos-card-' + cat.replace(/[^A-Z0-9]/gi,"_") + '">' +
      '<div class="sos-title">📊 SHARE OF SHELF — ' + cat + ' <span style="color:#dc2626">*COMPULSORY</span></div>' +
      '<div class="sos-grid">' +
        '<div>' +
          '<div class="sos-label">NO. OF PATANJALI FACE-UPS</div>' +
          '<input class="sos-inp" type="number" min="0" step="1" placeholder="ENTER" id="sos-our" value="' + (sos.our===""?"":sos.our) + '" data-soscat="' + cat + '" data-sostype="our" ' + (sos.confirmed?"disabled":"") + '>' +
        '</div>' +
        '<div>' +
          '<div class="sos-label">NO. OF TOTAL CATEGORY FACE-UPS (ALL BRANDS)</div>' +
          '<input class="sos-inp" type="number" min="1" step="1" placeholder="ENTER" id="sos-total" max="999" value="' + (sos.total===""?"":sos.total) + '" data-soscat="' + cat + '" data-sostype="total" ' + (sos.confirmed?"disabled":"") + '>' +
        '</div>' +
      '</div>' +
      (sosValidation.error ? '<div class="sos-err">⚠️ ' + sosValidation.error + '</div>' : '') +
      '<div class="sos-result-row">' +
        '<div class="sos-result' + (sos.confirmed?" sos-confirmed":"") + '" id="sos-result" style="' + (sosPct!==null?"":"opacity:.4") + '">' +
          '<div class="sos-pct">' + (sosPct!==null?sosPct+"%":"—") + '</div>' +
          '<div class="sos-pct-label">' + (sos.confirmed?"✓ SOS CONFIRMED":"SHARE OF SHELF %") + '</div>' +
        '</div>' +
        (!sos.confirmed
          ? '<button class="sos-tick-btn" id="sos-tick" title="CONFIRM SOS" ' + (sosValidation.ok ? "" : "disabled") + '>✓</button>'
          : '<button class="sos-tick-btn confirmed" id="sos-edit" title="EDIT SOS">✎</button>') +
      '</div>' +
    '</div>' +
    // v3: shelf photo block — appears after SOS card, before next-button row
    (sos.confirmed ? renderPhotoBlock(cat) : '') +
    '<div style="margin-top:12px;position:sticky;bottom:0;background:#fff;padding:10px 0 4px;border-top:1.5px solid #d5e8d5">' +
      '<div style="text-align:center;font-size:11px;font-weight:900;color:#0a3d2e;margin:0 0 8px;letter-spacing:.4px">' + categoryDoneText + '</div>' +
      '<button class="btn btn-primary" id="btn-next">' +
        (cats.every(c => isCatComplete(acc, c)) ? "REVIEW & SUBMIT →" : "REVIEW & NEXT →") +
      '</button>' +
    '</div>' +
  '</div>';
}

function renderSkuCard(sku, i) {
  const a = S.skuAns[sku.id] || {status:null, qty:"", qtyConfirmed:false, mrp:"", sp:"", priceConfirmed:false};
  const stCls = a.status === "OUT OF STOCK" ? "st-oos" : a.status === "NOT LISTED" ? "st-nl" : a.status === "IN STOCK" ? "st-sih" : "";
  let extraHtml = "";
  if (a.status === "IN STOCK") {
    if (!a.qtyConfirmed) {
      extraHtml = '<div class="qty-row"><input class="qty-inp" type="number" min="0" step="1" placeholder="ENTER QUANTITY" data-qk="' + sku.id + '" value="' + (a.qty===""?"":a.qty) + '"><button class="tick-btn" data-tick="' + sku.id + '">✓</button></div>';
    } else {
      const priceVal = validatePrice(sku.id);
      extraHtml = '<div class="confirmed-bar"><span class="confirmed-text">✓ QTY: ' + a.qty + ' UNITS</span><button class="edit-link" data-undo="' + sku.id + '">EDIT QTY</button></div>' +
        '<div class="price-section">' +
          '<div class="price-grid">' +
            '<div>' +
              '<div class="price-label">MRP (₹) *</div>' +
              '<input class="price-inp" type="number" min="0" step="0.01" placeholder="ENTER MRP" data-pk="' + sku.id + '" data-ptype="mrp" value="' + (a.mrp||"") + '" ' + (a.priceConfirmed?"disabled":"") + '>' +
            '</div>' +
            '<div>' +
              '<div class="price-label">SELLING PRICE (₹) *</div>' +
              '<input class="price-inp' + ((a.mrp && a.sp && Number(a.sp) > Number(a.mrp))?" error":"") + '" type="number" min="0" step="0.01" placeholder="ENTER SP" data-pk="' + sku.id + '" data-ptype="sp" value="' + (a.sp||"") + '" ' + (a.priceConfirmed?"disabled":"") + '>' +
            '</div>' +
          '</div>' +
          '<div class="price-tick-row">' +
          (priceVal.error && (a.mrp || a.sp) ? '<span class="price-err">⚠️ ' + priceVal.error + '</span>' : '<span class="price-err"></span>') +
          (!a.priceConfirmed
            ? '<button class="price-tick-btn" data-ptick="' + sku.id + '" ' + (priceVal.ok?"":"disabled") + '>✓ CONFIRM MRP & SP</button>'
            : '<button class="price-tick-btn confirmed" data-pedit="' + sku.id + '">✓ CONFIRMED · EDIT</button>') +
          '</div>' +
        '</div>' +
        // v3: shelf talker capture — only shown after price confirmed
        (a.priceConfirmed ? renderShelfTalkerBlock(sku.id) : "");
    }
  }
  return '<div class="sku-card ' + stCls + '" id="sc-' + sku.id + '">' +
    '<div class="sku-num">SKU ' + (i+1) + ' · CODE: ' + sku.code + '</div>' +
    '<div class="sku-brand">' + sku.brand + '</div>' +
    '<div class="sku-desc">' + sku.desc + '</div>' +
    '<div class="status-btns">' +
      '<button class="sbtn' + (a.status==="OUT OF STOCK"?" sel-oos":"") + '" data-sk="' + sku.id + '" data-st="OUT OF STOCK">❌ OUT OF STOCK</button>' +
      '<button class="sbtn' + (a.status==="NOT LISTED"?" sel-nl":"") + '" data-sk="' + sku.id + '" data-st="NOT LISTED">🟡 NOT LISTED</button>' +
      '<button class="sbtn' + (a.status==="IN STOCK"?" sel-sih":"") + '" data-sk="' + sku.id + '" data-st="IN STOCK">✅ IN STOCK</button>' +
    '</div>' +
    extraHtml +
  '</div>';
}

// EVENT BINDING
// ═══════════════════════════════════════════════════════════════
function clearAttSubState() {
  S.adhocReason = ""; S.adhocConfirmed = false;
  S.closedReason = ""; S.closedOtherText = ""; S.closedConfirmed = false;
  S.underAuditConfirmed = false;
  S.emergencyConfirmed = false;
  S.bannedConfirmed = false;
}

function bind() {
  const on = (id, ev, fn) => { const el = $(id); if (el) el.addEventListener(ev, fn); };

  // ---- HOME ----
  on("f-zone","change", e => { S.zone = e.target.value; S.state = S.city = S.account = S.empCode = S.storeCode = S.attendance = ""; clearAttSubState(); render(); });
  on("f-state","change", e => { S.state = e.target.value; S.city = S.account = S.empCode = S.storeCode = S.attendance = ""; clearAttSubState(); render(); });
  on("f-city","change", e => { S.city = e.target.value; S.account = S.empCode = S.storeCode = S.attendance = ""; clearAttSubState(); render(); });
  on("f-acc","change", e => { S.account = e.target.value; S.empCode = S.storeCode = S.attendance = ""; clearAttSubState(); render(); });
  on("f-emp","change", e => { S.empCode = e.target.value; S.storeCode = S.attendance = ""; clearAttSubState(); render(); });
  on("f-store","change", e => { S.storeCode = e.target.value; S.attendance = ""; clearAttSubState(); render(); });
  on("f-att","change", e => { S.attendance = e.target.value; clearAttSubState(); render(); });
  on("btn-start","click", () => {
    const acc = CHAIN_TO_ACCOUNT[S.account] || S.account;
    const skus = getSkus(acc);
    S.skuAns = {};
    S.sosData = {};
    S.formStartAt = new Date().toISOString();
    skus.forEach(s => { S.skuAns[s.id] = {status:null, qty:"", qtyConfirmed:false, mrp:"", sp:"", priceConfirmed:false}; });
    const cats = getCategoriesForAccount(acc);
    S.currentCat = cats[0] || "";
    S.view = "audit";
    render();
    scrollAuditToTop();
    preflightLocationCheck();
  });
  on("btn-submit-att","click", () => submitAttendance());
  on("btn-hist","click", () => { S.view = "history"; render(); });
  on("btn-another","click", () => { resetForNewSubmission(); render(); });
  on("btn-go-hist","click", () => { S.view = "history"; render(); });
  on("btn-back-home","click", () => { S.view = "home"; render(); });

  // Sub-attendance

// v3 — GPS (user-initiated only, in-app browser warning)
// ═══════════════════════════════════════════════════════════════
function isInAppBrowser(){
  const ua = navigator.userAgent || "";
  return /WhatsApp|FBAN|FBAV|Instagram|Line\//i.test(ua);
}
function captureGPS(timeoutMs){
  // Two-stage capture so we almost never log a bare TIMEOUT:
  //   Stage 1 - quick precise GPS/satellite fix (enableHighAccuracy:true). Best outdoors.
  //   Stage 2 - if stage 1 fails/times out, fall back to a fast network/Wi-Fi fix
  //             (enableHighAccuracy:false), which still works inside stores where
  //             satellite GPS rarely locks. For a 500 m geo-fence the coarser fix is fine.
  // Both successful stages return status:"CAPTURED".
  const highAccMs = timeoutMs || 8000;
  const coarseMs  = 30000;
  const hardCapMs = highAccMs + coarseMs + 3000;
  return new Promise(resolve => {
    if(!navigator.geolocation){
      resolve({lat:null,lng:null,accuracy:null,status:"NOT_SUPPORTED"}); return;
    }
    let done = false;
    const finish = r => { if(done) return; done = true; resolve(r); };
    setTimeout(()=>finish({lat:null,lng:null,accuracy:null,status:"TIMEOUT"}), hardCapMs);
    const ok = pos => finish({
      lat: +pos.coords.latitude.toFixed(6),
      lng: +pos.coords.longitude.toFixed(6),
      accuracy: Math.round(pos.coords.accuracy || 0),
      status: "CAPTURED"
    });
    const classify = err => {
      if(err && err.code === 1) return "DENIED";
      if(err && err.code === 2) return "UNAVAILABLE";
      if(err && err.code === 3) return "TIMEOUT";
      return "FAILED";
    };
    const coarseStage = prevStatus => {
      navigator.geolocation.getCurrentPosition(
        ok,
        err => {
          let st = classify(err);
          if(st === "FAILED" && prevStatus) st = prevStatus;
          finish({lat:null,lng:null,accuracy:null,status:st});
        },
        { enableHighAccuracy: false, timeout: coarseMs, maximumAge: 300000 }
      );
    };
    navigator.geolocation.getCurrentPosition(
      ok,
      err => {
        const st = classify(err);
        if(st === "DENIED"){ finish({lat:null,lng:null,accuracy:null,status:"DENIED"}); return; }
        coarseStage(st);
      },
      { enableHighAccuracy: true, timeout: highAccMs, maximumAge: 120000 }
    );
  });
}

const PHOTO_MAX_WIDTH = 1280;
const PHOTO_QUALITY = 0.72;
const MAX_PHOTOS_PER_CATEGORY = 4;

// Modes: "shelf" (multi-photo per category), "selfie" (single front-cam), "talker" (single per-SKU)
async function openCamera(opts){
  // opts = { mode, category, skuId }
  opts = opts || {};
  const mode = opts.mode || "shelf";
  if(isInAppBrowser()){
    if(!confirm("⚠️ YOU APPEAR TO BE INSIDE WHATSAPP / IN-APP BROWSER.\n\nTHE CAMERA & LOCATION MAY NOT WORK HERE.\n\nFOR BEST RESULTS: TAP THE 3 DOTS (TOP RIGHT) → 'OPEN IN CHROME'.\n\nPROCEED ANYWAY?")) return;
  }
  // Initial state
  S.camera.open = true;
  S.camera.mode = mode;
  S.camera.category = opts.category || null;
  S.camera.skuId = opts.skuId || null;
  S.camera.facing = (mode === "selfie") ? "user" : "environment";
  S.camera.error = "";
  S.camera.stream = null;
  S.camera.video = null;
  S.camera.busy = false;
  // Pre-load existing photos for shelf mode (so the user can add more / retake)
  if(mode === "shelf"){
    S.camera.temp = (S.shelfPhotos[opts.category] || []).slice();
  } else {
    S.camera.temp = [];   // selfie & talker → single shot, no preload
  }
  render();
  setTimeout(()=>startCameraStream(), 30);
}

async function startCameraStream(){
  if(S.camera.stream){
    try{ S.camera.stream.getTracks().forEach(t=>t.stop()); }catch(e){}
    S.camera.stream = null;
  }
  S.camera.error = "";
  S.camera.busy = true;
  // Update busy indicator without full re-render
  const busyEl = document.getElementById("__cam_busy__");
  if(busyEl) busyEl.style.display = "block";

  try{
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: S.camera.facing },
        width: { ideal: 1920 },
        height: { ideal: 1080 }
      },
      audio: false
    });
    S.camera.stream = stream;
    const v = document.getElementById("__cam_video__");
    if(v){
      v.srcObject = stream;
      await v.play().catch(()=>{});
      S.camera.video = v;
    }
  }catch(e){
    let msg = "CAMERA COULD NOT BE OPENED.";
    if(e.name === "NotAllowedError" || e.name === "PermissionDeniedError"){
      msg = "CAMERA PERMISSION DENIED.\n\nTAP THE LOCK ICON IN THE ADDRESS BAR → PERMISSIONS → CAMERA → ALLOW.";
    } else if(e.name === "NotFoundError"){ msg = "NO CAMERA FOUND ON THIS DEVICE."; }
    else if(e.name === "NotReadableError"){ msg = "CAMERA IS BUSY (ANOTHER APP USING IT). CLOSE OTHER CAMERA APPS AND RETRY."; }
    else if(e.name === "OverconstrainedError" || e.name === "ConstraintNotSatisfiedError"){
      // Selected facing mode (front/back) not available — try the other one once
      const newFacing = S.camera.facing === "environment" ? "user" : "environment";
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: newFacing }, audio: false });
        S.camera.stream = stream;
        S.camera.facing = newFacing;
        const v = document.getElementById("__cam_video__");
        if(v){ v.srcObject = stream; await v.play().catch(()=>{}); S.camera.video = v; }
        S.camera.busy = false;
        render();
        return;
      } catch(e2){ msg = "REQUESTED CAMERA NOT AVAILABLE ON THIS DEVICE."; }
    } else { msg = "CAMERA ERROR: " + (e.message || e.name || e); }
    S.camera.error = msg;
  }
  S.camera.busy = false;
  if(busyEl) busyEl.style.display = "none";
  // Update only the toggle button label without re-render-thrash
  const toggleEl = document.getElementById("__cam_facing__");
  if(toggleEl) toggleEl.textContent = (S.camera.facing === "environment") ? "🔄 FRONT" : "🔄 BACK";
}

async function switchCameraFacing(){
  S.camera.facing = (S.camera.facing === "environment") ? "user" : "environment";
  await startCameraStream();
}

function closeCamera(){
  closeCameraReview();
  if(S.camera.stream){
    try{ S.camera.stream.getTracks().forEach(t=>t.stop()); }catch(e){}
  }
  S.camera = { open:false, mode:"shelf", category:null, skuId:null, facing:"environment", stream:null, video:null, temp:[], error:"", busy:false };
  render();
}

// Blur detection: variance-of-Laplacian on a downsampled grayscale snapshot.
// Below threshold → considered blurry. Threshold tuned for mobile camera output.
const BLUR_THRESHOLD = 180;  // tightened. Mobile cameras typically show 200-800+ when in focus.
function detectBlurScore(canvas){
  // Downsample to 320 wide for speed
  const targetW = 320;
  const scale = targetW / canvas.width;
  const targetH = Math.round(canvas.height * scale);
  const small = document.createElement("canvas");
  small.width = targetW; small.height = targetH;
  const sctx = small.getContext("2d");
  sctx.drawImage(canvas, 0, 0, targetW, targetH);
  const img = sctx.getImageData(0, 0, targetW, targetH);
  const data = img.data;
  // Grayscale buffer
  const gray = new Float32Array(targetW * targetH);
  for(let i = 0, j = 0; i < data.length; i += 4, j++){
    gray[j] = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
  }
  // Laplacian (3x3 kernel: 0 -1 0 / -1 4 -1 / 0 -1 0) and compute variance
  let sum = 0, sumSq = 0, n = 0;
  for(let y = 1; y < targetH - 1; y++){
    for(let x = 1; x < targetW - 1; x++){
      const idx = y * targetW + x;
      const lap = 4 * gray[idx] - gray[idx - 1] - gray[idx + 1] - gray[idx - targetW] - gray[idx + targetW];
      sum += lap; sumSq += lap * lap; n++;
    }
  }
  const mean = sum / n;
  const variance = (sumSq / n) - mean * mean;
  return variance;
}

// In-camera blur rejection banner — visible inside the camera modal so the user sees it
function showCamBlurBanner(score){
  const cam = document.querySelector(".cam-bg");
  if(!cam) return;
  // Remove any previous banner
  const old = document.getElementById("__cam_blur_banner__");
  if(old) old.remove();
  const banner = document.createElement("div");
  banner.id = "__cam_blur_banner__";
  banner.style.cssText = "position:absolute;top:74px;left:14px;right:14px;background:#dc2626;color:#fff;padding:14px 16px;border-radius:12px;font-size:13px;font-weight:900;letter-spacing:.3px;text-align:center;z-index:5;box-shadow:0 8px 24px rgba(220,38,38,.5);animation:slideIn .3s ease";
  banner.innerHTML = "⚠ PHOTO TOO BLURRY (SCORE " + Math.round(score) + ") — HOLD STEADY & RETAKE";
  cam.appendChild(banner);
  setTimeout(()=>{ if(banner.parentNode){ banner.style.transition = "opacity .4s"; banner.style.opacity = "0"; setTimeout(()=>banner.remove(), 400); } }, 2800);
}

function snapPhoto(){
  // Mode-specific max
  const maxThis = (S.camera.mode === "shelf") ? MAX_PHOTOS_PER_CATEGORY : 1;
  if(S.camera.temp.length >= maxThis){
    if(maxThis === 1){
      showToast("ONLY ONE PHOTO ALLOWED — DELETE IT FIRST TO RETAKE", true);
    } else {
      showToast("MAX " + maxThis + " PHOTOS", true);
    }
    return;
  }
  const v = S.camera.video;
  if(!v || !v.videoWidth){ showToast("CAMERA NOT READY", true); return; }
  let w = v.videoWidth, h = v.videoHeight;
  if(w > PHOTO_MAX_WIDTH){ h = Math.round(h * (PHOTO_MAX_WIDTH/w)); w = PHOTO_MAX_WIDTH; }
  const canvas = document.createElement("canvas");
  canvas.width = w; canvas.height = h;
  canvas.getContext("2d").drawImage(v, 0, 0, w, h);

  // BLUR DETECTION — reject blurry photos
  const blurScore = detectBlurScore(canvas);
  if(blurScore < BLUR_THRESHOLD){
    // Show clear, persistent in-camera banner so the user sees the rejection
    showCamBlurBanner(blurScore);
    // Subtle red flash to make rejection obvious
    const flash = document.createElement("div");
    flash.style.cssText = "position:fixed;inset:0;background:#dc2626;z-index:99999;opacity:.45;transition:opacity .35s;pointer-events:none";
    document.body.appendChild(flash);
    setTimeout(()=>{ flash.style.opacity = "0"; setTimeout(()=>flash.remove(), 350); }, 80);
    return;  // do NOT save
  }

  const dataUrl = canvas.toDataURL("image/jpeg", PHOTO_QUALITY);
  S.camera.temp.push(dataUrl);
  // White flash for successful capture
  const flash = document.createElement("div");
  flash.style.cssText = "position:fixed;inset:0;background:#fff;z-index:99999;opacity:.85;transition:opacity .3s;pointer-events:none";
  document.body.appendChild(flash);
  setTimeout(()=>{ flash.style.opacity = "0"; setTimeout(()=>flash.remove(), 300); }, 50);
  refreshCameraStrip();
}
function removeCameraTemp(idx){
  S.camera.temp.splice(idx, 1);
  refreshCameraStrip();
}
// Item 10: review captured photos full-screen while staying inside the live
// capture interface. Injected directly into the DOM (no render()) so the
// camera stream/video element is never torn down.
function reviewCameraPhoto(idx){
  if(!S.camera || !S.camera.temp.length) return;
  closeCameraReview();
  S.camera.reviewIdx = Math.max(0, Math.min(idx, S.camera.temp.length - 1));
  const ov = document.createElement("div");
  ov.id = "__cam_review__";

function deleteReviewedPhoto(){
  S.camera.temp.splice(S.camera.reviewIdx, 1);

// helper for HTML-escaping camera title strings
